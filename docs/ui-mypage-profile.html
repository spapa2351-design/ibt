<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KoPASS — 프로필</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { font-family: "Pretendard Variable", "Pretendard JP Variable", Pretendard, "Pretendard JP", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; max-width: 100vw; overflow-x: hidden; }
  img, svg, video { max-width: 100%; height: auto; }
  :root { --blue-500:#2e84ff; --blue-600:#2272eb; --blue-50:#e8f3ff; --grey-900:#191f28; --grey-700:#4e5968; --grey-600:#6b7684; --grey-500:#8b95a1; --grey-400:#b0b8c1; --grey-300:#cbd5e1; --grey-200:#e5e8eb; --grey-100:#f2f4f6; --grey-50:#f9fafb; --green-500:#03b26c; --orange-500:#fe9800; --red-500:#f04452; }
  .gnb { height: 64px; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--grey-200); position: sticky; top: 0; z-index: 50; display: flex; align-items: center; padding: 0 32px; gap: 32px; }
  .gnb-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 20px; color: var(--grey-900); text-decoration: none; }
  .gnb-logo-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--blue-500) 0%, var(--green-500) 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 14px; }
  .gnb-menu { display: flex; gap: 28px; flex: 1; }
  .gnb-item { color: var(--grey-700); font-weight: 500; font-size: 15px; padding: 6px 0; border-bottom: 2px solid transparent; text-decoration: none; }
  .gnb-item.active { color: var(--blue-500); font-weight: 600; border-bottom-color: var(--blue-500); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #fef3c7 0%, #ddd6fe 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--grey-700); font-size: 13px; }
  .layout { max-width: 1280px; margin: 0 auto; padding: 32px; display: grid; grid-template-columns: 240px 1fr; gap: 32px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; padding: 16px; } }
  .sidebar { background: white; border-radius: 16px; border: 1px solid var(--grey-200); padding: 12px 0; height: fit-content; position: sticky; top: 96px; }
  .sidebar-section { padding: 12px 16px 4px; font-size: 11px; font-weight: 700; color: var(--grey-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 14px; color: var(--grey-700); text-decoration: none; }
  .sidebar-item:hover { background: var(--grey-50); color: var(--grey-900); }
  .sidebar-item.active { background: var(--blue-50); color: var(--blue-500); font-weight: 600; border-left: 3px solid var(--blue-500); padding-left: 13px; }
  .sidebar-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .page-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .page-desc { color: var(--grey-600); font-size: 14px; margin-bottom: 24px; }
  .section { background: white; border-radius: 16px; border: 1px solid var(--grey-200); padding: 24px; margin-bottom: 16px; }
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--grey-900); }
  .avatar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .avatar-big { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #fef3c7, #ddd6fe); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--grey-700); font-size: 32px; }
  .avatar-info { flex: 1; }
  .avatar-name { font-size: 18px; font-weight: 800; }
  .avatar-email { font-size: 13px; color: var(--grey-600); margin-top: 2px; }
  .change-photo { background: var(--grey-100); color: var(--grey-700); padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; color: var(--grey-700); margin-bottom: 6px; }
  .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--grey-200); border-radius: 10px; font-size: 14px; font-family: inherit; }
  .form-input:focus { outline: none; border-color: var(--blue-500); }
  .form-input:read-only { background: var(--grey-50); color: var(--grey-600); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .row-2 { grid-template-columns: 1fr; } }
  .verified { color: var(--green-500); font-size: 11px; font-weight: 700; }
  .save-btn { background: var(--blue-500); color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; }
  .danger-card { border: 1px solid #fecaca; background: #fef2f2; border-radius: 16px; padding: 24px; }
  .danger-title { font-size: 16px; font-weight: 700; color: #b91c1c; margin-bottom: 8px; }
  .danger-desc { font-size: 13px; color: #7f1d1d; margin-bottom: 16px; line-height: 1.6; }
  .danger-btn { background: white; color: var(--red-500); border: 1px solid var(--red-500); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .gnb-burger { display: none; background: var(--grey-100); border: 1px solid var(--grey-200); border-radius: 8px; cursor: pointer; padding: 8px; color: var(--grey-700); align-items: center; justify-content: center; }
  @media (max-width: 768px) {
    .gnb { flex-wrap: wrap; padding: 0 20px !important; height: auto; min-height: 64px; gap: 12px; }
    .gnb-burger { display: flex; }
    .gnb-menu { display: none !important; }
    .gnb > .avatar { margin-left: auto; }
    .gnb.mobile-open .gnb-menu { display: flex !important; order: 99; width: 100%; flex-direction: column; padding: 12px 0 16px; gap: 8px; border-top: 1px solid var(--grey-200); }
    .gnb.mobile-open .gnb-item { padding: 12px 8px; border-bottom: 1px solid var(--grey-100); }
    .layout { padding: 20px !important; }
    .gnb.mobile-open .gnb-menu {
      flex: 0 0 100% !important; width: 100% !important; max-width: 100% !important;
      margin-left: -20px !important; margin-right: -20px !important;
      padding: 12px 20px 16px !important; box-sizing: border-box;
    }
  }
</style>
</head>
<body>
<header class="gnb">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <a href="ui-main-home.html" class="gnb-logo"><div class="gnb-logo-mark">K</div><span>KoPASS</span></a>
  <nav class="gnb-menu">
    <a href="ui-main-home.html" class="gnb-item">홈</a>
    <a href="ui-tests-list.html" class="gnb-item">시험 목록</a>
    <a href="ui-mypage.html" class="gnb-item active">마이페이지</a>
    <a href="ui-faq.html" class="gnb-item">고객센터</a>
  </nav>
  <div class="avatar">홍</div>
  <button class="gnb-burger" onclick="this.closest('.gnb').classList.toggle('mobile-open')" aria-label="메뉴"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">시험·결과</div>
    <a href="ui-mypage.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>대시보드</span></a>
    <a href="ui-mypage-tests.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>응시할 시험</span></a>
    <a href="ui-mypage-results.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>결과</span></a>
    <a href="ui-mypage-certificates.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>인증서</span></a>
    <div class="sidebar-section" style="margin-top:8px;">결제</div>
    <a href="ui-mypage-payments.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>결제 내역</span></a>
    <a href="ui-mypage-refunds.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg><span>환불</span></a>
    <div class="sidebar-section" style="margin-top:8px;">계정</div>
    <a href="ui-mypage-profile.html" class="sidebar-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>프로필</span></a>
    <a href="ui-mypage-inquiries.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>문의 내역</span></a>
  </aside>

  <main>
    <h1 class="page-title">프로필</h1>
    <p class="page-desc">기본 정보와 학습 기간을 관리할 수 있어요.</p>

    <!-- 기본 정보 -->
    <div class="section">
      <div class="section-title">기본 정보</div>
      <div class="avatar-row">
        <div class="avatar-big">홍</div>
        <div class="avatar-info">
          <div class="avatar-name">홍길동 (Hong Gildong)</div>
          <div class="avatar-email">hong.gildong@example.com</div>
        </div>
        <button class="change-photo">사진 변경</button>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" class="form-input" value="길동">
        </div>
        <div class="form-group">
          <label class="form-label">성</label>
          <input type="text" class="form-input" value="홍">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">이메일 <span class="verified">✓ 인증됨</span></label>
        <input type="email" class="form-input" value="hong.gildong@example.com" readonly>
      </div>
      <div class="form-group">
        <label class="form-label">연락처</label>
        <input type="tel" class="form-input" value="+81 90-1234-5678">
      </div>
      <div class="form-group">
        <label class="form-label">한국어 학습 기간</label>
        <select class="form-input">
          <option>1년 미만</option>
          <option selected>1~2년</option>
          <option>2~5년</option>
          <option>5년 이상</option>
        </select>
      </div>
      <button class="save-btn">변경 사항 저장</button>
    </div>

    <!-- 비밀번호 -->
    <div class="section">
      <div class="section-title">비밀번호 변경</div>
      <div class="form-group">
        <label class="form-label">현재 비밀번호</label>
        <input type="password" class="form-input" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label class="form-label">새 비밀번호</label>
        <input type="password" class="form-input" placeholder="8자 이상 · 영문·숫자·특수문자 조합">
      </div>
      <div class="form-group">
        <label class="form-label">새 비밀번호 확인</label>
        <input type="password" class="form-input" placeholder="••••••••">
      </div>
      <button class="save-btn">비밀번호 변경</button>
    </div>

    <!-- 알림 설정 -->
    <div class="section">
      <div class="section-title">알림 설정</div>
      <label style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--grey-100);">
        <div>
          <div style="font-weight:600; font-size:14px;">채점 완료 알림 (이메일)</div>
          <div style="font-size:12px; color:var(--grey-600); margin-top:2px;">결과 발표 시 메일 발송</div>
        </div>
        <input type="checkbox" checked style="width:18px; height:18px; accent-color: var(--blue-500);">
      </label>
      <label style="display:flex; justify-content:space-between; align-items:center; padding:10px 0;">
        <div>
          <div style="font-weight:600; font-size:14px;">마케팅 정보 (이메일)</div>
          <div style="font-size:12px; color:var(--grey-600); margin-top:2px;">신규 시험·할인 안내</div>
        </div>
        <input type="checkbox" style="width:18px; height:18px; accent-color: var(--blue-500);">
      </label>
    </div>

    <!-- 위험 영역 -->
    <div class="danger-card">
      <div class="danger-title">⚠️ 회원 탈퇴</div>
      <div class="danger-desc">탈퇴하시면 응시 기록·결과·인증서 데이터가 모두 삭제되며 복구할 수 없습니다.</div>
      <button class="danger-btn">회원 탈퇴 신청</button>
    </div>
  </main>
</div>

<a href="ui-index.html" style="position:fixed; bottom:24px; left:24px; background:rgba(15,23,42,0.85); color:white; padding:8px 14px; border-radius:999px; text-decoration:none; font-size:12px; font-weight:600; z-index:40;">← UI 인덱스</a>
</body>
</html>
