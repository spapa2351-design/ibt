<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="doc_title">MaroPass Admin — 공지 작성</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="assets/admin.css">
<style>
  /* 간단 텍스트 에디터 전용 스타일 (공유 토큰 재사용) */
  .editor-card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.04),0 1px 2px rgba(15,23,42,.06);overflow:hidden;margin-bottom:16px}
  .editor-toolbar{display:flex;align-items:center;gap:2px;padding:8px 12px;border-bottom:1px solid var(--grey-200);flex-wrap:wrap;background:#fff}
  .tb-btn{min-width:34px;height:34px;padding:0 8px;border-radius:8px;border:none;background:transparent;color:var(--grey-700);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:inherit;transition:background-color .12s,color .12s}
  .tb-btn:hover{background:var(--grey-100)}
  .tb-btn.active{background:var(--blue-50);color:var(--blue-600)}
  .tb-btn .i-italic{font-style:italic}
  .tb-btn .i-underline{text-decoration:underline}
  .tb-sep{width:1px;height:20px;background:var(--grey-200);margin:0 5px;flex-shrink:0}
  .editor-area{min-height:360px;padding:22px 24px;font-size:15px;line-height:1.75;color:var(--grey-900);outline:none}
  .editor-area:empty::before{content:attr(data-placeholder);color:var(--grey-400)}
  .editor-area h2{font-size:20px;font-weight:800;margin:20px 0 8px;letter-spacing:-.3px}
  .editor-area p{margin:0 0 12px}
  .editor-area ul,.editor-area ol{padding-left:22px;margin:0 0 12px}
  .editor-area li{margin-bottom:4px}
  .editor-area a{color:var(--blue-600);text-decoration:underline}
  .editor-area hr{border:none;border-top:1px solid var(--grey-200);margin:20px 0}
  .editor-foot{padding:8px 16px;border-top:1px solid var(--grey-100);font-size:11.5px;color:var(--grey-400);display:flex;justify-content:space-between}
  .opt-row{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end}
  .opt-row .field{margin-bottom:0}
  .switch{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--grey-800);cursor:pointer;user-select:none}
  .switch input{position:absolute;opacity:0;width:0;height:0}
  .switch .track{width:38px;height:22px;border-radius:999px;background:var(--grey-300);position:relative;transition:background-color .15s}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .switch input:checked + .track{background:var(--blue-500)}
  .switch input:checked + .track::after{transform:translateX(16px)}
</style>
</head>
<body data-page="notices" data-title="공지 작성">
<div class="page">
  <div class="page-head">
    <div>
      <h1 class="page-title" data-i18n="page_title">공지 작성</h1>
      <div class="page-sub" data-i18n="page_sub">서비스 사이트 공지사항에 노출됩니다</div>
    </div>
    <div class="page-actions">
      <a class="btn btn-ghost" href="notices.html" data-i18n="back_list">← 목록</a>
      <button class="btn btn-secondary" data-i18n="save_draft">임시저장</button>
      <button class="btn btn-primary" onclick="location.href='notices.html'" data-i18n="publish">게시</button>
    </div>
  </div>

  <!-- 제목 · 옵션 -->
  <div class="form-card">
    <div class="field">
      <label><span data-i18n="label_title">제목</span> <span class="req">*</span></label>
      <input class="input" id="title" type="text" data-i18n-ph="ph_title" placeholder="예) 2026년 5월 정기시험 접수 안내">
    </div>
    <div class="opt-row">
      <div class="field">
        <label data-i18n="label_status">게시 상태</label>
        <select class="select" style="width:auto;min-width:150px">
          <option data-i18n="status_now">즉시 게시</option>
          <option data-i18n="status_scheduled">예약 게시</option>
          <option data-i18n="status_draft">임시저장</option>
        </select>
      </div>
      <div class="field">
        <label data-i18n="label_target">대상</label>
        <select class="select" style="width:auto;min-width:150px">
          <option data-i18n="target_all">전체 회원</option>
          <option data-i18n="target_beginner">초급</option>
          <option data-i18n="target_advanced">중상급</option>
        </select>
      </div>
      <label class="switch">
        <input type="checkbox" id="pin">
        <span class="track"></span>
        <span data-i18n="pin_top">상단 고정</span>
      </label>
    </div>
  </div>

  <!-- 본문 에디터 -->
  <div class="editor-card">
    <div class="editor-toolbar" id="toolbar">
      <button type="button" class="tb-btn" data-cmd="formatBlock" data-val="h2" title="제목">H2</button>
      <button type="button" class="tb-btn" data-cmd="formatBlock" data-val="p" title="본문" data-i18n="tb_body">본문</button>
      <span class="tb-sep"></span>
      <button type="button" class="tb-btn" data-cmd="bold" title="굵게 (Ctrl+B)"><span>B</span></button>
      <button type="button" class="tb-btn" data-cmd="italic" title="기울임 (Ctrl+I)"><span class="i-italic">I</span></button>
      <button type="button" class="tb-btn" data-cmd="underline" title="밑줄 (Ctrl+U)"><span class="i-underline">U</span></button>
      <span class="tb-sep"></span>
      <button type="button" class="tb-btn" data-cmd="insertUnorderedList" title="글머리 목록">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
      </button>
      <button type="button" class="tb-btn" data-cmd="insertOrderedList" title="번호 목록">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4" stroke-width="1.6"/><path d="M4 10h2" stroke-width="1.6"/><path d="M3.5 16.5h2v3h-2" stroke-width="1.6"/></svg>
      </button>
      <span class="tb-sep"></span>
      <button type="button" class="tb-btn" data-cmd="createLink" title="링크">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
      <button type="button" class="tb-btn" data-cmd="insertHorizontalRule" title="구분선">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg>
      </button>
    </div>
    <div class="editor-area" id="editor" contenteditable="true" data-placeholder="공지 내용을 입력하세요. 툴바로 제목·굵게·목록·링크를 넣을 수 있습니다.">
      <p data-i18n="body_p1">안녕하세요, MaroPass입니다.</p>
      <p data-i18n="body_p2">2026년 5월 정기시험 접수를 아래와 같이 안내드립니다.</p>
      <ul>
        <li data-i18n="body_li1">접수 기간: 2026-05-01 ~ 2026-05-20</li>
        <li data-i18n="body_li2">응시 기간: 2026-05-25 ~ 2026-05-31</li>
        <li data-i18n="body_li3">결과 발표: 2026-06-10</li>
      </ul>
      <p data-i18n="body_p3">자세한 내용은 시험 상세 페이지를 확인해 주세요.</p>
    </div>
    <div class="editor-foot">
      <span data-i18n="foot_note">서비스 사이트 공지 상세에 그대로 표시됩니다.</span>
      <span id="charcount">0자</span>
    </div>
  </div>
</div>

<script>
  (function () {
    var editor = document.getElementById('editor');
    var toolbar = document.getElementById('toolbar');
    var charcount = document.getElementById('charcount');

    // 툴바 명령 실행
    toolbar.querySelectorAll('.tb-btn').forEach(function (btn) {
      btn.addEventListener('mousedown', function (e) { e.preventDefault(); }); // 선택 영역 유지
      btn.addEventListener('click', function () {
        var cmd = btn.getAttribute('data-cmd');
        var val = btn.getAttribute('data-val') || null;
        editor.focus();
        if (cmd === 'createLink') {
          var isJa = (window.adminLocale && window.adminLocale() === 'ja');
          var url = window.prompt(isJa ? 'リンクURLを入力してください' : '링크 URL을 입력하세요', 'https://');
          if (url) document.execCommand('createLink', false, url);
        } else if (cmd === 'formatBlock') {
          document.execCommand('formatBlock', false, val);
        } else {
          document.execCommand(cmd, false, val);
        }
        updateActive();
        updateCount();
      });
    });

    // 활성 상태 표시 (굵게/기울임/밑줄/목록)
    function updateActive() {
      [['bold','bold'],['italic','italic'],['underline','underline'],
       ['insertUnorderedList','insertUnorderedList'],['insertOrderedList','insertOrderedList']]
      .forEach(function (pair) {
        var b = toolbar.querySelector('[data-cmd="' + pair[0] + '"]');
        if (!b) return;
        var on = false;
        try { on = document.queryCommandState(pair[1]); } catch (e) {}
        b.classList.toggle('active', on);
      });
    }

    function updateCount() {
      var n = (editor.textContent || '').replace(/\s/g, '').length;
      var isJa = (window.adminLocale && window.adminLocale() === 'ja');
      charcount.textContent = n + (isJa ? '文字' : '자');
    }

    document.addEventListener('selectionchange', function () {
      if (document.activeElement === editor) updateActive();
    });
    editor.addEventListener('input', updateCount);
    updateCount();

    // 로케일 전환 시 JS로 세팅되는 텍스트/속성 갱신
    window.onLocaleChange = function (loc) {
      var ja = (loc === 'ja');
      editor.setAttribute('data-placeholder', ja
        ? 'お知らせの内容を入力してください。ツールバーで見出し・太字・リスト・リンクを挿入できます。'
        : '공지 내용을 입력하세요. 툴바로 제목·굵게·목록·링크를 넣을 수 있습니다.');
      updateCount();
    };
  })();
</script>
