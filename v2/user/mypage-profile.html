<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaroPass — 프로필</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="assets/user.css">
<style>
  .pf-head{display:flex;align-items:center;gap:18px;margin-bottom:4px}
  .pf-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#fef3c7 0%,#ddd6fe 100%);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--grey-700);font-size:26px;flex-shrink:0}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--grey-800);margin-bottom:6px}
  .field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--grey-200);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
  .field input:disabled{background:var(--grey-50);color:var(--grey-500)}
  .field .hint{font-size:11.5px;color:var(--grey-500);margin-top:5px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.field-row{grid-template-columns:1fr}}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
  .toggle-row+.toggle-row{border-top:1px solid var(--grey-100)}
  .toggle-row .t-lab{font-size:14px;font-weight:600;color:var(--grey-900)}
  .toggle-row .t-sub{font-size:12px;color:var(--grey-500);margin-top:2px}
  .switch{width:44px;height:26px;border-radius:999px;background:var(--grey-300);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;border:none}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch.on{background:var(--blue-500)}
  .switch.on::after{transform:translateX(18px)}
  .danger-link{color:var(--red-500);font-weight:700;font-size:13px;text-decoration:none;cursor:pointer;background:none;border:none;padding:0}
</style>
</head>
<body data-page="mypage" data-authed="true">

<div class="mp-layout">
  <aside class="mp-sidebar">
    <div class="mp-sb-section" data-i18n="sb_sec_exam">시험·결과</div>
    <a href="mypage.html" class="mp-sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span data-i18n="sb_dashboard">대시보드</span></a>

    <a href="mypage-results.html" class="mp-sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span data-i18n="sb_results">결과</span></a>
    <a href="mypage-certificates.html" class="mp-sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span data-i18n="sb_certs">인증서</span></a>

    <a href="mypage-payments.html" class="mp-sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span data-i18n="sb_payments">결제 내역</span></a>

  <main>
    <h1 class="page-title" data-i18n="page_title">프로필</h1>
    <p class="page-desc" data-i18n="page_desc">계정 정보와 알림·언어 설정을 관리해요.</p>

    <div class="mp-card">
      <div class="pf-head">
        <div>
          <div style="font-size:18px;font-weight:800" lang="ko">홍길동 <span style="font-size:13px;font-weight:600;color:var(--grey-500)">ホン・ギルドン</span></div>
          <div style="font-size:13px;color:var(--grey-600);margin-top:2px">hong@example.com · 2026-05 가입</div>
        </div>
      </div>
    </div>

    <div class="mp-card">
      <div class="mp-card-head"><h2 data-i18n="sec_basic">기본 정보</h2></div>
      <div class="field-row">
        <div class="field"><label data-i18n="lbl_name_ko">이름 (한국어)</label><input type="text" value="홍길동"></div>
        <div class="field"><label data-i18n="lbl_name_kana">이름 (カタカナ)</label><input type="text" value="ホン・ギルドン"></div>
      </div>
      <div class="field"><label data-i18n="lbl_email">이메일</label><input type="email" value="hong@example.com" disabled><div class="hint" data-i18n="hint_email">이메일 변경은 본인 인증이 필요해요. 고객센터로 문의해 주세요.</div></div>
      <div class="field-row">
        <div class="field"><label data-i18n="lbl_phone">휴대전화</label><input type="tel" value="+81 90-1234-5678"></div>
        <div class="field"><label data-i18n="lbl_lang">기본 언어</label><select><option data-i18n="opt_ko">한국어</option><option data-i18n="opt_ja">日本語</option></select></div>
      </div>
      <button class="btn btn-primary" onclick="save(this)" data-i18n="btn_save">변경 사항 저장</button>
    </div>

    <div class="mp-card">
      <div class="mp-card-head"><h2 data-i18n="sec_notif">알림 설정</h2></div>
      <div class="toggle-row">
        <div><div class="t-lab" data-i18n="nt1_lab">응시 기한 리마인더</div><div class="t-sub" data-i18n="nt1_sub">응시 마감 D-3, D-1 이메일 알림</div></div>
        <button class="switch on" onclick="this.classList.toggle('on')" aria-label="응시 기한 리마인더"></button>
      </div>
      <div class="toggle-row">
        <div><div class="t-lab" data-i18n="nt2_lab">결과·인증서 발급 알림</div><div class="t-sub" data-i18n="nt2_sub">채점 완료·인증서 발급 시 이메일</div></div>
        <button class="switch on" onclick="this.classList.toggle('on')" aria-label="결과 알림"></button>
      </div>
      <div class="toggle-row">
        <div><div class="t-lab" data-i18n="nt3_lab">마케팅·이벤트 소식</div><div class="t-sub" data-i18n="nt3_sub">신규 시험·할인 정보 수신</div></div>
        <button class="switch" onclick="this.classList.toggle('on')" aria-label="마케팅 알림"></button>
      </div>
    </div>

    <div class="mp-card">
      <div class="mp-card-head"><h2 data-i18n="sec_account">계정</h2></div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="alert('비밀번호 변경 메일을 보냈습니다.')" data-i18n="btn_pw">비밀번호 변경</button>
        <button class="danger-link" style="margin-left:auto" onclick="alert('회원 탈퇴는 미응시 시험·환불 처리 후 진행됩니다. 고객센터로 문의해 주세요.')" data-i18n="btn_withdraw">회원 탈퇴</button>
      </div>
    </div>
  </main>
</div>

<script>
