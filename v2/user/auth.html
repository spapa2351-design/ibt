<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaroPass — 로그인 · 회원가입</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="assets/user.css">
<style>
  body{background:var(--gradient-hero-soft);min-height:100vh;color:var(--grey-900);position:relative;overflow-x:hidden}
  body::before{content:"";position:absolute;width:480px;height:480px;background:radial-gradient(circle,rgba(46,132,255,.15) 0%,transparent 70%);border-radius:50%;top:-150px;right:-150px;z-index:0;animation:auth-float 12s ease-in-out infinite}
  body::after{content:"";position:absolute;width:360px;height:360px;background:radial-gradient(circle,rgba(3,178,108,.12) 0%,transparent 70%);border-radius:50%;bottom:-100px;left:-100px;z-index:0;animation:auth-float 15s ease-in-out infinite reverse}
  @keyframes auth-float{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}
  @media (prefers-reduced-motion:reduce){body::before,body::after{animation:none}}

  .top-bar{padding:24px 20px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
  .locale-toggle{background:rgba(255,255,255,.7);backdrop-filter:blur(8px)}

  .auth-container{width:100%;max-width:460px;margin:24px auto 48px;padding:0 20px;position:relative;z-index:1}
  .auth-card{width:100%;background:#fff;border-radius:24px;padding:40px;box-shadow:0 24px 64px rgba(15,23,42,.08);border:1px solid rgba(255,255,255,.6)}
  @media (max-width:480px){.auth-card{padding:28px 20px}}

  .mode-toggle{display:flex;background:var(--grey-100);border-radius:12px;padding:4px;margin-bottom:28px}
  .mode-btn{flex:1;padding:10px;font-size:14px;font-weight:700;background:transparent;border:none;color:var(--grey-500);cursor:pointer;border-radius:8px;transition:background-color .2s,color .2s,box-shadow .2s}
  .mode-btn.active{background:#fff;color:var(--grey-900);box-shadow:0 2px 8px rgba(0,0,0,.06)}

  .auth-title{font-size:24px;font-weight:800;color:var(--grey-900);margin:0 0 4px;letter-spacing:-.02em}
  .auth-desc{font-size:14px;color:var(--grey-600);margin:0 0 24px}

  .social-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
  .social-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:transform .15s,box-shadow .15s}
  .social-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
  .social-btn.line{background:#06c755;color:#fff}
  .social-btn.google{background:#fff;color:var(--grey-900);border:1px solid var(--grey-200)}
  .social-btn.apple{background:#000;color:#fff}

  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--grey-400);font-size:12px;font-weight:500}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--grey-200)}

  .form-group{margin-bottom:16px}
  .form-label{display:block;font-size:13px;font-weight:700;color:var(--grey-700);margin-bottom:6px}
  .form-label .opt{color:var(--grey-400);font-weight:600;font-size:12px}
  .form-input{width:100%;padding:12px 14px;border:1px solid var(--grey-200);border-radius:10px;font-size:14px;background:#fff;font-family:inherit;transition:border-color .15s,box-shadow .15s}
  .form-input:focus{outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(46,132,255,.1)}
  .form-input::placeholder{color:var(--grey-400)}
  .form-hint{font-size:12px;color:var(--grey-500);margin-top:5px}
  .row-2{display:flex;gap:8px}.row-2>*{flex:1}

  .checkbox-group{display:flex;flex-direction:column;gap:8px;margin:16px 0;padding:16px;background:var(--grey-50);border-radius:10px}
  .checkbox-row{display:flex;align-items:flex-start;gap:8px;cursor:pointer}
  .checkbox-row input{accent-color:var(--blue-500);margin-top:2px}
  .checkbox-row span{font-size:13px;color:var(--grey-700);flex:1;line-height:1.5}
  .checkbox-row a{color:var(--blue-500);text-decoration:underline;cursor:pointer}
  .req{color:var(--red-500);font-weight:700}
  .opt-tag{color:var(--grey-500);font-weight:700}
  .cb-sep{border:none;border-top:1px solid var(--grey-200);margin:4px 0}

  .submit-btn{width:100%;padding:14px;background:var(--blue-500);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:background-color .2s,transform .2s,box-shadow .2s;box-shadow:0 8px 24px rgba(46,132,255,.25)}
  .submit-btn:hover{background:var(--blue-600);transform:translateY(-1px);box-shadow:0 12px 32px rgba(46,132,255,.35)}

  .text-link-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:2px 0 16px}
  .text-link-row label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--grey-600)}
  .text-link-row input{accent-color:var(--blue-500)}
  .text-link-row a{color:var(--grey-600);cursor:pointer;text-decoration:none}
  .text-link-row a:hover{color:var(--blue-500)}
  .form-link{text-align:center;margin-top:16px;font-size:13px;color:var(--grey-600)}
  .form-link a{color:var(--blue-500);font-weight:700;cursor:pointer;text-decoration:none}

  .panel{display:none}.panel.active{display:block}
  .auth-foot{text-align:center;margin-top:22px;font-size:12px;color:var(--grey-500);position:relative;z-index:1;line-height:1.6}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="gnb-logo" style="text-decoration:none"><span class="wm">Maro<span class="wm-accent">Pass</span></span></a>
  <div class="locale-toggle">
    <button class="active" data-loc="ko" onclick="setLocale('ko')">한국어</button>
    <button data-loc="ja" onclick="setLocale('ja')">日本語</button>
  </div>
</div>

<div class="auth-container">
  <div class="auth-card">
    <div class="mode-toggle">
      <button class="mode-btn active" id="signup-tab" onclick="switchMode('signup')" data-i18n="mode_signup">회원가입</button>
      <button class="mode-btn" id="login-tab" onclick="switchMode('login')" data-i18n="mode_login">로그인</button>
    </div>

    <!-- 회원가입 (일본 서비스 표준 필드) -->
    <div class="panel active" id="signup-panel">
      <h1 class="auth-title" data-i18n="signup_title">회원가입</h1>
      <p class="auth-desc" data-i18n="signup_desc">1분 만에 가입하고 진단을 시작하세요.</p>

      <div class="social-btns">
        <button class="social-btn line" onclick="go()" aria-label="LINE"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 10.3C24 4.94 18.6.57 12 .57S0 4.94 0 10.3c0 4.81 4.27 8.84 10.03 9.61.39.08.92.26 1.06.59.12.3.08.77.04 1.08l-.17 1.02c-.04.3-.24 1.19 1.05.65 1.29-.54 6.92-4.08 9.44-6.98C23.18 14.39 24 12.46 24 10.3M7.7 13.5H5.32a.63.63 0 0 1-.63-.63V8.1a.63.63 0 0 1 1.26 0v4.14H7.7a.63.63 0 0 1 0 1.26m2.48-.63a.63.63 0 0 1-1.26 0V8.1a.63.63 0 0 1 1.26 0zm5.74 0a.63.63 0 0 1-.43.6.7.7 0 0 1-.2.03.62.62 0 0 1-.51-.25l-2.44-3.32v2.94a.63.63 0 0 1-1.26 0V8.1a.63.63 0 0 1 .43-.6.7.7 0 0 1 .19-.03c.2 0 .38.1.5.26l2.46 3.33V8.1a.63.63 0 0 1 1.26 0zm3.86-3.01a.63.63 0 0 1 0 1.26H18.5v1.13h1.26v-.63.63a.63.63 0 0 1 0 1.26h-2.39a.63.63 0 0 1-.62-.63V8.1a.63.63 0 0 1 .62-.63h2.39a.63.63 0 0 1 0 1.26H18.5v1.13z"/></svg><span data-i18n="continue_line">LINE으로 계속</span></button>
      </div>

      <div class="divider" data-i18n="or_signup">또는 이메일로 가입</div>

      <div class="form-group">
        <label class="form-label" data-i18n="f_email">이메일</label>
        <input type="email" class="form-input" autocomplete="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="f_password">비밀번호</label>
        <input type="password" class="form-input" autocomplete="new-password" placeholder="••••••••">
        <div class="form-hint" data-i18n="pw_hint">8자 이상 · 영문·숫자 조합</div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="f_name">이름</label>
        <div class="row-2">
          <input type="text" class="form-input" autocomplete="family-name" data-i18n-ph="ph_sei" placeholder="姓">
          <input type="text" class="form-input" autocomplete="given-name" data-i18n-ph="ph_mei" placeholder="名">
        </div>
      </div>

      <div class="checkbox-group">
        <label class="checkbox-row"><input type="checkbox" id="agreeAll" onchange="toggleAll(this)"><span><strong data-i18n="agree_all">전체 동의</strong> <span data-i18n="agree_all_hint">(선택 항목 포함)</span></span></label>
        <hr class="cb-sep">
        <label class="checkbox-row"><input type="checkbox" class="req-cb"><span><span class="req" data-i18n="req">[필수]</span> <a data-i18n="agree_terms">이용약관</a> <span data-i18n="agree_consent">동의</span></span></label>
        <label class="checkbox-row"><input type="checkbox" class="req-cb"><span><span class="req" data-i18n="req">[필수]</span> <a data-i18n="agree_privacy">개인정보처리방침</a> <span data-i18n="agree_consent">동의</span></span></label>
        <label class="checkbox-row"><input type="checkbox" class="req-cb"><span><span class="req" data-i18n="req">[필수]</span> <a data-i18n="agree_commerce">특정상거래법 표시</a> <span data-i18n="agree_confirm">확인</span></span></label>
        <label class="checkbox-row"><input type="checkbox"><span><span class="opt-tag" data-i18n="opt">[선택]</span> <span data-i18n="agree_marketing">마케팅 정보 수신 동의 (이메일·LINE)</span></span></label>
      </div>

      <button class="submit-btn" onclick="go()" data-i18n="btn_signup">회원가입</button>
      <div class="form-link"><span data-i18n="have_account">이미 계정이 있으신가요?</span> <a onclick="switchMode('login')" data-i18n="login_link">로그인</a></div>
    </div>

    <!-- 로그인 (원본 디자인) -->
    <div class="panel" id="login-panel">
      <h1 class="auth-title" data-i18n="login_title">로그인</h1>
      <p class="auth-desc" data-i18n="login_desc">다시 만나서 반갑습니다.</p>

      <div class="social-btns">
        <button class="social-btn line" onclick="go()" aria-label="LINE"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 10.3C24 4.94 18.6.57 12 .57S0 4.94 0 10.3c0 4.81 4.27 8.84 10.03 9.61.39.08.92.26 1.06.59.12.3.08.77.04 1.08l-.17 1.02c-.04.3-.24 1.19 1.05.65 1.29-.54 6.92-4.08 9.44-6.98C23.18 14.39 24 12.46 24 10.3M7.7 13.5H5.32a.63.63 0 0 1-.63-.63V8.1a.63.63 0 0 1 1.26 0v4.14H7.7a.63.63 0 0 1 0 1.26m2.48-.63a.63.63 0 0 1-1.26 0V8.1a.63.63 0 0 1 1.26 0zm5.74 0a.63.63 0 0 1-.43.6.7.7 0 0 1-.2.03.62.62 0 0 1-.51-.25l-2.44-3.32v2.94a.63.63 0 0 1-1.26 0V8.1a.63.63 0 0 1 .43-.6.7.7 0 0 1 .19-.03c.2 0 .38.1.5.26l2.46 3.33V8.1a.63.63 0 0 1 1.26 0zm3.86-3.01a.63.63 0 0 1 0 1.26H18.5v1.13h1.26a.63.63 0 0 1 0 1.26h-2.39a.63.63 0 0 1-.62-.63V8.1a.63.63 0 0 1 .62-.63h2.39a.63.63 0 0 1 0 1.26H18.5v1.13z"/></svg><span data-i18n="continue_line">LINE으로 계속</span></button>
      </div>

      <div class="divider" data-i18n="or_login">또는 이메일로 로그인</div>

      <div class="form-group">
        <label class="form-label" data-i18n="f_email">이메일</label>
        <input type="email" class="form-input" autocomplete="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="f_password">비밀번호</label>
        <input type="password" class="form-input" autocomplete="current-password" placeholder="••••••••">
      </div>

      <div class="text-link-row">
        <label><input type="checkbox"><span data-i18n="remember">로그인 유지</span></label>
        <a data-i18n="forgot">비밀번호를 잊으셨나요?</a>
      </div>

      <button class="submit-btn" onclick="go()" data-i18n="btn_login">로그인</button>
      <div class="form-link"><a data-i18n="find_id">아이디 찾기</a><span style="color:var(--grey-300);margin:0 6px">|</span><span data-i18n="no_account">계정이 없으신가요?</span> <a onclick="switchMode('signup')" data-i18n="signup_link">회원가입</a></div>
    </div>
  </div>

  <p class="auth-foot" data-i18n="foot_note">회원가입·로그인 시 이용약관 및 개인정보처리방침에 동의한 것으로 간주됩니다.</p>
</div>

<a href="../index.html" class="demo-index-link">← ui2 인덱스</a>

<script>
const I18N = {
  ko:{
    mode_signup:'회원가입', mode_login:'로그인',
    signup_title:'회원가입', signup_desc:'1분 만에 가입하고 진단을 시작하세요.',
    login_title:'로그인', login_desc:'다시 만나서 반갑습니다.',
    continue_line:'LINE으로 계속',
    or_signup:'또는 이메일로 가입', or_login:'또는 이메일로 로그인',
    f_email:'이메일', f_password:'비밀번호', pw_hint:'8자 이상 · 영문·숫자 조합',
    f_name:'이름', ph_sei:'성', ph_mei:'이름',
    f_furigana:'후리가나 (カナ)', ph_sei_kana:'세이', ph_mei_kana:'메이',
    furigana_hint:'전각 가타카나로 입력해 주세요 (예: ヤマダ / タロウ)',
    f_learn:'한국어 학습 기간', learn_sel:'선택해 주세요', learn_1:'1년 미만', learn_2:'1~2년', learn_3:'2~5년', learn_4:'5년 이상',
    agree_all:'전체 동의', agree_all_hint:'(선택 항목 포함)', req:'[필수]', opt:'[선택]',
    agree_terms:'이용약관', agree_privacy:'개인정보처리방침', agree_commerce:'특정상거래법 표시',
    agree_consent:'동의', agree_confirm:'확인', agree_marketing:'마케팅 정보 수신 동의 (이메일·LINE)',
    btn_signup:'회원가입', have_account:'이미 계정이 있으신가요?', login_link:'로그인',
    remember:'로그인 유지', forgot:'비밀번호를 잊으셨나요?', btn_login:'로그인',
    find_id:'아이디 찾기', no_account:'계정이 없으신가요?', signup_link:'회원가입',
    foot_note:'회원가입·로그인 시 이용약관 및 개인정보처리방침에 동의한 것으로 간주됩니다.'
  },
  ja:{
    mode_signup:'会員登録', mode_login:'ログイン',
    signup_title:'会員登録', signup_desc:'1分で登録して、診断を始めましょう。',
    login_title:'ログイン', login_desc:'おかえりなさい。',
    continue_line:'LINEで続ける',
    or_signup:'またはメールで登録', or_login:'またはメールでログイン',
    f_email:'メールアドレス', f_password:'パスワード', pw_hint:'8文字以上 · 英字と数字の組み合わせ',
    f_name:'お名前', ph_sei:'姓', ph_mei:'名',
    f_furigana:'フリガナ', ph_sei_kana:'セイ', ph_mei_kana:'メイ',
    furigana_hint:'全角カタカナでご入力ください (例: ヤマダ / タロウ)',
    f_learn:'韓国語学習期間', learn_sel:'選択してください', learn_1:'1年未満', learn_2:'1〜2年', learn_3:'2〜5年', learn_4:'5年以上',
    agree_all:'すべて同意', agree_all_hint:'(任意項目を含む)', req:'[必須]', opt:'[任意]',
    agree_terms:'利用規約', agree_privacy:'プライバシーポリシー', agree_commerce:'特定商取引法に基づく表記',
    agree_consent:'に同意', agree_confirm:'を確認', agree_marketing:'マーケティング情報の受信に同意 (メール・LINE)',
    btn_signup:'会員登録', have_account:'すでにアカウントをお持ちですか?', login_link:'ログイン',
    remember:'ログイン状態を保持', forgot:'パスワードを忘れた方', btn_login:'ログイン',
    find_id:'IDを忘れた方', no_account:'アカウントをお持ちでない方は?', signup_link:'会員登録',
    foot_note:'会員登録・ログイン時、利用規約およびプライバシーポリシーに同意したものとみなされます。'
  }
};
let locale = localStorage.getItem('kopass_main_locale') || 'ko';
function t(k){ return (I18N[locale] && I18N[locale][k]) || I18N.ko[k] || k; }
function setLocale(loc){
  locale = loc; localStorage.setItem('kopass_main_locale', loc); document.documentElement.lang = loc;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.getAttribute('data-i18n-ph')));
  document.querySelectorAll('.locale-toggle button').forEach(b => b.classList.toggle('active', b.getAttribute('data-loc') === loc));
}
function switchMode(mode){
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(mode + '-panel').classList.add('active');
  document.getElementById(mode + '-tab').classList.add('active');
  history.replaceState(null, '', mode === 'login' ? '#login' : '#');
}
function toggleAll(cb){ document.querySelectorAll('#signup-panel .checkbox-group input[type=checkbox]').forEach(x => { if (x !== cb) x.checked = cb.checked; }); }
function go(){ location.href = 'mypage.html'; }
setLocale(locale);
if (location.hash === '#login') switchMode('login');
</script>
</body>
</html>
