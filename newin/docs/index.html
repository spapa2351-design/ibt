 + 인증서 PDF + 위변조 검증** — 다운로드 + 외부 URL 검증\n8. **응시 진입 — 데스크탑 / 앱 분기 안내** — 단일 웹 앱 + 네이티브 쉘 구조 (GAP-04, GAP-14)\n9. **응시 윈도우 14일 티켓 + 만료 처리** — 정책 8. 만료 D-1·D-day 메일, 만료 후 환불 정책 매핑\n10. **시스템 알림 메일 5종** — 결제 / D-day / 만료 임박 / 결과 공개 / 환불 처리\n\n> **인보이스 PDF (일본 적격청구서)**: 일본 PG API 연동 시점에 같이. 라운드 2.\n\n---\n\n## 본 문서가 다루지 않는 것\n\n- 화면 단위 인터랙션 (버튼 위치·전환·애니메이션) → `05-screen-inventory.md` + 디자인 발주\n- 사용자 흐름 (시퀀스) → `03-user-flows.md`\n- 운영 룰 (정책) → `04-policy.md`\n- 데이터 모델 → 라운드 3 `09-data-model.md`\n- API 인터페이스 → 라운드 3 `10-api-contract.md`\n\n## 관리자 기능 명세\n\n> 관리자는 기존 솔루션 활용. 1차 오픈은 대메뉴 식별만으로 충분 (PDF 5메뉴: 시험·평가/채점·회원/권한·통계·시스템). 향후 핵심은 **문제 만들기** — 별도 라운드.\n\n라운드 2에서 `06-feature-spec.md` 안에 *관리자 섹션* 추가 또는 `06-admin-feature-spec.md` 분리.\n"},{"id":"d11","type":"md","src":"06-admin-feature-spec.md","title":"관리자 기능 명세 (Phase 1, Light)","content":"# 관리자 기능 명세 (Phase 1, Light)\n\n> **기존 터치클래스 관리자 web을 그대로 사용**한다. 시험 관리·문제 은행·응시자 관리·평가/채점·통계·시스템 설정은 기존 자산. 1차 오픈에서 신규로 얹는 건 **MaroPass 메뉴 5개**(회원·결제·환불 승인·결과 공개·인증서 템플릿)와 문제 만들기 안 **MaroPass 말하기 5영역 탭**뿐. 신규는 **★**, 기존 활용은 **◇** 표기.\n\n## 한 줄\n\n**기존 터치클래스 관리자 web 위에 MaroPass 특화 메뉴 5개와 말하기 5영역 문제 만들기 탭만 신설한다 — 시험 관리·문제 은행·응시자 관리 등 운영 골격은 기존 그대로.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. **기존 운영 흐름 보존** — 터치클래스 운영팀이 이미 익숙한 시험 관리·문제 은행·응시자 관리·통계 워크플로우를 그대로 유지해 학습 비용 0. MaroPass 신규 메뉴는 portal에서 흘러들어오는 가입·결제·환불·결과 공개·인증서 데이터를 한 화면에서 처리하는 역할.\n2. **개발 표면적 축소** — 관리자 콘솔 신규 개발은 MaroPass 메뉴 5개와 문제 만들기 내 말하기 5영역 탭 정도. Drag & Drop 시험지 구성, 카테고리 트리, 응시자 관리, 채점 보정 같은 깊이 큰 영역은 기존 자산 활용으로 절약.\n3. **문제 만들기 — MaroPass 말하기 5영역 신설** — 짧은 문장 읽기·질문 대답·생활 속 대화·그림 설명·화용 과제. 영역별 폼·시간·배점·평가 기준·한·일 지시문 자동 분기 + 핸드폰 frame 라이브 프리뷰. 객관식·주관식 출제 도구는 기존 그대로.\n4. **평가자 UI(3단 분할·STT 싱크·매크로·2인 교차 채점)** 는 Premium 플랜 도입 시점에 종속이라 1차 오픈 비포함. AI 1차 자동 채점 + 운영자 수동 보정으로 라운드 1을 운영.\n5. **KPI·통계는 기본 카운트만** — 운영 데이터가 쌓인 뒤 라운드 2에서 시각화 깊이 결정. 1차 오픈은 일자별 응시 추이·미답변 문의·미처리 결제 같은 핵심 4 KPI만.\n\n---\n\n## 라벨 정의 (응시자 06과 동일)\n\n| 라벨 | 의미 |\n|---|---|\n| ✅ **포함** | Phase 1 전체 구현 |\n| 🟠 **일부** | Phase 1 라이트 버전만 |\n| ⏭ **DEFERRED** | 라운드 2 이후 |\n| ❌ **제외** | MaroPass 정책상 불포함 |\n\n---\n\n## 1. 시험 관리\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 시험 목록 | 시험 리스트 (검색·필터·페이지네이션) | ✅ | 디자인 자료 있음 (`시험 관리.png`) |\n| 시험 목록 | 카테고리 트리 (좌측 사이드바) | ✅ | |\n| 시험 목록 | 시험 일괄 작업 (선택 삭제·복사) | ⏭ | 라운드 2 |\n| 시험 등록 | 시험 개요 등록 (시험명·소개·표지 이미지) | ✅ | |\n| 시험 등록 | **시험 가격 등록** (단가, 할인가, 통화=JPY) | ✅ | 가격 변경 이력 보관. 결제 이력은 결제 시점 가격 보호 |\n| 시험 등록 | 공개 상태 관리 (비공개·공개·종료) | ✅ | |\n| 시험 등록 | 응시 가능 기간 설정 | ✅ | |\n| 시험 등록 | 시험 분류 (카테고리·태그) | 🟠 | 기본 1단계 분류만 |\n| 응시 조건 | **시험 통과 조건 설정** (최소 응시 문항·점수 기준·평균 기준) | ⏭ | 라운드 2. 디자인 자료의 사이드바 미리 캐치 |\n| 응시 조건 | 응시 기간·시간 제한·재응시 정책 | 🟠 | 기간만 |\n| 응시 조건 | **응시 윈도우 만료 후 환불 정책 (라이트)** | 🟠 | 미응시 자동 만료 시 자동 환불 안내 메일만. 자동 환불은 라운드 2 |\n| 시험지 구성 | 문제 끌어오기 (문제 은행 → 시험지) | ✅ | 디자인 자료 (`시험지 등록.png`) |\n| 시험지 구성 | Drag & Drop 문항 정렬 | ✅ | |\n| 시험지 구성 | 배점 일괄 설정 | ✅ | |\n| 시험지 구성 | 시험지 미리보기 (응시자 관점 시뮬) | ✅ | 디자인 자료 (`시험지 등록 미리보기.png`) |\n| 시험지 구성 | 다국어 시험지 동시 운영 | ⏭ | 라운드 4 (Phase 1 = 일본어 단일) |\n\n---\n\n## 2. 평가 및 채점\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 응시자 목록 | 시험별 응시자 리스트 (필터·검색·CSV 다운로드) | ✅ | 디자인 자료 (`응시자 관리 페이지.png`) |\n| 응시자 목록 | 통계 사이드바 (응시·통과·미통과·등급별) | ✅ | 디자인 자료 |\n| 응시자 상세 | 응시자별 답안·녹음·STT·AI 채점 결과 조회 | ✅ | 디자인 자료 (`detail_container.png`) |\n| 응시자 상세 | 녹음 파일 재생 | ✅ | |\n| 응시자 상세 | **답안 초기화** (응시자 재응시 가능하게) | ✅ | 디자인 자료의 버튼 |\n| 응시자 상세 | **결과 공개** (응시자 마이페이지에 노출) | ✅ | 정책 5 |\n| 응시자 상세 | 평가자 코멘트 입력 (수동) | 🟠 | Phase 1는 운영자 수동 텍스트 입력. 매크로·매크로 코멘트는 ⏭ |\n| AI 채점 | AI 1차 채점 자동 (시험 종료 즉시) | ✅ | |\n| AI 채점 | AI STT 결과 확인 및 수동 수정 | 🟠 | 단순 텍스트 수정만. 시간 싱크는 ⏭ |\n| AI 채점 | AI 채점 점수 보정 (운영자가 수동 점수 변경) | ✅ | |\n| 평가자 UI | **3단 분할 뷰** (문제·답안+STT·채점 패널) | ⏭ | Premium 도입 시점 |\n| 평가자 UI | STT 싱크 (텍스트 클릭 → 해당 구간 재생) | ⏭ | |\n| 평가자 UI | 매크로 코멘트 (자주 쓰는 피드백 버튼) | ⏭ | |\n| 평가자 UI | 2인 교차 채점 워크플로우 | ⏭ | Premium |\n\n---\n\n## 3. 회원 및 권한 (★ 회원 목록 신규 메뉴)\n\n> v1 정합 — 서비스 사이트(MaroPass)에서 발생한 가입·결제·환불 데이터가 자동 집계되는 **신규 \"회원 목록\" 메뉴**가 터치클래스 관리자 web에 추가됩니다. 운영자는 단일 화면에서 회원 정보·결제 이력·응시 이력을 함께 확인합니다.\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| **★ 회원 목록 (신규)** | 서비스 사이트 가입·결제·환불 데이터 자동 집계 | ✅ | v1 보고용 핵심 신규. 서비스 사이트 ↔ 관리자 web 데이터 다리 |\n| 회원 목록 | 단일 화면에 회원 정보 · 결제 이력 · 응시 이력 표시 | ✅ | 운영자가 한 화면에서 처리 |\n| 회원 조회 | 회원 리스트 (검색·필터) | ✅ | A3-00 신규 메뉴의 기본 뷰 |\n| 회원 조회 | 회원 상세 (응시 이력·결제 이력·환불 이력) | 🟠 | 결합 통계는 라운드 2 |\n| 회원 관리 | 회원 상태 변경 (활성·정지·휴면) | 🟠 | 활성·정지만. 휴면 자동화는 ⏭ |\n| 회원 관리 | 비밀번호 초기화 (운영자) | ✅ | 임시 PW 발급 |\n| 회원 관리 | 회원 통합 검색 (이메일·이름·연락처) | ✅ | |\n| 관리자 계정 | 관리자 계정 생성·삭제 (KOEN 운영자 계정 포함) | ✅ | KOEN 운영자 계정 별도 발급 |\n| 관리자 권한 | **관리자 등급별 권한 설정** | 🟠 | 1차 오픈은 *관리자 1단계만*. 일반/상위/평가자 분리는 라운드 3 |\n| 관리자 권한 | 권한 매트릭스 UI | ⏭ | 라운드 3 (`12-security.md`) |\n\n---\n\n## 4. 통계 및 분석\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 응시 통계 | 일자별·시험별 응시자 수 | ✅ | |\n| 응시 통계 | 통과율·평균 점수 | ✅ | |\n| 응시 통계 | 등급별 분포 | 🟠 | 기본 카운트만 |\n| 응시 통계 | 응시자 평균 발화 길이·이탈률 | ⏭ | 라운드 2 |\n| 문항 분석 | 문항별 정답률·평균 점수 | 🟠 | 기본 통계만 |\n| 문항 분석 | 문항별 응답 시간 분포 | ⏭ | 라운드 2 |\n| AI 평가 분석 | AI 채점과 운영자 보정의 차이 분석 | ⏭ | 라운드 3 (AI 평가 품질 모니터링) |\n| 매출 분석 | 응시료 매출 리포트 | 🟠 | 1차 오픈 단순 합계만 |\n| 매출 분석 | Upsell 전환율 / 추천 콘텐츠 CTR·CVR | ❌ | 수익 모델 컷 |\n\n---\n\n## 5. 시스템 설정 및 보안\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 콘텐츠 관리 | 인증서 템플릿 관리 (변수 매핑·미리보기) | ✅ | |\n| 콘텐츠 관리 | 이용약관·개인정보처리방침 등록·수정 | ✅ | |\n| 콘텐츠 관리 | 특정상거래법 표시 페이지 관리 | ✅ | 일본 필수 |\n| 콘텐츠 관리 | 공지사항 등록·수정·게시 | ✅ | |\n| 콘텐츠 관리 | FAQ 등록·카테고리 관리 | ✅ | |\n| 콘텐츠 관리 | 메인 배너 등록·노출 순서 | ✅ | |\n| 콘텐츠 관리 | **알림 메일 템플릿 관리** (결제·D-day·만료·결과·환불 5종) | ✅ | 변수 매핑·미리보기 |\n| 콘텐츠 관리 | **SEO·OG 태그 관리** (메인·리스트·상세) | 🟠 | 페이지별 title·description·OG image. 자동화는 라운드 2 |\n| 보안 | 관리자 2-Factor 인증 | ✅ | |\n| 보안 | 활동 로그 (관리자 주요 행동 기록·조회) | 🟠 | 기본 로깅 + 단순 조회. 필터·내보내기는 ⏭ |\n| 보안 | 비밀번호 정책 (복잡도·만료) | 🟠 | 기본 정책만 |\n| 보안 | IP 화이트리스트 | ⏭ | 라운드 3 |\n| 백업 | 자동 백업·복원 | ⏭ | 라운드 3 인프라 |\n\n---\n\n## ★ [향후 핵심] 문제 만들기\n\n> 사용자가 *향후 핵심*이라고 명시한 영역. **1차 오픈은 자료에 잡힌 디자인 수준의 기본 골격**, **라운드 2 이후 LLM 자동 생성·문제 은행 깊이**.\n\n### 1차 오픈 — 5영역 단일 등록 화면 (251020 ver.3 기준)\n\nMaroPass admin은 말하기 전용. 객관식·주관식은 본가 시스템 사용. 문제 등록은 영역 5개 탭 토글로 폼이 동적 변경됨.\n\n| 상세 기능 | Phase 1 | 비고 |\n|---|---|---|\n| 문제 등록 — 5영역 탭 (짧은 문장 읽기·질문 대답·생활 속 대화·그림 설명·화용 과제) | ✅ | `ui-admin-question-create.html` |\n| 영역별 한국어/일본어 지시문 자동 채움 (운영자 수정 보호) | ✅ | KO·JA 분리 입력 |\n| 영역별 시간·배점 자동 디폴트 + 운영자 수정 가능 (권장값 벗어나면 ⚠ 경고) | ✅ | 1차에는 권장값 + 변경 허용 |\n| 영역 1 — 한국어 문장 + 음운 규칙 태그 (연음화·경음화·비음화·격음화·ㅎ탈락·이중모음·겹받침·억양) | ✅ | 음운 태그 다중 선택 |\n| 영역 2 — 질문 텍스트 + 모범 답안 1~5개 (다중) | ✅ | TTS 남/여 + 듣기 버튼 |\n| 영역 3 — 상황 일러스트 + 상대 대사 + 답변 풍선 + 모범 답안 | ✅ | TTS 남/여 (상대 대사 음성) |\n| 영역 4 — 그림/사진 + 설명 주제 + 긴 모범 답안 | ✅ | 이미지 업로드 |\n| 영역 5 — 일본어 상황 설명 + 화행 유형(의뢰·사과·감사·조언·요청) + 모범 답안 | ✅ | 다국어 필드 |\n| 평가 기준 펼침 박스 (영역별 자동 표시 — 발음·어휘문법·내용구성·화용 능력 0~2점 기준) | ✅ | 운영자 참고용 |\n| 응시자 화면 라이브 프리뷰 (모바일 폰 frame, 영역별 mock 분기, 단계 탭, 시나리오 재생) | ✅ | 우측 사이드바 sticky |\n| TTS 스크립트 작성 + 남/여 음성 선택 (음성 자동 생성) | ✅ | |\n| mp3 직접 업로드 (TTS 미사용 시) | ✅ | 고급 펼침 |\n| 등급별 분류 (초급·중상급) + 문제 분류 chip 다중 선택 (10개 카테고리) | ✅ | 인사·소개 / 일상·습관 / 음식·취향 / 취미·여가 / 학습·문화 / 여행·교통 / 쇼핑·소비 / 직장·학교 / 건강·신체 / 감정·표현 |\n| 단일 문항 1개 등록 (23문항 묶음은 시험지 만들기에서) | ✅ | 스코프 명확 |\n| 미리 듣기 (TTS 결과 즉시 재생) | 🟠 | UI만, 실제 TTS 엔진 연결은 라운드 2 |\n\n### 1차 오픈 — 문제 은행 (light)\n\n| 상세 기능 | Phase 1 | 비고 |\n|---|---|---|\n| 문제 은행 등록·검색·삭제 | ✅ | |\n| 문제 은행 카테고리·난이도 필터 | 🟠 | 기본만 |\n| 문제 은행 → 시험지 끌어오기 | ✅ | |\n| 문제 은행 일괄 import (CSV·엑셀) | ⏭ | 라운드 2 |\n| 문제 버전 관리 (히스토리) | ⏭ | 라운드 2 |\n| 문제 사용 통계 (어느 시험에 쓰였는지) | ⏭ | 라운드 2 |\n\n### 라운드 2 — 핵심 깊이 (디자인 미정)\n\n> 사용자가 명시한 **향후 핵심**. 1차 오픈에는 ⏭, 라운드 2에서 깊이 있는 별도 문서로.\n\n| 상세 기능 | 비고 |\n|---|---|\n| **LLM 자동 생성 보조** — 유형·주제·난이도·필수 문법 입력 → ①지문 ②TTS 스크립트 ③모범 답안 ④채점 기준표 자동 생성 | 마스터 문서 핵심 |\n| LLM 결과 에디터 수정 (시각적 비교·편집) | |\n| AI 출제 기준 학습 (재단 측 기준 → 학습 데이터화) | |\n| 채점 기준표 자동 생성·수정 | |\n| 문제 품질 평가 자동화 (응시자 통계 기반) | |\n| 다국어 문제 동시 작성 | |\n\n---\n\n## MaroPass 특수 (한국 LMS 표준에 없던 항목)\n\n| 항목 | 위치 |\n|---|---|\n| 시험 통과 조건 사이드바 (응시자 관리 화면) | 시험 관리 (라운드 2 디자인 발주 필요) |\n| 답안 초기화·결과 공개 워크플로우 | 평가 및 채점 |\n| AI STT 결과 확인·수정 | 평가 및 채점 |\n| TTS 스크립트 + mp3 직접 업로드 (이중 옵션) | 문제 만들기 |\n| 인증서 템플릿 관리 (위변조 검증 URL 매핑) | 시스템 설정 |\n\n---\n\n## DEFERRED 정리\n\n| 영역 | 라운드 2 이후 다룰 곳 |\n|---|---|\n| 평가자 UI 일체 (3단 분할·STT 싱크·매크로·2인 교차) | 라운드 2 (`08-grading.md`) |\n| LLM 자동 생성 보조 + 문제 만들기 깊이 | 라운드 2 (별도 문서 — 향후 핵심) |\n| 응시자 분석 (이탈률·발화 길이·문항별 응답 시간) | 라운드 2 |\n| AI 평가 품질 분석 대시보드 | 라운드 3 |\n| 관리자 등급별 권한 모델 | 라운드 3 (`12-security.md`) |\n| IP 화이트리스트·자동 백업 | 라운드 3 (인프라) |\n| Upsell 전환율·추천 콘텐츠 CTR·CVR | ❌ (수익 모델 컷) |\n| 시험지 일괄 작업 / 시험 복사 / 다국어 시험지 | 라운드 2~4 |\n\n---\n\n## 본 문서가 다루지 않는 것\n\n- 화면 단위 인터랙션 → `05-screen-inventory.md` (관리자 데스크탑 7장 매핑)\n- 사용자 흐름 → `03-user-flows.md`\n- 운영 룰 → `04-policy.md`\n- 권한 모델 상세 → 라운드 3 `12-security.md`\n- LLM 자동 생성 알고리즘·평가 기준표 학습 모델 → 별도 라운드 (향후 핵심)\n"},{"id":"d12","type":"md","src":"07-ia.md","title":"정보 구조 (IA — Information Architecture)","content":"# 정보 구조 (IA — Information Architecture)\n\n> **★ MaroPass portal**(`ui/service-site/`)의 *페이지 계층 + 라벨 + 네비게이션 + 분류 체계*. 디자인 발주 wireframe의 출발점. 사용자 web·관리자 web은 ◇ 기존 터치클래스 자산을 그대로 활용하므로 본 문서가 다루지 않는다.\n\n## 한 줄\n\n**MaroPass portal의 모든 페이지가 *시험 → 결제 → 응시 진입(사용자 web 새 창) → 결과 확인(사용자 web) → 인증서·PDF 다운로드(portal)* 한 흐름으로 흐르도록, 다른 콘텐츠는 보조 위치에 배치한다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 1차 오픈의 한 동선(가입 → 접수 → 결제 → 응시 → 결과 → 인증서)이 매출과 사용자 가치 모두의 핵심이므로 portal의 모든 페이지가 이 흐름의 진입·복귀를 지원해야 한다.\n2. **portal과 사용자 web을 새 창으로 분리**(정책 10)하기 때문에, portal IA는 사용자 web 진입(응시하기)과 복귀(결과 보기·PDF 다운로드) 동선을 명확히 노출해야 한다.\n3. 한국 LMS 표준 GNB(시험·이용권·고객센터·마이페이지) 4메뉴를 *이용권 제외*해 3메뉴로 줄여야 1차 오픈 light 정합성이 유지된다.\n4. 모바일은 하단 탭이 엄지 접근성에 유리하고, 데스크탑은 상단 GNB가 표준이므로 디바이스별로 글로벌 네비게이션을 분리한다. 1차 오픈은 웹만(앱은 라운드 2).\n5. 라벨은 일본어 1차로 박되 한국어 매핑(시험 콘텐츠용)을 별도로 두면, i18n 분기 코드와 디자인 발주 사양이 흔들리지 않는다.\n\n---\n\n## 1. IA 원칙 5개\n\n| # | 원칙 | 의미 |\n|---|---|---|\n| 1 | **단일 동선 우선** | 시험·응시·결과·인증서가 메인 경로. 다른 모든 페이지는 보조 |\n| 2 | **2클릭 룰** | 메인 행동(응시 시작·결과 확인)은 어디서든 2클릭 이내 도달 |\n| 3 | **셋오프 레이아웃** | 회원/계정 영역은 우상단 셋오프. 핵심 GNB는 콘텐츠 중심 |\n| 4 | **모바일 하단 탭 / 데스크탑 상단 GNB** | 디바이스별 표준 패턴 분리. 동일 라벨·동일 진입 동선 유지 |\n| 5 | **라벨 일본어 1차** | UI 라벨 = 일본어, 시험 콘텐츠 영역(`:lang(ko)`)만 한국어 |\n\n---\n\n## 2. 글로벌 네비게이션\n\n### 2.1 데스크탑 GNB (상단)\n\n```\n┌───────────────────────────────────────────────────────────────┐\n│ [로고]   試験一覧   マイページ   サポート     [로그인/プロフィール]│\n└───────────────────────────────────────────────────────────────┘\n       └─ 좌측 정렬 ──┘  └─ 중앙 핵심 GNB 3개 ─┘  └─ 우상단 셋오프 ─┘\n```\n\n| 위치 | 일본어 (가설) | 진입 |\n|---|---|---|\n| 좌측 | 로고 | `/` (홈) |\n| 중앙 | **試験一覧** | `/tests` |\n| 중앙 | **マイページ** | `/me` |\n| 중앙 | **サポート** | `/support` (FAQ + 1:1) |\n| 우상단 | (비로그인) ログイン / 会員登録 | `/signin`, `/signup` |\n| 우상단 | (로그인) 프로필 아바타 + 드롭다운 | 마이페이지·로그아웃 |\n\n### 2.2 모바일·앱 하단 탭 (4개)\n\n```\n┌────────────────────────────────────────────┐\n│              (콘텐츠 영역)                  │\n├────────────┬────────────┬───────┬──────────┤\n│  ホーム    │  試験     │ マイ   │ サポート│\n│  Lucide    │  Lucide    │ Lucide│ Lucide   │\n│  Home      │  ListChecks│ User  │ HelpCircle│\n└────────────┴────────────┴───────┴──────────┘\n```\n\n| 탭 | 일본어 (가설) | 진입 | 활성 색 |\n|---|---|---|---|\n| 1 | **ホーム** | `/` | `blue-500` 아이콘 + `grey-900` 라벨 |\n| 2 | **試験** | `/tests` | 동일 |\n| 3 | **マイ** | `/me` | 동일 |\n| 4 | **サポート** | `/support` | 동일 |\n\n> **회원가입·로그인**은 모바일에서도 우상단 셋오프(또는 헤더 우측). 하단 탭에 넣지 않음.\n\n### 2.3 푸터 (모바일·데스크탑 공통)\n\n| 영역 | 항목 |\n|---|---|\n| 정책 | 이용약관 / 개인정보처리방침 / **特定商取引法** (일본 필수) |\n| 회사 정보 | 사업자 정보 |\n| SNS | X / Instagram / YouTube (현 TOPIK JP 사이트 패턴) |\n| 플로팅 (모든 페이지) | [문의·FAQ] 버튼 — 우하단 |\n\n---\n\n## 3. 페이지 인벤토리 + 라벨\n\n| 경로 | 일본어 라벨 (가설) | 한국어 (내부) | 진입 깊이 |\n|---|---|---|---|\n| `/` | ホーム | 홈 | L0 |\n| `/about` | サービス紹介 | 서비스 소개 | L1 |\n| `/tests` | 試験一覧 | 시험 목록 | L1 |\n| `/tests/:slug` | 試験詳細 | 시험 상세 | L2 |\n| `/signin` | ログイン | 로그인 | L1 |\n| `/signup` | 会員登録 | 회원가입 | L1 |\n| `/password-reset` | パスワード再設定 | 비밀번호 재설정 | L2 |\n| `/find-account` | アカウント検索 | 계정 찾기 | L2 |\n| `/checkout/:cartId` | 決済 | 결제 | L2 |\n| `/checkout/return` | 決済完了 | 결제 완료 | L3 |\n| `/checkout/fail` | 決済失敗 | 결제 실패 | L3 |\n| (외부, 새 창) | 試験受験 | 시험 응시 — ◇ 터치클래스 사용자 web 도메인 (`window.open()`) | L2 (전체화면) |\n| `/me` | マイページ | 마이페이지 (대시보드) | L1 |\n| `/me/tests` | 受験する試験 | 응시할 시험 | L2 |\n| `/me/tests/:id` | 試験詳細 (マイ) | 마이 시험 상세 | L3 |\n| `/me/results` | 結果一覧 | 결과 목록 | L2 |\n| `/me/results/:id` | 結果詳細 | 결과 상세 | L3 |\n| `/me/certificates` | 証明書 | 인증서 | L2 |\n| `/me/payments` | 決済履歴 | 결제 내역 | L2 |\n| `/me/refunds` | 返金 | 환불 | L2 |\n| `/me/profile` | プロフィール | 회원정보 | L2 |\n| `/me/withdraw` | 退会 | 회원 탈퇴 | L3 |\n| `/me/inquiries` | お問い合わせ履歴 | 1:1 문의 내역 | L2 |\n| `/support` | サポート | 고객센터 | L1 |\n| `/support/notice` | お知らせ | 공지사항 | L2 |\n| `/support/faq` | よくある質問 | FAQ | L2 |\n| `/support/contact` | お問い合わせ | 1:1 문의 작성 | L2 |\n| `/terms` | 利用規約 | 이용약관 | L2 |\n| `/privacy` | プライバシーポリシー | 개인정보처리방침 | L2 |\n| `/commerce-disclosure` | 特定商取引法に基づく表記 | 특정상거래법 표시 | L2 |\n| `/404`, `/500` | (시스템) | 에러 | — |\n\n> 일본어 라벨은 **가설**. 일본어 네이티브 검수 필요 (라운드 2 디자인 발주 시 동시 진행).\n\n---\n\n## 4. 페이지별 콘텐츠 블록 (디자인 발주 wireframe 출발점)\n\n### 4.1 홈 `/`\n\n```\n┌─ Hero 메인 배너 (롤링) ─────────────────┐\n│  3~5장, autoplay 5s, dot indicator        │\n└──────────────────────────────────────────┘\n┌─ TOPIK과의 관계 안내 ───────────────────┐\n│  보완·진단 포지셔닝 1 paragraph + CTA    │\n└──────────────────────────────────────────┘\n┌─ 추천 시험 (3~6장 카드) ────────────────┐\n│  베스트·신규·인기 라벨                   │\n└──────────────────────────────────────────┘\n┌─ 서비스 소개 (AI 평가 방식) ────────────┐\n│  3 columns: AI 채점 / 환경 점검 / 인증서 │\n└──────────────────────────────────────────┘\n┌─ FAQ 발췌 (5~8개) ──────────────────────┐\n│  Accordion 또는 카드                     │\n└──────────────────────────────────────────┘\n```\n\n### 4.2 시험 상세 `/tests/:slug`\n\n```\n┌─ 시험 헤로 ─────────────────────────────┐\n│  표지 이미지 + 시험명 + 가격 + CTA       │\n└──────────────────────────────────────────┘\n┌─ 좌: 콘텐츠 / 우: 구매 사이드바 (sticky) ┐\n│ ┌─────────────┐  ┌──────────────────┐  │\n│ │시험 소개     │  │ 가격             │  │\n│ │문항 구성     │  │ 응시 기간 (14일) │  │\n│ │기대 효과     │  │ 응시 시간        │  │\n│ │샘플 문항     │  │ 응시 환경        │  │\n│ │AI 평가 방식  │  │ [購入する]       │  │\n│ └─────────────┘  └──────────────────┘  │\n└──────────────────────────────────────────┘\n모바일: sticky CTA 하단 고정\n```\n\n### 4.3 마이페이지 대시보드 `/me`\n\n```\n┌─ 환영 인사 + 진행 중 시험 알림 ─────────┐\n│  최근 결과 발표·미응시 시험 D-day 표시   │\n└──────────────────────────────────────────┘\n┌─ 빠른 진입 (4 카드) ────────────────────┐\n│  受験する  / 結果   / 証明書 / 決済履歴  │\n└──────────────────────────────────────────┘\n┌─ 응시 가능한 시험 (리스트) ─────────────┐\n│  14일 윈도우 D-day 표시                  │\n│  [応시하기] CTA — 데스크탑/앱 분기 안내  │\n└──────────────────────────────────────────┘\n┌─ 최근 결과 (1~3장) ─────────────────────┐\n│  점수·등급·결과 보기 CTA                 │\n└──────────────────────────────────────────┘\n```\n\n### 4.4 결과 화면 `/me/results/:id`\n\n```\n┌─ 헤더 (시험명·응시일·종합 등급) ─────────┐\n└──────────────────────────────────────────┘\n┌─ 종합 점수 (Display 30px+) ─────────────┐\n│  30점 / 200점 만점 + 1~6급 등급 (GAP-01) │\n└──────────────────────────────────────────┘\n┌─ 5각 레이더 차트 ───────────────────────┐\n│  발음·유창성·어휘·문법·내용 구성         │\n└──────────────────────────────────────────┘\n┌─ AI 종합 피드백 (코멘트 1~2단락) ───────┐\n└──────────────────────────────────────────┘\n┌─ 문항별 점수 + AI 피드백 진입 (리스트) ─┐\n│  각 문항 행: 점수 + [Ai 피드백] 모달     │\n└──────────────────────────────────────────┘\n┌─ CTA ──────────────────────────────────┐\n│  [証明書ダウンロード] [問題を見直す]      │\n│  (재응시는 시스템 장애 케이스만 — 정책 6) │\n└──────────────────────────────────────────┘\n```\n\n---\n\n## 5. 분류 체계 (Taxonomy)\n\n### 5.1 시험 카테고리\n\n| 분류 축 | 값 (Phase 1) |\n|---|---|\n| **레벨** | 초급 (Beginner, TOPIK I 수준) / 중상급 (Intermediate-Advanced, TOPIK II 수준) |\n| **영역** | 말하기 (Phase 1 단독) |\n| (라운드 2) 영역 확장 | 쓰기 / 듣기 / 읽기 — Phase 1 미적용 |\n\n### 5.2 고객센터 카테고리\n\n| 카테고리 | 일본어 라벨 (가설) |\n|---|---|\n| 결제·환불 | 決済・返金 |\n| 응시 환경·기술 | 受験環境・技術 |\n| 시험 콘텐츠 | 試験コンテンツ |\n| 인증서·결과 | 証明書・結果 |\n| 회원·계정 | 会員・アカウント |\n\n> FAQ 게시판·1:1 문의 작성 폼 모두 이 5개 분류로 시작.\n\n---\n\n## 6. 마이페이지 정보 구조 (트리)\n\n```\nマイページ (/me)\n├── ① 대시보드 — 진입 시 기본 화면\n├── ② 受験する試験 (/me/tests)\n│   └── 試験詳細 (/me/tests/:id)\n├── ③ 結果 (/me/results)\n│   └── 結果詳細 (/me/results/:id)\n├── ④ 証明書 (/me/certificates)\n├── ⑤ 決済履歴 (/me/payments)\n├── ⑥ 返金 (/me/refunds)\n├── ⑦ プロフィール (/me/profile)\n│   └── 退会 (/me/withdraw)\n└── ⑧ お問い合わせ履歴 (/me/inquiries)\n```\n\n### 좌측 사이드바 메뉴 그룹 (데스크탑)\n\n| 그룹 | 항목 |\n|---|---|\n| **試験・結果** | 受験する試験 / 結果 / 証明書 |\n| **決済** | 決済履歴 / 返金 |\n| **アカウント** | プロフィール / 退会 |\n| **サポート** | お問い合わせ履歴 |\n\n> 모바일은 1단 리스트, 동일 그룹 헤더로 시각적 구분.\n\n---\n\n## 7. 라벨 사전 (가설, 일본어 네이티브 검수 필요)\n\n### 7.1 액션·상태 라벨\n\n| 한국어 (내부) | 일본어 가설 | 비고 |\n|---|---|---|\n| 응시하기 | **受験する** | CTA |\n| 시험 시작 | **試験開始** | 응시 클라이언트 진입 버튼 |\n| 다시 응시 | **再受験** | 시스템 장애 케이스 한정 (정책 6) |\n| 결제 | **決済** | |\n| 결제하기 | **購入する** / **お支払い** | 후자가 일본 EC 표준 (검토) |\n| 환불 | **返金** | |\n| 환불 신청 | **返金申請** | |\n| 인증서 | **証明書** | 또는 **認定証** (검토) |\n| 인증서 다운로드 | **証明書ダウンロード** | |\n| 채점 | **採点** | |\n| 결과 발표 | **結果発表** | |\n| 결과 공개 (관리자) | **結果公開** | 백오피스 |\n| 답안 초기화 (관리자) | **回答リセット** | 백오피스 |\n| 응시 윈도우 | **受験可能期間** | D-day 표시 |\n| 시험 시간 | **試験時間** | |\n| 준비 시간 | **準備時間** | 응시 화면 |\n| 녹음 시간 | **録音時間** | 응시 화면 |\n| 녹음 중 | **録音中** | |\n| 마이크 테스트 | **マイクテスト** | |\n| 환경 점검 | **動作環境チェック** | |\n\n### 7.2 컨텐츠·메뉴 라벨\n\n| 한국어 (내부) | 일본어 가설 | 비고 |\n|---|---|---|\n| 시험 목록 | **試験一覧** | |\n| 시험 상세 | **試験詳細** | |\n| 시험 소개 | **試験について** | |\n| 문항 구성 | **問題構成** | |\n| 기대 효과 | **期待される効果** | |\n| 샘플 문항 | **サンプル問題** | |\n| 합격 기준 | **合格基準** | |\n| 응시 가능 기간 | **受験可能期間** | |\n| 마이페이지 | **マイページ** | |\n| 응시할 시험 | **受験する試験** | |\n| 결과 | **結果** | |\n| 결제 내역 | **決済履歴** | |\n| 회원정보 | **プロフィール** | |\n| 회원 탈퇴 | **退会** | |\n| 1:1 문의 | **お問い合わせ** | |\n| 1:1 문의 내역 | **お問い合わせ履歴** | |\n| 공지사항 | **お知らせ** | |\n| 자주 묻는 질문 | **よくある質問** (FAQ) | |\n| 이용약관 | **利用規約** | |\n| 개인정보처리방침 | **プライバシーポリシー** | |\n| 특정상거래법 표시 | **特定商取引法に基づく表記** | 일본 필수 |\n| 사업자 정보 | **会社情報** | |\n\n### 7.3 등급·점수 라벨\n\n| 한국어 (내부) | 일본어 가설 | 비고 |\n|---|---|---|\n| 1급 ~ 6급 | **1級 ~ 6級** | (GAP-01 결정 후 확정) |\n| 등급 | **等級** | |\n| 종합 등급 | **総合等級** | |\n| 점수 | **点数** | |\n| 만점 | **満点** | |\n| 평균 | **平均** | |\n| 통과 | **合格** | |\n| 미통과 | **不合格** | |\n| 응시 | **受験** | |\n| 채점 중 | **採点中** | |\n| 답변 | **回答** | |\n\n---\n\n## 8. 본 문서가 다루지 않는 것\n\n- 화면 단위 인터랙션·버튼 위치 → `05-screen-inventory.md` + 디자인 발주\n- 사용자 시나리오·플로우 → `03-user-flows.md`\n- 디자인 토큰·컴포넌트 → `08-design-system.md`\n- **◇ 터치클래스 사용자 web IA** (응시 home·본인 확인·환경 점검·응시 클라이언트·결과 화면) — 기존 터치클래스 자산 그대로 활용. MaroPass 추가분만 `06-feature-spec.md` 섹션 6에 기술\n- **◇ 터치클래스 관리자 web IA** — 기존 터치클래스 자산 그대로 활용. MaroPass 메뉴 5개 + 말하기 5영역 탭만 `06-admin-feature-spec.md`에 기술\n- 검색 엔진·SEO 메타 데이터 → 라운드 3\n\n## 9. 후속 액션\n\n| 액션 | 담당 | 시점 |\n|---|---|---|\n| 일본어 라벨 네이티브 검수 | 외부 검수자 | 라운드 2 디자인 발주 동시 |\n| 페이지별 wireframe | 디자인팀 | 라운드 2 |\n| 콘텐츠 블록 데이터 모델 매핑 | 개발팀 | 라운드 3 (`09-data-model.md`) |\n| GAP-01 등급 결정 후 등급 라벨 확정 | 한국교육재단 | Critical 결정 후 |\n"},{"id":"d13","type":"md","src":"08-design-system.md","title":"디자인 시스템","content":"# 디자인 시스템\n\n> 외부 베이스 디자인 자료(`newinDESIGN.md`)를 참조하되, 일본 시장·시험 UI·1차 오픈 light에 맞게 정정한 MaroPass 디자인 시스템.\n\n## 한 줄\n\n**MaroPass 시각 언어는 *calm·optimistic·trustworthy* 톤을 채택하되, 폰트는 일본어 우선·시험 UI 토큰을 추가·fintech 전용 요소는 뺀다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 차분·신뢰·안정 톤은 일본인 학습자가 시험에서 원하는 *예측 가능성*과 정확히 일치한다.\n2. `#2e84ff` 블루는 학습·진단 도메인에도 어울리는 중립적 신뢰 컬러다.\n3. fintech 전용 요소(Tabular numerals·장식 이모지 폰트·super-compact density)는 시험 UI에 의미가 없거나 반대로 작용하므로 뺀다.\n4. 일본 시장은 폰트 가독성에 특히 민감하므로, 일본어 폰트를 1순위로 두고 한국어 시험 콘텐츠는 별도 lang 분기로 처리한다.\n5. Phase 1 light에서는 *primitive → semantic* 2-tier 토큰만으로 충분하고, *component-level* 토큰은 라운드 2 이후 디자인 발주 시 채운다.\n\n---\n\n## 1. Visual Theme\n\n**Calm · Optimistic · Trustworthy**.\n\n- 흰 캔버스(`#ffffff`) + 짙은 차콜 헤딩(`#191f28`) + Primary Blue(`#2e84ff`) 인터랙션 컬러\n- 그림자 최소화, 컬러 대비로 위계 표현\n- 일본인 학습자의 *안정성·명확성·예측 가능성* 선호와 정합\n\n## 2. Color Palette\n\n### Primary\n| 토큰 | 값 | 용도 |\n|---|---|---|\n| `blue-500` | `#2e84ff` | **Primary CTA**, 링크, 활성 상태, 선택 하이라이트 |\n| `blue-600` | `#2272eb` | Hover/Pressed |\n| `blue-50` | `#e8f3ff` | Informational 배경, 선택된 카드 |\n\n### Background & Text\n| 토큰 | 값 | 용도 |\n|---|---|---|\n| `background` | `#ffffff` | 페이지·카드 |\n| `surface` | `#f9fafb` | grey-50, 보조 배경 |\n| `text-heading` | `#191f28` | grey-900, 헤딩 |\n| `text-body` | `#6b7684` | grey-600, 본문 |\n| `text-caption` | `#8b95a1` | grey-500, 보조 |\n| `text-placeholder` | `#b0b8c1` | grey-400 |\n\n### Border\n| 토큰 | 값 | 용도 |\n|---|---|---|\n| `border-default` | `#e5e8eb` | grey-200 |\n| `border-strong` | `#d1d6db` | grey-300, 활성 입력 |\n\n### Semantic\n| 토큰 | 값 | 용도 |\n|---|---|---|\n| `success` | `#03b26c` | 성공·통과·정답 |\n| `error` | `#f04452` | 오류·실패·녹음 중 (빨간 타이머) |\n| `warning` | `#fe9800` | 주의·환경 점검 미통과 |\n| `info` | `#18a5a5` | 정보 강조 |\n\n### MaroPass 특수 — 시험 UI 전용\n\n| 토큰 | 값 | 용도 |\n|---|---|---|\n| `timer-prep` | `#2e84ff` (blue-500) | **준비 시간** 카운트다운 |\n| `timer-record` | `#f04452` (red-500) | **녹음 시간** 카운트다운 + \"녹음 중\" 인디케이터 |\n| `beep` | `#ef4444` | 비프음 시점 강조 (짧은 플래시) |\n| `waveform-base` | `#fda4af` (red-300) | Waveform 도트 비활성 |\n| `waveform-active` | `#f04452` (red-500) | Waveform 도트 활성 |\n| `grade-1` ~ `grade-6` | (색상 매핑 미정 — GAP-01 결정 후) | 1~6급 또는 A~D 등급 배지 |\n| `radar-axis` × 5 | (5각 차트 — 발음·유창성·어휘·문법·내용 구성 컬러 매핑 미정) | 결과 화면 |\n\n> 등급·5각 차트 색상은 GAP-01(등급 체계) 결정 후 확정.\n\n---\n\n## 3. Typography\n\n### Font Stack — 일본어 우선, 한국어 콘텐츠 분리\n\n```\n/* UI 기본 (일본어) */\nfont-family: \"Noto Sans JP\", \"Hiragino Sans\", \"Hiragino Kaku Gothic ProN\",\n             \"Yu Gothic\", \"Meiryo\", -apple-system, BlinkMacSystemFont,\n             \"Helvetica Neue\", Arial, sans-serif;\n\n/* 한국어 시험 콘텐츠 */\n:lang(ko), .lang-ko {\n  font-family: \"Noto Sans KR\", \"Apple SD Gothic Neo\", \"Malgun Gothic\",\n               -apple-system, sans-serif;\n}\n\n/* 모노스페이스 (점수·시간 표기) */\nfont-family: \"SF Mono\", SFMono-Regular, Menlo, Consolas, monospace;\n```\n\n> Toss의 *Toss Product Sans*는 한국어·라틴 최적화 전용 폰트라 일본어 가독성에 부적합. 일본어용으로 **Noto Sans JP**를 1순위로 둔다.\n\n### Hierarchy (Toss 기반, 일부 정정)\n\n| Role | Size | Weight | Line Height | 용도 |\n|---|---|---|---|---|\n| Display | 30px | 700 | 1.33 | 시험 결과 점수 (예: `30점`) |\n| Heading L | 26px | 700 | 1.38 | 페이지 타이틀 |\n| Heading | 22px | 700 | 1.36 | 섹션 헤딩 |\n| Subtitle | 20px | 600 | 1.40 | 카드 제목 |\n| Body L | 16px | 400 | 1.50 | 본문 (시험 지시문 등) |\n| Body | 14px | 400 | 1.57 | 표준 본문 |\n| Caption | 13px | 400 | 1.54 | 보조 정보·시간 |\n| Tiny | 12px | 400 | 1.50 | 타임스탬프·미세 |\n\n### 원칙\n- 5 weight만 사용: 400 / 600 / 700 (+ 500은 아이콘 라벨용 옵션)\n- **Tabular numerals 사용 안 함** — Toss는 fintech라 사용하지만 MaroPass 시험 점수에는 변별력 없음\n- **일본어/한국어 동시 렌더링 시 라인 높이 1.5+ 유지** (받침 잘림 방지)\n- 시험 점수 (예: `30 / 200`)는 Display + 700 + 모노스페이스로 가독성 확보\n\n---\n\n## 4. Components\n\n### Button\n| Variant | 배경 | 테두리 | 텍스트 | Radius |\n|---|---|---|---|---|\n| Primary | `blue-500` | `blue-500` | 흰색, 600 | 8px |\n| Secondary | 투명 | `border-default` | `text-heading`, 600 | 8px |\n| Ghost | 투명 | 없음 | `blue-500`, 600 | 8px |\n| Destructive | `error` | `error` | 흰색, 600 | 8px |\n| Disabled | opacity 0.5 | (유지) | (유지) | 8px |\n\n- Padding: `8px 16px` (default), `12px 20px` (large), `6px 12px` (compact)\n- 시험 화면의 *제출* 버튼은 Large + Primary\n- 환경 점검 *마이크 테스트* 버튼은 Large + Primary, 5초 카운트다운 후 *Replay* 변환\n\n### Input\n- Background: `surface` (`#f9fafb`) for filled / `background` for outlined\n- Border: 1px `border-default` → focus 2px `blue-500`\n- Radius: 8px\n- Error: 2px `error` 테두리 + 13px 에러 텍스트\n- 비밀번호·OTP·이메일 인증 코드는 별도 SplitTextField 컴포넌트\n\n### Card\n- Background: `background`\n- Border: 1px `border-default` 또는 무테두리\n- Radius: 12px (표준), 16px (피처드)\n- Shadow: `0 2px 8px rgba(0,0,0,0.06)` 또는 무그림자\n- 시험 안내 모달·문항 카드·결과 카드 모두 Card\n\n### Dialog (모달)\n- Background: `background`\n- Radius: 16px\n- Width: 모바일 360px / 데스크탑 480px\n- 환경 점검·재응시·결과 공개·환불 신청 모두 Dialog 또는 Bottom Sheet\n\n### Bottom Sheet (모바일·앱)\n- Background: `background`\n- Top Radius: 16px\n- 모바일에서 Dialog 대신 Bottom Sheet 우선\n\n### Badge / Chip\n- Radius: 9999px (pill)\n- Padding: `2px 8px`\n- 등급 배지·상태 배지(준비중·진행중·완료)·우선순위 배지\n\n### Waveform Indicator (MaroPass 특수)\n- 4 도트 가로 배열 (자료의 `녹음중-2.png` 기준)\n- 비활성: `waveform-base`\n- 활성: `waveform-active`\n- 애니메이션: 펄스 250ms 시계 반대 방향\n\n### Timer (MaroPass 특수)\n- **Prep Timer**: `timer-prep` 컬러 + `MM:SS` 모노스페이스 + 시계 아이콘 (Lucide `Timer`)\n- **Record Timer**: `timer-record` 컬러 + `MM:SS` + 마이크 아이콘 (Lucide `Mic`)\n\n---\n\n## 5. Layout\n\n### Spacing\n- Base unit: 8px\n- 사용 값: 4, 8, 12, 16, 20, 24, 32, 40, 48, 64\n- 가로 패딩: 데스크탑 32px, 태블릿 24px, 모바일 20px\n- 시험 화면은 *breathing room* 우선 — Toss의 fintech compact density 아님\n\n### Breakpoints\n| 이름 | 너비 | 키 변화 |\n|---|---|---|\n| Mobile | <768px | 1단 스택, Bottom Sheet, 하단 탭 |\n| Tablet | 768~1023 | 1단 / 일부 2단, Sticky CTA |\n| Desktop | ≥1024 | **응시 화면 2단 (좌:문제 / 우:응시)**, 사이드바 메뉴 |\n| Wide | ≥1440 | 콘텐츠 max-width 1280px 중앙 정렬 |\n\n### Touch Targets (모바일·앱)\n- 최소 44×44px (iOS HIG) / 48×48px (Material)\n- Bottom Sheet 닫기 영역 56px\n\n### 시험 응시 — 데스크탑 2단 레이아웃\n\n```\n┌──────────────────────────────────────────────┐\n│ Header (시험명·진행 N/M·전체 타이머·종료 X)   │ 56px\n├────────────────────────┬─────────────────────┤\n│                        │                     │\n│  좌: 문제 영역          │  우: 응시 영역        │\n│  - 지시문 텍스트         │  - 상태 메시지        │\n│  - 이미지/오디오         │  - 타이머 (준비/녹음) │\n│  - 자료                │  - 녹음 인디케이터    │\n│  - 폰트 크기 조절       │  - 메모장            │\n│  ~60% width            │  ~40% width         │\n│                        │                     │\n└────────────────────────┴─────────────────────┘\n```\n\n### 시험 응시 — 모바일 1단\n\n```\n┌──────────────────────────┐\n│ Header                   │\n├──────────────────────────┤\n│ 지시문 카드               │\n├──────────────────────────┤\n│ 콘텐츠 (이미지/오디오)    │\n├──────────────────────────┤\n│ 타이머 + 인디케이터       │\n├──────────────────────────┤\n│ 메모장 (접힘 가능)        │\n└──────────────────────────┘\n```\n\n---\n\n## 6. Depth & Elevation\n\n| Level | Shadow | 용도 |\n|---|---|---|\n| Flat | 없음 | 페이지·인라인 요소 |\n| Subtle | `0 1px 3px rgba(0,0,0,0.06)` | 리스트 분리·카드 |\n| Standard | `0 2px 8px rgba(0,0,0,0.08)` | 콘텐츠 패널·환경 점검 카드 |\n| Elevated | `0 4px 12px rgba(0,0,0,0.12)` | 드롭다운·플로팅 |\n| Modal | `0 8px 24px rgba(0,0,0,0.16)` | 다이얼로그·바텀시트 |\n\n> **시험 화면**은 Subtle 이상 사용 금지. 응시자가 시각 노이즈에 분산되지 않도록.\n\n## 7. Iconography\n\n- **단일 라이브러리**: **Lucide React** (1,400+ 아이콘, 24×24 그리드, tree-shakeable)\n- 사이즈: 인라인 16px / 버튼 18px / 단독 24px / 피처 32~48px\n- Stroke width: **1.75px** (Toss 기본값보다 약간 강함, 시험 가독성 우선)\n- `currentColor` 상속 — 색상 하드코딩 금지\n\n### 핵심 아이콘 매핑\n\n| 용도 | Lucide |\n|---|---|\n| 마이크 | `Mic`, `MicOff` |\n| 타이머 | `Timer`, `TimerReset` |\n| 재생/녹음 | `Play`, `Pause`, `Disc` |\n| 시험 결과 | `Award`, `Trophy` |\n| 인증서 | `FileText`, `BadgeCheck` |\n| 결제 | `CreditCard`, `Receipt` |\n| 알림 | `Bell` (1차 오픈은 이메일만이라 미사용 가능) |\n| 상태 | `CheckCircle2`, `XCircle`, `AlertTriangle` |\n\n> Toss의 Tossface 이모지는 **사용 금지**. 일본 시장 톤·가독성 정합성 모두에서 부적합.\n\n---\n\n## 8. Do's & Don'ts\n\n### Do\n- 모든 인터랙티브 요소에 `blue-500` 사용\n- 응시 화면은 *breathing room* 우선 (Toss fintech compact density 미적용)\n- 일본어 폰트 1순위, 한국어 콘텐츠는 `:lang(ko)` 분기\n- 시험 점수는 Display + 700 + 모노스페이스\n- 그림자는 단일 레이어, 검정 + 낮은 opacity\n\n### Don't\n- Tabular numerals는 사용 안 함 (시험 점수는 비교 정렬이 핵심이 아님)\n- Tossface·이모지 일체 사용 금지\n- 7px 미만의 마이크로 텍스트 금지\n- 빨강(`#f04452`)을 *녹음 중* 외 다른 강조에 쓰지 않기\n- 그림자 색상에 색조 추가 금지\n\n---\n\n## 9. i18n — 다국어 지원 아키텍처\n\n> **두 트랙**: (1) **UI 라벨·메시지·버튼** = 사용자 언어 (일본어 메인 / 한국어 검토용) / (2) **시험 콘텐츠** = 한국어 고정 (UI 토글과 무관).\n\n### 9.1 라이트 i18n 구조 (Phase 1)\n\n| 항목 | 결정 |\n|---|---|\n| **기본 locale** | `ko` (개발·기획 단계) → `ja` (서비스 개시 시 전환) |\n| **지원 locale** | `ko`, `ja` (Phase 1) — `en` 등은 라운드 3 이후 |\n| **locale 코드** | BCP 47 — `ko`, `ja`, `en` (지역 코드 미사용 — `ko-KR`/`ja-JP` 분리 불필요) |\n| **fallback** | `ja` → `ko` → 키 그대로 표시 |\n| **저장 위치** | `<html lang=\"ko|ja\">` + 사용자 설정 localStorage |\n| **번역 파일** | Phase 1: 단일 JS 객체 (`i18n.ko = {...}`, `i18n.ja = {...}`) / 라운드 3: JSON 분리 |\n| **키 네이밍** | `섹션_의미` 패턴 — `nav_tests`, `auth_login`, `exam_record_time`, `result_grade` |\n| **시험 콘텐츠 마킹** | `<element lang=\"ko\">` — 토글 영향 받지 않음, 자동 폰트 분기 |\n\n### 9.2 콘텐츠 종류별 처리\n\n| 콘텐츠 종류 | locale | 비고 |\n|---|---|---|\n| UI 라벨·버튼·메시지 | `i18n[locale]` 사전 | 토글 대상 |\n| 시험 지시문·문제 텍스트 | `lang=\"ko\"` 고정 | 토글 무관, Noto Sans KR |\n| 시험 안내·합격 기준 | UI 사전 | 일본어 메인 |\n| AI 종합 피드백 | `lang=\"ko\"` 고정 (GAP-10) | 한국어 콘텐츠 |\n| 인증서 PDF | UI 사전 (헤더) + `lang=\"ko\"` (점수·내용) | 병기 |\n| 약관·개인정보 | UI 사전 | 일본 법적 — 일본어 정문 필요 |\n\n### 9.3 폰트 스위칭\n\n```css\nhtml { font-family: \"Noto Sans JP\", \"Hiragino Sans\", \"Yu Gothic\", sans-serif; }\nhtml[lang=\"ko\"] { font-family: \"Noto Sans KR\", \"Apple SD Gothic Neo\", sans-serif; }\n[lang=\"ko\"] { font-family: \"Noto Sans KR\", \"Apple SD Gothic Neo\", sans-serif; } /* 인라인 한국어 콘텐츠 */\n```\n\n### 9.4 i18n 함수 시그니처 (라이트 버전)\n\n```js\nconst i18n = {\n  ko: { nav_tests: '시험 목록', exam_take: '응시하기', ... },\n  ja: { nav_tests: '試験一覧', exam_take: '受験する', ... }\n};\nlet locale = localStorage.getItem('kopass_locale') || 'ko';\n\nfunction t(key) {\n  return i18n[locale]?.[key] ?? i18n.ko?.[key] ?? key;\n}\nfunction setLocale(loc) {\n  locale = loc;\n  localStorage.setItem('kopass_locale', loc);\n  document.documentElement.lang = loc;\n  document.querySelectorAll('[data-i18n]').forEach(el => {\n    el.textContent = t(el.getAttribute('data-i18n'));\n  });\n}\n```\n\n### 9.5 날짜·시간·숫자·통화 포맷\n\n| 항목 | 패턴 |\n|---|---|\n| 날짜 | `Intl.DateTimeFormat(locale).format(date)` — 한국어 *2026년 5월 7일* / 일본어 *2026年5月7日* |\n| 시간 | 24시간 표기 통일 — `00:13:24` |\n| 점수 | `획득점/만점` — `30/200` (locale 무관) |\n| 통화 | `Intl.NumberFormat('ja-JP', {style:'currency', currency:'JPY'}).format(value)` — `¥4,950` (1차 오픈은 엔화 단일) |\n| 시험 시간 (분) | UI 사전의 `unit_minutes` 키 사용 — `25분` / `25分` |\n\n### 9.6 라운드 3 확장 (`11-i18n.md`)\n\n- 번역 JSON 분리 (`locales/ko.json`, `locales/ja.json`)\n- 플루럴 룰 (`Intl.PluralRules`)\n- RTL 대비 (현재 없음)\n- 다국어 메일 템플릿\n- URL 전략 (서브도메인 `ja.kopass.jp` vs 패스 `/ja/` vs 쿠키)\n- 외부 번역 워크플로우 (Crowdin / Lokalise 등)\n- 시험 콘텐츠 다국어화 (Phase 1은 한국어 단일)\n\n---\n\n## 10. 기술 매핑 (1차 오픈 가설)\n\n| 항목 | 1차 오픈 |\n|---|---|\n| CSS 프레임워크 | **Tailwind CSS** (CDN 또는 빌드, 결정 미정) |\n| 컴포넌트 라이브러리 | **shadcn/ui** (Tailwind + Radix) 가설 / 또는 자체 컴포넌트 |\n| 아이콘 | **Lucide React** |\n| 폰트 호스팅 | Google Fonts (Noto Sans JP, Noto Sans KR) |\n| 토큰 매핑 | CSS Custom Properties → Tailwind config |\n| 다크 모드 | ❌ 1차 오픈 미지원 (라운드 3) |\n\n---\n\n## 10b. 공숲(Gongsoop) 하이브리드 톤 — 마케팅·홈 화면 한정\n\n> Toss의 *clinical clarity*에 공숲(`fullservice.conects.com`)의 *친근·따뜻함*을 부분 흡수. **마케팅·홈·랜딩 한정**, 응시·결제·결과 화면은 Toss 베이스 그대로.\n\n### 10b.1 적용 범위\n\n| 영역 | 적용 톤 |\n|---|---|\n| 메인 홈·랜딩·시험 목록·시험 상세 | **하이브리드** (Toss 카드/타이포 + 공숲 그라디언트/블롭) |\n| 환경 점검·응시 클라이언트·결과·인증서 | **Toss 그대로** (집중·신뢰·차분) |\n| 마이페이지 | **Toss 베이스 + 마이크로 강조** (그라디언트는 헤더 한정) |\n| 관리자 백오피스 | **Toss 그대로** (도구적 명확성) |\n\n### 10b.2 그라디언트 토큰 (마케팅용)\n\n| 토큰 | 값 | 용도 |\n|---|---|---|\n| `gradient-hero-soft` | `linear-gradient(135deg, #fef9e7 0%, #e8f3ff 50%, #ecfdf5 100%)` | 헤로 배경 (노랑 → 파랑 → 그린, 부드러운 파스텔) |\n| `gradient-cta-success` | `linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)` | 통계 카드 강조 (응시 수 등) |\n| `gradient-cta-blue` | `linear-gradient(135deg, #e8f3ff 0%, #bfdbfe 100%)` | 시험 카드 강조 |\n| `gradient-overlay-blob` | radial-gradient 다중 블롭 합성 | 헤로 추상 블롭 일러스트 |\n\n### 10b.3 일러스트 가이드라인\n\n| 항목 | 1차 오픈 | 라운드 2~ |\n|---|---|---|\n| **스타일** | 추상 블롭·기하 도형 (CSS+SVG로 표현) | 일러스트레이터 외주 — 모더 일러스트 |\n| **마스코트** | ❌ (없음) | 검토 — 일본·한국 톤 동시 호환 캐릭터 |\n| **컬러** | 파스텔 다중 (노·파·그린·핑크) | 동일 톤 유지 |\n| **선** | 부드러운 라운드, 1.5~2px | 동일 |\n| **위치** | 헤로·통계 카드 헤더·빈 상태(empty state) | 동일 + 결과 화면 축하 모먼트 |\n\n### 10b.4 마이크로 인터랙션 (공숲 흡수)\n\n- 카드 호버 시 *0.5° 미세 기울기* + 그림자 강화 (Toss는 정적, 공숲은 약간 살아있음)\n- CTA 클릭 시 *짧은 펄스 애니메이션* (200ms scale 0.97 → 1)\n- 통계 숫자 *카운트업 애니메이션* (500ms, ease-out) — 공숲의 *26,773건* 같은 효과\n- 단, *시험·결과·인증서 화면에는 적용 금지* — 시험 도중 시각 노이즈는 신뢰도 훼손\n\n### 10b.5 Don't (공숲 흡수 시 주의)\n\n- 만화풍 캐릭터·말풍선 → 일본 시장에서 *유아용*으로 오인 가능. 1차 오픈 미적용\n- 형광 컬러·고채도 그라디언트 → 신뢰도 훼손\n- 흔들리는 애니메이션·번쩍임 → 시험 집중 방해\n- *공숲의 sub-nav (8개 탭 + 더보기)* 미차용 — Phase 1 단순 GNB\n\n---\n\n## 11. 본 문서가 다루지 않는 것\n\n- 화면 단위 레이아웃 → `05-screen-inventory.md`\n- 컴포넌트 코드 구현 → 라운드 2 디자인 발주 후 `08b-component-library.md` (작성 예정)\n- 디자인 토큰 JSON·Style Dictionary → 라운드 2\n- 다크 모드·고대비 모드 → 라운드 3\n- 접근성 (WCAG AA) 디테일 → 라운드 3 `12-security.md` + 별도\n\n## 12. 본 문서를 결정·관리하는 자료\n\n| 자료 | 역할 |\n|---|---|\n| `newinDESIGN.md` | 본 문서의 베이스 (Toss 디자인 시스템 원본) |\n| `05-screen-inventory.md` | 본 시스템의 적용 대상 화면 목록 |\n| `01-glossary.md` | 본 시스템의 용어와 정합 (혼동 용어 표 포함) |\n"},{"id":"d14","type":"md","src":"09-edge-cases.md","title":"엣지케이스 (Phase 1, Light)","content":"# 엣지케이스 (Phase 1, Light)\n\n> 본 문서는 **1차 오픈 시점에 시스템·운영이 마주칠 경계 케이스**만 담는다. 본문 정책(`04-policy.md`)이 *정상 흐름* 룰이라면, 본 문서는 *정상 흐름이 깨지는 지점*에 대한 답이다. 자동 분기·매트릭스·룰 엔진은 라운드 2 이후.\n\n## 한 줄\n\n**1차 오픈 엣지케이스는 *시스템이 흡수할 수 있는 케이스는 자동 흡수하고, 나머지는 운영 SLA로 받는다*는 단순 원칙으로 통일한다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 1차 오픈은 응시 데이터·장애 패턴이 쌓이지 않아 *자동 분기 룰*을 설계할 통계가 없다 — `04-policy.md` 정책 1차 오픈 한 줄과 같은 근거.\n2. 시스템이 *흡수*하는 케이스(자동 저장·자동 재전송·자동 종료)와 운영이 *수동 처리*하는 케이스(재응시 티켓·환불·결과 공개)를 명확히 가르면, 응시자가 마주치는 분기가 사라진다 — 일본인 응시자는 *예측 가능성*을 중시한다.\n3. 운영 SLA로 받는 케이스에는 *영업일 N일* 같은 응답 시간만 명시하면 운영팀 캐파 한도 안에서 1차 오픈 운영이 가능하다.\n4. 케이스마다 *처리 방식*과 *라운드 2 미루기* 칸을 같이 두면, 라운드 2 자동화 룰을 만들 때 본 문서가 그대로 입력값이 된다.\n5. 본 문서는 *케이스 카탈로그*에 가깝다. 발견되는 새 케이스는 본문에 추가되며, 처리 방식이 정책으로 굳어지면 `04-policy.md` 본문에 흡수되어 본 문서에서 빠진다.\n\n---\n\n## 묶음 1 — 응시 중단·끊김\n\n응시자가 시작 후 *시간이 끝나기 전*에 발생하는 단절. 정책 2(*응시자 조작 없음*) · 정책 3(*자동 저장·재전송*) 원칙을 깨지 않는다.\n\n| # | 케이스 | 1차 오픈 처리 |\n|---|---|---|\n| E1-1 | 네트워크 일시 끊김 (5초~3분) | 오프라인 표시만 상단 안내. 응시 계속. 답안은 IndexedDB 임시 저장. 복구 시 자동 재전송 (정책 3) |\n| E1-2 | 네트워크 끝까지 복구 안 됨 | 시험 종료 시 자동 일괄 전송 시도 → 실패 시 *시스템 장애 재응시 티켓* 흐름으로 흡수 (정책 6) |\n| E1-3 | 응시 중 새 창 닫힘 (window.close 또는 강제 종료) | 마이페이지 *응시 가능 시험* 카드는 *진행 중* 상태 유지. 응시 윈도우 안에서 *동일 시험 재진입* 시 마지막 문항부터 이어서 진행. 이어서 응시 미허용 시(GAP-08 결정 전 가정)는 시스템 장애 재응시 티켓 |\n| E1-4 | 응시 중 마이크 권한 도중 회수 | 응시자에게 *마이크 끊김* 토스트 1회. 다음 문항부터 자동 진행은 계속되지만 녹음은 빈 답안. 시험 종료 후 응시자 신고 또는 운영자 로그 확인 → 시스템 장애 케이스로 흡수 |\n| E1-5 | 응시 중 전화·알람 인터럽션 | 모바일 OS의 마이크 권한 회수와 같은 경로 (E1-4)로 흡수 |\n\n**라운드 2 이후**: 끊김 자동 감지 → 일시정지 후 재개, 인터럽션 정책 분기, 부분 전송 후 단말 변경 시나리오.\n\n---\n\n## 묶음 2 — 환경·기기 변화\n\n환경 점검은 통과했지만 *응시 시작 시점*에 기기 상태가 달라진 케이스. 정책 1(*사전 점검 통과 데이터가 없으면 결제 버튼 비활성*) 원칙을 응시 직전까지 끌고 갈지에 대한 답.\n\n| # | 케이스 | 1차 오픈 처리 |\n|---|---|---|\n| E2-1 | 환경 점검 30일 캐시 적중 + 응시 시작 직전 마이크 망가짐 | 본인 확인 → 환경 점검 페이지 진입 시 *마이크 신호 5초 자동 확인*. 신호 없으면 응시 시작 버튼 비활성. 응시자가 마이크 교체 후 재테스트 |\n| E2-2 | 환경 점검 통과 후 응시 시작했는데 1형부터 마이크 신호 0 | 1형 종료 시점에 자동 감지 → 응시자에게 *마이크 신호 없음* 안내 후 응시 종료. 시스템 장애 케이스로 운영자가 재응시 티켓 발행 (정책 6) |\n| E2-3 | 응시 도중 디바이스 변경 시도 (포털 데스크탑 → 사용자 web 모바일) | 1차 오픈 미허용. *동일 시험 1세션 1디바이스* 원칙. 시도 시 새 디바이스 진입 거절 안내 |\n| E2-4 | 동일 계정으로 두 디바이스 동시 응시 시도 | 뒤에 들어온 세션 거절. 먼저 들어온 세션 유지 |\n| E2-5 | 응시 도중 디바이스 OS 강제 업데이트·재부팅 | E1-3(새 창 닫힘)과 같은 경로로 흡수 |\n\n**라운드 2 이후**: 디바이스 핑거프린팅 기반 자동 재테스트, 마이크 변경 감지, 응시 시작 직전 환경 재테스트 강제 여부 정책 결정 (GAP-08).\n\n---\n\n## 묶음 3 — 결제·정산 정합성\n\n응시자 입장에서 *돈은 빠져나갔는데 응시 못 하는 상태*. 가장 클레임이 거센 영역. 결제 모듈(PG·GAP-12 결정 후)이 자동 회수해야 하는 것과 운영이 수동 보정하는 것을 가른다.\n\n| # | 케이스 | 1차 오픈 처리 |\n|---|---|---|\n| E3-1 | PG 결제 성공 → 콜백 실패 → 마이페이지에 시험 안 보임 | 결제 모듈이 PG 트랜잭션 정합성 주기 점검(예: 5분 간격)으로 자동 보정. 24시간 내 미보정 시 응시자가 1:1 문의 → 운영자 수동 등록 |\n| E3-2 | 이중 결제 (응시자 새로고침으로 동일 시험 2회 결제) | 결제 모듈에서 자동 회수 (정책 7 — PG 트랜잭션 정합성). 이중 청구 잔류 시 환불 흐름(E3-3)으로 흡수 |\n| E3-3 | 응시 전 환불 신청 (접수 기간 내) | 마이페이지 환불 요청 → 운영 검토 → 승인 시 PG 환불 호출. 응답 SLA *영업일 N일* (정책 7) |\n| E3-4 | 응시 후 환불 신청 (단순 변심) | 미적용. 마이페이지에서 신청 자체를 차단 또는 *환불 불가* 안내 (정책 7) |\n| E3-5 | 결제는 됐는데 응시 윈도우(14일) 안에 미응시 | 자동 만료. 환불 없음 (정책 8). 만료 임박 D-1·D-day 리마인더 메일 (`03-user-flows.md` §6) |\n\n**라운드 2 이후**: 자동 환불 분기(접수 기간 내 + 미응시 → 자동 승인), 환불 사유 코드 매트릭스, 적격청구서 인보이스 PDF.\n\n---\n\n## 묶음 4 — 윈도우·시간 경계\n\n*결제 후 14일* 윈도우(정책 8)와 응시 윈도우 안 *24시간 응시 가능 티켓*의 시간 경계.\n\n| # | 케이스 | 1차 오픈 처리 |\n|---|---|---|\n| E4-1 | 윈도우 마지막 날 자정 직전 응시 시작 → 응시 도중 자정 도과 | 시작 시점 기준으로 응시권을 잠근다. 응시 도중 자정 도과 무관하게 끝까지 진행 |\n| E4-2 | 윈도우 만료 직전 마이페이지 진입했는데 응시 시작 안 함 | 만료 시각에 자동 만료. 환불 없음. 만료 후 응시 시도는 *기간 만료* 안내 |\n| E4-3 | 결제 직후 응시 시작 — 시스템 시각 vs 응시자 로컬 시각 불일치 | 시스템 시각(JST) 기준 단일 진실. 응시자 로컬 시각 무시 |\n| E4-4 | 응시 중 SSO 토큰 만료 | 토큰 자동 갱신. 갱신 실패 시 응시는 계속(로컬 IndexedDB 저장), 시험 종료 후 재전송 시점에 재로그인 유도 |\n| E4-5 | 응시 윈도우 안 *재진입* 시 일부 답안만 전송된 상태 | 마지막 전송된 문항 다음부터 이어서 진행. 이전 문항 재응시 미허용 (정책 2 *응시자 조작 없음* 원칙 일관성) |\n\n**라운드 2 이후**: 응시 일시정지/이어서 응시 정책, 시간대(타임존) 이동 응시자 처리, 토큰 만료 자동 모달.\n\n---\n\n## 묶음 5 — 운영자 누락·SLA\n\n운영이 *수동 처리해야 하는데 빼먹은 경우*. 1차 오픈에서 가장 명확한 SLA가 필요한 영역.\n\n| # | 케이스 | 1차 오픈 처리 (운영 SLA) |\n|---|---|---|\n| E5-1 | AI 1차 채점 완료 → 운영자가 *결과 공개* 안 누름 | 채점 완료 후 *영업일 N일* 안에 공개 (N = 운영팀 캐파 산정). 미공개 시 관리자 대시보드 상단 카운터로 누락 건수 표시 |\n| E5-2 | 환불 신청 → 운영자가 검토 안 함 | 신청 후 *영업일 N일* 안에 승인·반려 (정책 7). 미처리 시 관리자 대시보드 상단 카운터 |\n| E5-3 | 1:1 문의 답변 누락 | 문의 접수 후 *영업일 N일* 안에 답변. 미답변 시 관리자 대시보드 카운터 |\n| E5-4 | 일본 연휴·주말 운영 공백 | SLA는 *영업일* 기준. FAQ·자동 응답 메일에 *영업일 = 일본 평일* 명시 |\n| E5-5 | 시스템 장애 재응시 티켓 발행 누락 | 응시자 1:1 문의로 인입 시 우선 처리. SLA *영업일 N일* (E5-3과 동일) |\n\n> **N값**은 운영팀(KOEN)이 1차 오픈 캐파 산정 후 결정. 본 문서는 *형식만* 박고 숫자는 비워둔다.\n\n**라운드 2 이후**: SLA 자동 알림(이메일·인앱), 결과 공개 자동화(채점 후 X분), 운영자 등급별 권한 분리.\n\n---\n\n## 묶음 6 — 어뷰징·계정 무결성\n\n회원 자격(정책 9) 안에서도 우회 시도가 발생하는 케이스.\n\n| # | 케이스 | 1차 오픈 처리 |\n|---|---|---|\n| E6-1 | 한 계정에서 무료 샘플 반복 응시 | *계정당 샘플 1회*. 2회차 시도 시 *이미 응시함* 안내 + 본 시험 결제 CTA |\n| E6-2 | 계정 다수 생성 후 무료 샘플 반복 | 이메일 도메인 단위 차단은 라운드 2. 1차 오픈은 *동일 IP에서 X개 이상 가입* 시 운영자 대시보드 알림만 |\n| E6-3 | 응시 중 대리 응시 의심 | 1차 오픈에서 자동 감지 미운영. 본인 확인 체크박스(이름·이메일·시험명) + 약관 동의로 시작 (정책 4) |\n| E6-4 | 결과 공개 후 SNS·블로그에 문제 유출 | 1차 오픈에서 자동 감지 미운영. 약관에 *문제 유출 시 응시 자격 박탈* 조항만 명시 |\n| E6-5 | 회원 탈퇴 신청 — 미응시 시험·미사용 결제권 잔류 | 응시·결제 이력이 있으면 탈퇴 미허용. 응시권 사용 또는 환불 처리 후 탈퇴 가능 안내 |\n\n**라운드 2 이후**: 디바이스 핑거프린팅 기반 다계정 감지, 부정행위 방지(감독 카메라·녹화), 회원 탈퇴 시 데이터 보존 정책(일본 개인정보보호법 기준).\n\n---\n\n## 케이스가 발견되면\n\n- 본 6묶음에 추가 → 1차 오픈 본문에 흡수되면 본 문서에서 빠짐.\n- 본 6묶음에 안 들어가는 새 케이스는 *묶음 7 — TBD*로 임시 신설. 3건 쌓이면 묶음명 확정.\n- 본 문서는 *카탈로그*. 정책 결정은 `04-policy.md`로, 갭은 `open-questions.md`로 갈라 보낸다.\n"},{"id":"d15","type":"md","src":"newinDESIGN.md","title":"Custom Design System (based on Toss)","content":"---\nomd: 0.1\nbrand: Toss\n---\n\n# Custom Design System (based on Toss)\n\n## 1. Visual Theme & Atmosphere\n\nToss is Korea's fintech super-app that redefined what a financial interface could feel like -- calm, confident, and deceptively simple. The page opens on a clean white canvas (`#ffffff`) with deep charcoal headings (`#191f28`) and a signature blue (`#2e84ff`) that functions as the universal interactive accent. This isn't the cold, institutional blue of legacy banking; it's a bright, optimistic cerulean that says \"your money is in good hands, and we'll make it easy.\"\n\nThe custom **Toss Product Sans** typeface is the quiet hero. Developed with Korean type foundries Sandoll and Leedotype, it was purpose-built for financial contexts: numerals and Latin characters are optically weighted to match Korean hangul proportions, and financial symbols (%, commas, ±) are given enhanced legibility. The font ships in 8 weights (300-950) but the UI exercises restraint, primarily using 400, 600, and 700. The system supports both variable-width numerals for display and fixed-width (tabular) numerals for data tables -- context determines mode.\n\nWhat defines Toss visually is its OKLCH-based color system, rebuilt from scratch for perceptual uniformity. Colors at the same scale level appear equally bright regardless of hue, enabling consistent semantic coloring where blue-500, red-500, and green-500 carry identical visual weight without manual tuning.\n\n**Key Characteristics:**\n- Toss Blue (`#2e84ff`) as the primary interactive color -- bright, optimistic, trustworthy\n- Toss Product Sans with Korean-Latin optical balancing and tabular numeral support\n- OKLCH color space for perceptual uniformity across all hue scales\n- 10-step grey scale (grey50-grey900) with warm undertones\n- Three-tier token architecture: primitive → semantic → component\n- Minimal shadow system -- trust comes from clarity, not depth\n- Mobile-first at 375px design baseline with accessibility scaling up to 310%\n\n## 2. Color Palette & Roles\n\n### Primary\n- **Toss Blue** (`#2e84ff`): `blue500`. Primary interactive color -- CTAs, links, active states, selection highlights. The workhorse of every tappable element.\n- **Blue Hover** (`#2272eb`): `blue600`. Hover/pressed state for blue500 elements.\n- **Blue Light** (`#e8f3ff`): `blue50`. Informational backgrounds, subtle blue-tinted surfaces.\n- **Pure White** (`#ffffff`): `background`, `layeredBackground`. Page background, card surfaces.\n- **Dark Charcoal** (`#191f28`): `grey900`. Primary heading color, strongest text. Warm near-black with subtle blue undertone.\n\n### Brand (Logo/Marketing Only)\n- **Brand Blue** (`#0064FF`): Official Toss brand color (Pantone 2175 C). Logo and marketing materials only -- distinct from UI blue500.\n- **Brand Gray** (`#202632`): Official secondary brand color (Pantone 433 C). Corporate contexts.\n\n### Semantic\n- **Error Red** (`#f04452`): `red500`. Error states, destructive actions, negative financial indicators.\n- **Success Green** (`#03b26c`): `green500`. Positive financial indicators, confirmations.\n- **Warning Orange** (`#fe9800`): `orange500`. Pending states, attention-needed indicators.\n- **Caution Yellow** (`#ffc342`): `yellow500`. Soft warnings, highlight moments.\n- **Info Teal** (`#18a5a5`): `teal500`. Informational accent, alternative categorization.\n- **Premium Purple** (`#a234c7`): `purple500`. Premium features, special offers.\n\n### Neutral Scale\n- **Grey 50** (`#f9fafb`): Lightest gray, `greyBackground` surface.\n- **Grey 100** (`#f2f4f6`): Secondary background, card fills, disabled surfaces.\n- **Grey 200** (`#e5e8eb`): Default border color, dividers, input backgrounds.\n- **Grey 400** (`#b0b8c1`): Placeholder text, disabled icon fills.\n- **Grey 500** (`#8b95a1`): Caption text, secondary labels.\n- **Grey 600** (`#6b7684`): Body text, descriptions, metadata.\n- **Grey 700** (`#4e5968`): Emphasized body text, sub-headings.\n- **Grey 800** (`#333d4b`): Strong labels, navigation text.\n\n### Surface & Borders\n- **Border Default**: `#e5e8eb` (grey200). Standard card borders, input borders, dividers.\n- **Border Strong**: `#d1d6db` (grey300). Emphasized borders, active input outlines.\n- **Background Float**: `#ffffff`. `floatBackground`. Floating elements -- tooltips, dropdowns.\n- **Overlay Scrim**: `rgba(2,9,19,0.5)` to `rgba(2,9,19,0.91)`. `greyOpacity` scale. Blue-tinted dark overlays.\n\n## 3. Typography Rules\n\n### Font Family\n- **Primary**: `\"Toss Product Sans\", \"Tossface\", \"SF Pro KR\", \"SF Pro Display\", -apple-system, BlinkMacSystemFont, \"Basier Square\", \"Apple SD Gothic Neo\", Roboto, \"Noto Sans KR\", sans-serif`\n- **Monospace**: `\"SF Mono\", SFMono-Regular, Menlo, Consolas, monospace`\n- **Emoji**: `Tossface` -- Toss's custom emoji font (3500+ emojis, open-source on GitHub)\n\n### Hierarchy\n\n| Role | Font | Size | Weight | Line Height | Letter Spacing | Notes |\n|------|------|------|--------|-------------|----------------|-------|\n| Display Hero | Toss Product Sans | 30px | 700 | 40px (1.33) | normal | Splash screens, hero moments |\n| Display Large | Toss Product Sans | 26px | 700 | 36px (1.38) | normal | Section headers, key metrics |\n| Heading Large | Toss Product Sans | 22px | 700 | 30px (1.36) | normal | Feature titles, modal headers |\n| Heading | Toss Product Sans | 20px | 600 | 28px (1.40) | normal | Card headings, sub-sections |\n| Subtitle | Toss Product Sans | 16px | 600 | 24px (1.50) | normal | Navigation titles, list headers |\n| Body Large | Toss Product Sans | 16px | 400 | 24px (1.50) | normal | Descriptions, explanations |\n| Body | Toss Product Sans | 14px | 400 | 22px (1.57) | normal | Standard reading text |\n| Body Small | Toss Product Sans | 13px | 400 | 20px (1.54) | normal | Secondary information |\n| Caption | Toss Product Sans | 12px | 400 | 18px (1.50) | normal | Timestamps, fine print |\n| Number Display | Toss Product Sans | 30px+ | 700 | tight | normal | Financial amounts -- tabular nums |\n\n### Principles\n- **Eight weights, three used**: Ships 300-950, but UI uses 400 (body), 600 (emphasis), 700 (headings). Restraint over variety.\n- **Dual numeral modes**: Variable-width for display, fixed-width (tabular) for financial tables and stock tickers. Context determines mode.\n- **Korean-Latin optical balance**: Korean characters and Latin/numerals are independently weighted so mixed text looks harmonious without manual kerning.\n- **Financial symbol optimization**: %, comma separators, ±, currency symbols, and directional arrows given enhanced legibility at small sizes.\n\n## 4. Component Stylings\n\n### Buttons\n- Style: Sharp & Precise -- minimal rounding, decisive geometric edges\n- Radius: 4px across primary, secondary, and ghost variants\n- Padding: 8px 16px (default), 6px 12px (compact), 12px 20px (comfortable)\n- Primary: solid primary background, foreground contrast text, 1px solid primary border\n- Secondary: transparent/neutral background, foreground text, 1px solid border color\n- Ghost: transparent background, primary text, no border until hover\n- Hover: primary darkens ~10%, secondary gains subtle border-color bump\n- Font weight: 500-600 for CTA text clarity\n\n### Cards & Containers\n- Background: `#ffffff` (layeredBackground)\n- Border: 1px solid `#e5e8eb` (grey200) or no border\n- Radius: 8px (customized), 16px (featured), 8px (compact)\n- Shadow: none -- use border for definition, flat hierarchy\n- Financial cards: prominent number display with amount in 700 weight, currency label in 400\n\n### Inputs & Forms\n- Style: Bordered Box -- full 1px border, contained field, structured rectangle\n- Background: `#f2f4f6` (grey100) for contained variant\n- Border: 1px solid `#e5e8eb`, focus: 2px solid `#2e84ff`\n- Radius: 8px\n- Text: `#191f28`, Placeholder: `#b0b8c1` (grey400)\n- Error border: `#f04452` (red500)\n- Special: SplitTextField for OTP, SecureKeypad for financial input\n\n### Navigation\n- Bottom tab bar: white background, top border `#e5e8eb`\n- Active: `#2e84ff` icon + `#191f28` text, Inactive: `#b0b8c1` icon + `#8b95a1` text\n- Top app bar: white, sticky, optional backdrop blur\n- Segmented control for section switching\n\n### Overlays\n- Bottom Sheet: `#ffffff`, 16px top radius, managed via `overlay-kit`\n- Dialog: centered modal, AlertDialog and ConfirmDialog variants\n- Toast: floating notification, subtle shadow, auto-dismiss\n- Tooltip: `#191f28` background, white text, arrow pointer\n\n## 5. Layout Principles\n\n### Spacing System\n- Base unit: 8px\n- Common values: 4px, 8px, 12px, 16px, 20px, 24px, 32px, 40px, 48px\n- Horizontal padding: 20px (slightly wider than typical 16px)\n- Financial data grids: tighter 4px internal spacing\n\n### Grid & Container\n- Design baseline: 375px mobile width\n- Content: full-width with 20px horizontal padding\n- No explicit multi-column grid -- single-column, mobile-first\n- Transaction lists: full-width rows with consistent left-align for amounts\n\n### Whitespace Philosophy\n- **Compact & dense**: Optimize for information density and scanning speed. Tight padding (8-12px), small gaps (4-8px between related items).\n- **Reduced section spacing**: Use ~70% of the reference spacing values for a data-focused, efficient layout.\n- **Screen real estate**: Maximize visible content per viewport -- users should see more items without scrolling.\n\n### Border Radius Scale\n- Compact (4px): Small badges, inline elements\n- Standard (8px): Inputs, small buttons, compact cards\n- Comfortable (12px): Standard cards, dialog corners\n- Large (16px): Featured cards, bottom sheet top corners\n- Pill (9999px): Toggle switches, floating chips\n\n## 6. Depth & Elevation\n\n| Level | Treatment | Use |\n|-------|-----------|-----|\n| Flat (Level 0) | No shadow | Page background, inline elements |\n| Subtle (Level 1) | `0px 1px 3px rgba(0,0,0,0.06)` | Slight lift, list item separation |\n| Standard (Level 2) | `0px 2px 8px rgba(0,0,0,0.08)` | Cards, content panels |\n| Elevated (Level 3) | `0px 4px 12px rgba(0,0,0,0.12)` | Dropdowns, popovers, floating buttons |\n| Modal (Level 4) | `0px 8px 24px rgba(0,0,0,0.16)` | Bottom sheets, dialogs, modals |\n\n**Shadow Philosophy**: Toss keeps shadows minimal and neutral. In a financial app, visual noise undermines trust -- elevation is communicated through subtle opacity differences rather than dramatic depth. Pure black with low opacity creates clinical precision matching the fintech context. Where Stripe uses brand-colored shadows, Toss uses restraint as its brand statement.\n\n### Blur Effects\n- Menu components use backdrop blur for lightweight floating panels\n- Navigation bar applies subtle blur on scroll for the sticky header\n\n## 7. Do's and Don'ts\n\n### Do\n- Use Toss Blue (`#2e84ff`) for all interactive elements -- links, buttons, toggles, selections\n- Apply the full font stack with Korean fallbacks including Tossface emoji\n- Use tabular (fixed-width) numerals for financial data and transaction amounts\n- Use 700 weight for financial amounts and headings, 400 for body, 600 for emphasis\n- Keep border-radius between 8px-16px for most elements\n- Show positive changes in green (`#03b26c`), negative in red (`#f04452`)\n- Use blue50 (`#e8f3ff`) for subtle informational backgrounds\n\n### Don't\n- Don't confuse Brand Blue (`#0064FF`) with UI Blue (`#2e84ff`) -- brand is for marketing/logo only\n- Don't use heavy shadows -- rely on background color layering, not depth\n- Don't use bold (700) for body text -- reserved for headings and financial amounts\n- Don't mix variable-width and tabular numerals in the same data context\n- Don't use warm accent colors (orange, pink) for primary actions -- blue is the sole interactive hue\n- Don't use border-radius > 16px except for pills/toggles\n- Don't add decorative elements to financial data displays -- clarity is the aesthetic\n\n## 8. Responsive Behavior\n\n### Breakpoints\n| Name | Width | Key Changes |\n|------|-------|-------------|\n| Mobile (Primary) | <480px | Full design fidelity, 375px baseline |\n| Tablet | 480-768px | Expanded cards, optional side margins |\n| Desktop (Web) | >768px | Centered column, max-width ~480px for mobile-web parity |\n\n### Touch Targets\n- Buttons: xlarge (~56px), large (~48px), medium (~40px), small (~36px)\n- List items: minimum 52px row height for financial actions\n- Keypad buttons: large targets (56-64px) for secure input\n\n### Collapsing Strategy\n- Desktop web mirrors mobile layout in a centered column\n- Bottom sheet → modal dialog on larger screens\n- Sticky bottom CTA bar with safe area insets on all devices\n- Horizontal scrolling card carousels for product discovery\n\n### Image Behavior\n- Bank/service logos: 24-40px with consistent sizing within context\n- Tossface emojis: inline at text size, display size for decorative use\n- Charts/graphs: full-width, responsive, maintain aspect ratio\n\n## 9. Agent Prompt Guide\n\n### Quick Color Reference\n- Primary CTA: Toss Blue (`#2e84ff`)\n- CTA Hover: Blue 600 (`#2272eb`)\n- Background: Pure White (`#ffffff`)\n- Background Surface: Light Gray (`#f2f4f6`)\n- Heading text: Dark Charcoal (`#191f28`)\n- Body text: Medium Gray (`#6b7684`)\n- Caption text: Gray (`#8b95a1`)\n- Placeholder: Soft Gray (`#b0b8c1`)\n- Border: Gray 200 (`#e5e8eb`)\n- Success/Positive: Green (`#03b26c`)\n- Error/Negative: Red (`#f04452`)\n- Warning: Orange (`#fe9800`)\n\n### Example Component Prompts\n- \"Create a balance card: white bg, 12px radius, 20px padding. Balance label 14px weight 400, #8b95a1. Amount 30px weight 700, #191f28, tabular numerals. Currency '원' 20px weight 400. Shadow 0px 2px 8px rgba(0,0,0,0.08).\"\n- \"Build a send-money button: #2e84ff bg, white text, 16px weight 600, min-height 56px, 12px radius, full-width. Pressed: overlay dim. Loading: 3-dot white animation.\"\n- \"Design a transaction row: full-width, 16px h-padding, 52px min-height. Left: 32px circle icon + name (14px weight 600, #191f28) + category (13px weight 400, #8b95a1). Right: amount (14px weight 600, #f04452 expense / #03b26c income).\"\n- \"Create an OTP input: 6 boxes, each 48px wide, 56px tall, 8px radius, 1px border #e5e8eb. Active: 2px border #2e84ff. Digit: 24px weight 700, centered, #191f28.\"\n- \"Design a bottom tab bar: white bg, top border 1px #e5e8eb. 4 tabs evenly spaced. Active: #2e84ff icon + #191f28 label 11px weight 500. Inactive: #b0b8c1 icon + #8b95a1 label. Tab height 56px with safe area.\"\n\n### Iteration Guide\n1. Always use the full Toss Product Sans font stack with Korean fallbacks\n2. Primary interactive color is `#2e84ff` (blue500) -- never `#0064FF` (brand blue)\n3. Financial numbers: 700 weight, tabular numerals, right-aligned in lists\n4. Grey scale has warm undertones: grey900 `#191f28`, grey50 `#f9fafb`\n5. Border-radius: 8px inputs, 12px cards, 16px sheets, pill for toggles\n6. Shadows are single-layer, pure black opacity, no colored tints\n7. Mobile-first: design at 375px, 20px horizontal padding\n\n---\n\n## 10. Voice & Tone\n\nToss speaks like a friend who happens to be a fiduciary: calm, unhurried, zero jargon, positive statements without hedging. Balance is stated, not \"approximately\" anything. Korean is the primary voice — English UI strings are secondary translations, not parity. Sentences end in periods; buttons do not. No emoji in financial contexts. Tossface exists as brand decoration but is disallowed on money-handling screens.\n\n| Context | Tone |\n|---|---|\n| CTAs | Imperative, short Korean verb form (`송금하기`, `확인`, `가입하기`) |\n| Success toasts | Past-tense single sentence (`송금이 완료되었어요`). No emoji. |\n| Error messages | Specific + blameless + actionable. Never `문제가 발생했습니다`. |\n| Onboarding screens | Second-person, one idea per screen, no bullet lists. |\n| Financial amounts | Bare numerals with comma separators, then currency unit. `1,240,000원`, never `₩1.24M`. |\n| Empty states | Explain the *why* in one line, offer one action. Never `데이터가 없습니다`. |\n| Legal / disclosure | Korean financial-regulation tone — formal `합니다` endings. Single exception to the casual voice. |\n\n**Forbidden phrases.** `불편을 드려 죄송합니다`, `Oops`, `죄송하지만`, `약 ~원` (approximation on money), any sentence starting with `I'm sorry` in English strings. Rounded currency amounts (`약 120만원`) are forbidden on primary surfaces; exact numerals only.\n\n## 11. Brand Narrative\n\nToss launched in 2015 as a single-feature money-transfer app in a Korean banking market dominated by legacy institutions — KB, Shinhan, Woori, Hana — each with institutional-indigo websites, 12-digit account numbers, Active-X plug-ins, and the presumption that handling money had to feel like filing taxes. The founding rejection was of that entire aesthetic vocabulary. The specific cerulean `#2e84ff` was chosen because it was **not** the indigo of any incumbent bank. The optimism of the color was the whole thesis: money could feel light.\n\nToss is not a neo-bank. It's a super-app: one interface holds transfers, investments, credit scoring, insurance, brokerage, and lending. The design's job is to flatten that complexity into **one gesture per screen**. That requires extreme restraint — shadows are single-layer black, palette is blue-and-neutral, type is one family in three weights. Every ornamental move costs clarity, and clarity is the entire brand promise.\n\nWhat Toss refuses: the institutional seriousness of legacy finance, the playfulness of consumer apps (no bright pink, no illustrations of cartoon piggy banks), the data-viz density of Bloomberg-style terminals. Toss occupies a narrow middle — calm but optimistic, dense with functionality but spacious in presentation.\n\n## 12. Principles\n\n1. **Breathing room for money.** Financial amounts get ≥1.5× the surrounding spacing of normal text. A balance at 30px with 32px margins is correct; the same balance at 16px margins looks cheap and therefore untrustworthy.\n2. **Progressive density.** Summary screens are spacious; detail and transaction screens are dense. The deeper the user navigates, the more information per pixel — they've committed to the context and want facts.\n3. **One action per screen.** If a screen has two primary buttons, it is two screens. Secondary actions are acceptable; two primaries are never acceptable.\n4. **Blue is interaction, not decoration.** `#2e84ff` appears only where the user can tap. It never decorates. Illustrations, ornaments, borders, and headers never use blue500 unless they are interactive surfaces.\n5. **Restraint communicates trust.** Shadows are single-layer, pure black, low opacity. No colored shadows, no multi-layer elevation stacks. In finance, visual noise is credibility tax.\n6. **Korean and Latin are co-equal.** Never assume one is primary. Typography stacks, optical weights, and tabular numerals all assume both scripts render simultaneously in the same line.\n7. **Numbers are typography.** Financial amounts use 700 weight and tabular numerals with the same care as display headings. Amounts never inherit body-text weight.\n8. **Negative space is a brand asset.** If reducing padding would fit more on screen, the answer is another screen, not tighter packing.\n\n## 13. Personas\n\n*Personas below are fictional archetypes informed by publicly described Korean fintech user segments, not individual people.*\n\n**정민 (Jeongmin), 28, Seoul.** Software engineer at a mid-size startup. Opens Toss 2–3 times a day — morning subway, post-lunch balance check, evening transfer to a flatmate. Expects the app to open directly to the account screen and paint in under 1s. If she has to tap twice to see her money, she's already irritated. Uses both Korean and English on-device; reads financial English natively but prefers Korean UI for speed.\n\n**이선생님 (Mr. Lee), 54, Busan.** Runs a three-person machining shop. His daughter set up Toss for him two years ago. Primary use: transferring to suppliers and receiving invoice payments. Needs one-tap repeat transfer — he has about 12 regular counterparties. Distrusts anything that looks like an advertisement. Would uninstall the app before tapping a promoted banner. Reads Korean only; English strings on product surfaces are invisible to him. Values receipts and transaction history — never deletes them.\n\n**예은 (Yeeun), 21, Daegu.** University student, third year, Economics. Toss is her primary banking app — she opened her first account through it, and has never touched a legacy bank's web interface except under duress. Expects Toss Blue to be \"banking blue.\" If another financial app uses cerulean, she assumes it's imitating Toss. Sends ₩5,000–₩30,000 amounts constantly (splitting bills, paying back friends). Treats the app like a messaging app with money attached.\n\n## 14. States\n\n| State | Treatment |\n|---|---|\n| **Empty (first use)** | Single paragraph of `grey700` body text explaining *why* the screen is empty (`아직 거래내역이 없어요`), plus one suggested action as a secondary button (blue50 bg, blue500 text). Never an illustration. Never `데이터가 없습니다`. |\n| **Empty (filter cleared)** | Single line of `grey500` caption (`조건에 맞는 결과가 없어요`). No button — user resets the filter themselves. |\n| **Loading (first paint)** | Skeleton blocks matching the final layout's structure at `#f2f4f6` (grey100). Financial amounts render as `--` until resolved; they never appear as skeleton blocks (would look like they have a placeholder value). |\n| **Loading (refresh)** | Top bar pull-down spinner in blue500. No overlay, no blocking. Content stays visible with its previous values. |\n| **Error (inline field)** | `#f04452` (red500) 2px border on the input, error text below in red500 13px. One actionable sentence (`계좌번호를 다시 확인해주세요`). |\n| **Error (toast)** | `#191f28` background, white 14px 400 text, 3s auto-dismiss. One sentence. No icons. Bottom of screen with 20px inset. |\n| **Error (screen-blocking)** | Reserved for server outage. White screen, centered single-line message in `grey900` 16px weight 600, retry button in blue500 below. No illustration. |\n| **Success (inline flash)** | Brief flash of `#e8f3ff` (blue50) background behind the updated element, 300ms fade to default. For routine actions like toggling a setting. |\n| **Success (money moved)** | Dedicated confirmation screen — not a toast. `#03b26c` (green500) checkmark top-center, exact amount in 30px weight 700 below, recipient name, timestamp. Single button: `확인`. This weight is intentional; money moving is never a toast. |\n| **Skeleton** | `#f2f4f6` blocks at exact final dimensions. 1.2s shimmer as `linear-gradient` with 8% white highlight. Rounded at component radius (8px/12px/16px per component). Never used on financial amounts — those show `--`. |\n| **Disabled** | Button opacity drops per `--button-disabled-opacity-color`. No grey-out of input borders — disabled inputs keep `grey200` border, so the geometry is stable if re-enabled. |\n| **Loading inside pressed button** | Text is replaced by the 3-dot white animation. Width of the button does not change. Press is visually committed; user cannot double-submit. |\n\n## 15. Motion & Easing\n\n**Durations** (named, not raw milliseconds):\n\n| Token | Value | Use |\n|---|---|---|\n| `motion-instant` | 0ms | Toggle flips, checkbox state changes |\n| `motion-fast` | 150ms | Hover, focus, small reveals, button press overlay |\n| `motion-standard` | 250ms | The default — sheet opens, card expands, tab switches |\n| `motion-slow` | 400ms | Emphasized transitions — success checkmarks, onboarding step advances |\n| `motion-page` | 350ms | Full-screen transitions between top-level routes |\n\n**Easings:**\n\n| Token | Curve | Use |\n|---|---|---|\n| `ease-enter` | `cubic-bezier(0.0, 0.0, 0.2, 1)` | Things appearing — sheets, toasts, screen pushes |\n| `ease-exit` | `cubic-bezier(0.4, 0.0, 1, 1)` | Things leaving — dismissals, pops |\n| `ease-standard` | `cubic-bezier(0.4, 0.0, 0.2, 1)` | Two-way transitions — collapsible cards, tab content |\n| `ease-spring` | `cubic-bezier(0.34, 1.56, 0.64, 1)` | Reserved. Only for money-moved success checkmark. Nowhere else — overshoot on routine UI would feel unserious. |\n\n**Signature motions.**\n\n1. **Money-moves.** When a balance updates, the old number slides up 20px and fades out (`motion-fast / ease-exit`), the new number slides in from below 20px (`motion-standard / ease-enter`). Never cross-fade money — a financial amount flickering between values looks like a bug.\n2. **Bottom-sheet presentation.** Sheets rise from `y+40px` with `motion-standard / ease-enter` and a synchronized backdrop fade from `rgba(2,9,19,0)` to `rgba(2,9,19,0.5)`. Dismissal uses `motion-fast / ease-exit` — leaving feels lighter than entering.\n3. **Success checkmark.** On money-moved confirmation, the checkmark draws over `motion-slow` with `ease-spring`. This is the one place spring easing is licensed. Everywhere else, standard easing.\n4. **Reduce motion.** If `prefers-reduced-motion: reduce`, all `motion-*` tokens collapse to `motion-instant`. No exceptions. Crossfades replace slides. The app stays usable; just less kinetic.\n\n<!--\nOmD v0.1 Sources — Philosophy Layer (sections 10–15)\n\nDirect verification via WebFetch (2026-04-19):\n- https://toss.im/ — confirms Viva Republica (비바리퍼블리카) as operating company,\n  unified-finance super-app positioning (\"내 모든 금융 내역을 한눈에 조회하고 한 곳에서 관리하세요\"),\n  and mission framing \"모두의 금융에 자유를\" (financial freedom for everyone).\n- https://slash.page/ — confirms Toss maintains a public open-source engineering\n  presence (\"Copyright © 2024 Viva Republica - Toss Frontend Chapter\"), with\n  packages including overlay-kit, suspensive, use-funnel — demonstrating the\n  design/engineering self-documentation culture referenced in §12 Principles.\n\nBase DESIGN.md (sections 1–9) is the source for token-level claims including\nToss Blue #2e84ff, Toss Product Sans, the OKLCH-based palette, and shadow tokens.\n\nNot independently verified via WebFetch — widely documented public facts used:\n- Toss (Viva Republica) was founded in 2013; the money-transfer app launched in 2015.\n- Korean legacy-bank institutional palette context (KB, Shinhan, Woori, Hana) is\n  general industry knowledge, not a sourced Toss statement.\n\nPersonas (§13) are fictional archetypes informed by publicly described Korean\nfintech user segments. Any resemblance to specific individuals is unintended.\n\nInterpretive claims (e.g., \"the specific cerulean was chosen because it was\nnot the indigo of any incumbent bank\") are editorial readings of the design,\nnot documented Toss statements.\n-->\n\n\n\n---\n\n## Included Components\n\nThe following components are part of this design system:\n\n- Button\n- Input\n- Table\n- Card\n- Badge\n- Tabs\n- Dialog\n\n\n---\n\n## Iconography & SVG Guidelines\n\n### Icon Library\n\nUse a single, consistent icon library throughout the project. Recommended options:\n\n- **Lucide React** (`lucide-react`): Default for shadcn/ui projects. 1,400+ icons, tree-shakeable, consistent 24x24 grid.\n- **Radix Icons** (`@radix-ui/react-icons`): 300+ icons, 15x15 grid, minimal and geometric.\n- **Heroicons** (`@heroicons/react`): 300+ icons by Tailwind team, outline and solid variants.\n\nPick ONE library and use it everywhere. Do not mix icon libraries within the same project.\n\n### SVG Usage Rules\n\n- All icons must be inline SVG components (not `<img>` tags) for color and size control.\n- Icon size follows the type scale: 16px (inline), 20px (buttons), 24px (standalone).\n- Icon color inherits from `currentColor` -- never hard-code fill/stroke colors.\n- For custom/brand icons, export as SVG components with `currentColor` fills.\n- Stroke width: 1.5px-2px for outline icons. Keep consistent across the project.\n\n### Icon Sizing Scale\n\n| Context | Size | Usage |\n|---------|------|-------|\n| Inline text | 16px (1rem) | Badges, labels, breadcrumbs |\n| Button icon | 18px (1.125rem) | Icon buttons, CTA icons |\n| Standalone | 24px (1.5rem) | Navigation, card icons |\n| Feature | 32-48px | Hero sections, empty states |\n\n### SVG Optimization\n\n- Run all custom SVGs through SVGO before committing.\n- Remove unnecessary attributes: `xmlns`, `xml:space`, editor metadata.\n- Use `viewBox` instead of fixed `width`/`height` for scalability.\n\n\n---\n\n## Document Policies\n\n### No Emojis\n\nThis design system must not use emojis in any UI element, component, label, status indicator, or documentation.\nUse SVG icons from the chosen icon library instead. Emojis render inconsistently across platforms and break visual coherence.\n\n- Status indicators: use colored dots or icon components, not emoji.\n- Section markers: use text prefixes (\"DO:\" / \"DON'T:\") or icons, not checkmark/cross emojis.\n- Navigation: use icon components, not emoji.\n\n### Format Compliance\n\nThis document follows the Google Stitch DESIGN.md 9-section format:\n1. Visual Theme & Atmosphere\n2. Color Palette & Roles\n3. Typography Rules\n4. Component Stylings\n5. Layout Principles\n6. Depth & Elevation\n7. Do's and Don'ts\n8. Responsive Behavior\n9. Agent Prompt Guide\n\nExtended with:\n- Iconography & SVG Guidelines\n- Document Policies\n\nTotal target length: 250-400 lines. Keep sections concise and actionable.\n"},{"id":"d16","type":"html","src":"spec.html","title":"spec.html","content":null},{"id":"d17","type":"html","src":"feature-spec.html","title":"feature-spec.html","content":null},{"id":"d18","type":"html","src":"feature-spec-v2.html","title":"feature-spec-v2.html","content":null},{"id":"d19","type":"html","src":"edge-case-demo.html","title":"edge-case-demo.html","content":null},{"id":"d20","type":"md","src":"koen-report-v1/README.md","title":"MaroPass IBT 기획문서 v1","content":"# MaroPass IBT 기획문서 v1\n\n> 코엔(코엔, 일반사단법인) 측 공유용 기획 패키지. Newin 내부 SSOT(`spec.html`, `feature-spec.html`)와는 별개의 *외부 보고용* 문서입니다.\n\n## 시스템 구조 (3개 영역)\n\n1. **서비스 사이트 (MaroPass)** — 가입·로그인, 시험 목록, 결제, 환불, 1:1 문의, 마이페이지, **인증서·결과지 PDF 다운로드** 등 회원·결제 영역\n2. **터치클래스 사용자 web (새창)** — 결제된 시험 목록, 응시 진행, 응시 결과 확인. 서비스 사이트의 \"응시하기\" 버튼 클릭 시 **새 창**으로 진입\n3. **터치클래스 관리자 web** — 기존 솔루션 메뉴 + 신규 **회원 목록** 메뉴(서비스 사이트의 회원가입·결제 데이터 모음)\n\n> **1차 오픈 디바이스**: 데스크탑·모바일 **웹**.\n> **응시 진입 정책**: 응시는 사용자 web이 *새 창*으로 열림. 결과 확인은 사용자 web, PDF 다운로드는 서비스 사이트 마이페이지로 분리.\n\n## 패키지 구성\n\n| 파일 | 용도 |\n|---|---|\n| `index.html` | 통합 보고서 — 서비스 개요·시스템 구조·응시자 플로우·운영 정책·역할 분담·진행 단계·향후 계획 (인쇄/PDF 가능) |\n| `flow-overview.html` | 플로우 박스 다이어그램 — 응시자 5단계 + KOEN 운영자 플로우를 한눈에 (박스+화살표, 종이 시안 톤) |\n| `wireframes.html` | 화면별 와이어프레임 — 사이드바 네비로 3시스템 13개 화면 전환(서비스 사이트 7 + 사용자 web 5 + 관리자 web 1), 한/일·데스크탑/모바일 토글 지원 (종이 시안 톤, 실제 UI 아님) |\n\n## 읽는 순서 (권장)\n\n1. **`index.html`** — 통합 보고서로 사업 윤곽 + 시스템 구조 파악\n2. **`flow-overview.html`** — 응시자가 어떤 단계를 거치는지 한눈에\n3. **`wireframes.html`** — 화면별로 어떤 요소가 들어가는지 디테일\n\n## 사용 안내\n\n- **이 문서는 1차 오픈 기획 v1**입니다. UI 디자인·구현 결과물은 별도이며 변경될 수 있습니다.\n- 와이어프레임은 *흐름 확인용 박스 다이어그램*입니다. 실제 화면 디자인이 아니므로 색상·레이아웃·문구는 추후 변경됩니다.\n- 단계·범위·정책 변경은 본 패키지의 차기 버전(v2 등)으로 별도 발행됩니다.\n- 내부 GAP 번호·라벨·코드 레퍼런스는 본 패키지에서 제거되었으며, 필요 시 Newin 측에 별도 요청 가능합니다.\n\n## 발행 정보\n\n- 발행: Newin 기획팀\n- 대상: KOEN\n- 버전: v1 초안 (발행일·일정은 합의 후 확정)\n"},{"id":"d21","type":"md","src":"koen-report-v1/work-log.md","title":"work-log.md","content":"﻿\r\n---\r\n\r\n## 2026-05-12 19:39:41  `session: 04ca3be1-06ea-4860-8e92-47bad13879f0`\r\n\r\n설정 완료. 정리하면:\n\n**작성된 것**\n- 스크립트: `C:\\Users\\happy\\.claude\\hooks\\work-log.ps1` — stdin JSON 파싱 → transcript JSONL 읽어 마지막 assistant turn의 text 블록만 추출 → `<cwd>\\work-log.md`에 `--- ## 타임스탬프 \\`session: <id>\\`` 헤더와 함께 append\n- 전역 설정: `~/.claude/settings.json`에 `hooks.Stop` 등록 (shell=powershell, timeout=30s)\n\n**검증**\n- 더미 transcript로 pipe-test 통과 ✓\n- JSON schema 파싱 정상 ✓\n\n**작동 방식**\n- Claude 응답이 끝날 때마다 (Stop 이벤트) → 현재 작업 디렉토리에 `work-log.md`가 자동 생성/추가됨\n- 도구 호출 결과나 thinking은 빼고 사용자에게 보이는 텍스트 응답만 저장\n- transcript 파일이 없거나 빈 응답이면 조용히 스킵 (오류 없음)\n\n**중요 — 활성화하려면**\n현재 세션은 시작 시점 settings를 캐싱했으므로, 새로 추가한 hook이 이 세션에서는 동작 안 함. **`/hooks` 한 번 열거나 Claude Code 재시작**하면 활성화됩니다. 그 다음 응답부터 `J:\\claude\\work-log.md` (또는 cwd가 어디든 그 위치)가 자동 생성됩니다.\n\n수정 원하면: `/hooks` UI에서 끄거나, `~/.claude/settings.json`의 `hooks.Stop` 블록 삭제, 또는 `~/.claude/hooks/work-log.ps1` 직접 편집.\n\n```powershell\n[console]::beep(1000,200); Start-Sleep -Milliseconds 100; [console]::beep(1000,200)\n```\r\n\r\n---\r\n\r\n## 2026-05-12 19:40:20  `session: 04ca3be1-06ea-4860-8e92-47bad13879f0`\r\n\r\n네, 맞아요.\n\n저장 위치는 **현재 작업 디렉토리(cwd) 안의 `work-log.md`** 입니다. 즉:\n\n- `J:\\claude\\kopass`에서 작업하면 → `J:\\claude\\kopass\\work-log.md`\n- `J:\\claude\\newcourse`에서 작업하면 → `J:\\claude\\newcourse\\work-log.md`\n- 다른 폴더에서 Claude Code 띄우면 → 그 폴더의 `work-log.md`\n\n**핵심**: Claude Code가 실행될 때의 cwd 기준이라, 같은 프로젝트면 같은 파일에 누적되고, 프로젝트별로 자연스럽게 분리됩니다. hook 스크립트가 매번 stdin으로 받는 `cwd` 값을 그대로 사용하기 때문이에요.\n\n확인하려면 활성화 후 아무 응답 하나 받고 그 폴더 루트에 `work-log.md`가 생겼는지 보면 돼요.\r\n"},{"id":"d22","type":"html","src":"koen-report-v1/index.html","title":"index.html","content":null},{"id":"d23","type":"html","src":"koen-report-v1/flow-overview.html","title":"flow-overview.html","content":null},{"id":"d24","type":"html","src":"koen-report-v1/wireframes.html","title":"wireframes.html","content":null}];

/* ---------- Minimal Markdown renderer ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  // protect inline code
  const codes=[];
  s=s.replace(/`([^`]+)`/g,(m,c)=>{codes.push(c);return '␀'+(codes.length-1)+'␀';});
  s=esc(s);
  s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)[^)]*\)/g,'<img alt="$1" src="$2">');
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)[^)]*\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g,'$1<em>$2</em>');
  s=s.replace(/~~([^~]+)~~/g,'<del>$1</del>');
  s=s.replace(/␀(\d+)␀/g,(m,i)=>'<code>'+esc(codes[+i])+'</code>');
  return s;
}
function splitRow(line){
  let cells=line.trim().replace(/^\|/,'').replace(/\|$/,'').split('|');
  return cells.map(c=>c.trim());
}
function renderMD(src){
  const lines=src.replace(/\r\n/g,'\n').split('\n');
  let out=[];let i=0;

  // frontmatter
  if(lines[0]&&lines[0].trim()==='---'){
    let fm=[];i=1;
    while(i<lines.length&&lines[i].trim()!=='---'){fm.push(lines[i]);i++;}
    i++;
    if(fm.length){
      const rows=fm.filter(l=>l.trim()).map(l=>{const idx=l.indexOf(':');
        return idx>-1?'<span>'+esc(l.slice(0,idx))+'</span>: '+esc(l.slice(idx+1).trim()):esc(l);}).join('&nbsp;&nbsp;·&nbsp;&nbsp;');
      out.push('<div class="frontmatter">'+rows+'</div>');
    }
  }

  while(i<lines.length){
    let line=lines[i];
    // fenced code
    let fence=line.match(/^\s*```(.*)$/);
    if(fence){
      let buf=[];i++;
      while(i<lines.length&&!/^\s*```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++;
      out.push('<pre><code>'+esc(buf.join('\n'))+'</code></pre>');
      continue;
    }
    // heading
    let h=line.match(/^(#{1,6})\s+(.+)$/);
    if(h){out.push('<h'+h[1].length+'>'+inline(h[2].trim())+'</h'+h[1].length+'>');i++;continue;}
    // hr
    if(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)){out.push('<hr>');i++;continue;}
    // table
    if(line.includes('|')&&i+1<lines.length&&/^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(lines[i+1])&&lines[i+1].includes('-')){
      const header=splitRow(line);i+=2;
      let rows=[];
      while(i<lines.length&&lines[i].includes('|')&&lines[i].trim()!==''){rows.push(splitRow(lines[i]));i++;}
      let t='<table><thead><tr>'+header.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>';
      for(const r of rows){t+='<tr>'+header.map((_,ci)=>'<td>'+inline(r[ci]||'')+'</td>').join('')+'</tr>';}
      t+='</tbody></table>';out.push(t);continue;
    }
    // blockquote
    if(/^\s*>/.test(line)){
      let buf=[];
      while(i<lines.length&&/^\s*>/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,''));i++;}
      out.push('<blockquote>'+renderMD(buf.join('\n'))+'</blockquote>');continue;
    }
    // lists
    if(/^\s*([-*+]|\d+\.)\s+/.test(line)){
      const [html,ni]=parseList(lines,i,0);out.push(html);i=ni;continue;
    }
    // blank
    if(line.trim()===''){i++;continue;}
    // paragraph
    let buf=[line];i++;
    while(i<lines.length&&lines[i].trim()!==''&&!/^(#{1,6}\s|\s*```|\s*>|\s*([-*+]|\d+\.)\s)/.test(lines[i])
          &&!/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(lines[i])
          &&!(lines[i].includes('|')&&i+1<lines.length&&/^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(lines[i+1]))){
      buf.push(lines[i]);i++;
    }
    out.push('<p>'+inline(buf.join(' ').trim())+'</p>');
  }
  return out.join('\n');
}
function indentOf(l){const m=l.match(/^(\s*)/);return m[1].replace(/\t/g,'  ').length;}
function parseList(lines,start,baseIndent){
  let i=start;
  const first=lines[i];
  const ordered=/^\s*\d+\.\s/.test(first);
  const tag=ordered?'ol':'ul';
  let html='<'+tag+'>';
  while(i<lines.length){
    const l=lines[i];
    if(l.trim()===''){ // possible list continuation
      if(i+1<lines.length&&/^\s*([-*+]|\d+\.)\s+/.test(lines[i+1])&&indentOf(lines[i+1])>=baseIndent){i++;continue;}
      break;
    }
    const m=l.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(!m)break;
    const ind=m[1].replace(/\t/g,'  ').length;
    if(ind<baseIndent)break;
    if(ind>baseIndent){ // nested
      const [sub,ni]=parseList(lines,i,ind);
      html=html.replace(/<\/li>$/,'')+sub+'</li>';
      i=ni;continue;
    }
    html+='<li>'+inline(m[3]);
    i++;
    html+='</li>';
  }
  html+='</'+tag+'>';
  return [html,i];
}

/* ---------- Build nav ---------- */
const navEl=document.getElementById('nav');
NAV.forEach(g=>{
  const gEl=document.createElement('div');gEl.className='nav-group';
  gEl.innerHTML='<div class="nav-group-title">'+g.icon+' '+g.title+'</div>';
  g.items.forEach(it=>{
    const b=document.createElement('button');b.className='nav-item';b.dataset.id=it.id;
    b.dataset.search=(it.title+' '+it.file).toLowerCase();
    b.innerHTML=escHtml(it.title)+(it.type==='html'?'<span class="badge-html">HTML</span>':'')+'<span class="fn">'+escHtml(it.file)+'</span>';
    b.addEventListener('click',()=>{select(it.id);closeNav();});
    gEl.appendChild(b);
  });
  navEl.appendChild(gEl);
});
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- Selection ---------- */
const view=document.getElementById('view');
function select(id){
  const d=byId[id];if(!d)return;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  document.getElementById('docTitle').textContent=d.title;
  document.getElementById('docFile').textContent=d.src;
  if(d.type==='html'){
    view.innerHTML='<div class="frame-wrap"><div class="frame-bar">🖥️ 원본 HTML 문서 · <a href="'+d.src+'" target="_blank" rel="noopener">새 탭에서 열기 ↗</a></div><iframe class="doc" src="'+d.src+'"></iframe></div>';
  }else{
    view.innerHTML='<div class="content"><article class="md">'+renderMD(d.content)+'</article></div>';
    document.querySelector('.main').scrollTop=0;window.scrollTo(0,0);
  }
  if(history.replaceState)history.replaceState(null,'','#'+id);
}

/* ---------- Search ---------- */
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('hidden',q&&!n.dataset.search.includes(q));
  });
  document.querySelectorAll('.nav-group').forEach(g=>{
    const any=[...g.querySelectorAll('.nav-item')].some(n=>!n.classList.contains('hidden'));
    g.classList.toggle('hidden',!any);
  });
});

/* ---------- Mobile nav ---------- */
const app=document.getElementById('app');
function closeNav(){app.classList.remove('nav-open');}
document.getElementById('menuBtn').addEventListener('click',()=>app.classList.toggle('nav-open'));
document.getElementById('scrim').addEventListener('click',closeNav);

/* ---------- Init ---------- */
const initId=(location.hash||'').replace('#','');
select(byId[initId]?initId:DOCS[0].id);
</script>
