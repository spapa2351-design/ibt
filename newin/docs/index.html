<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MaroPass IBT — 문서 인덱스</title>
<style>
:root{
  --blue:#2e84ff; --blue-hover:#2272eb; --blue-50:#e8f3ff;
  --ink:#191f28; --g900:#191f28; --g800:#333d4b; --g700:#4e5968; --g600:#6b7684;
  --g500:#8b95a1; --g400:#b0b8c1; --g300:#d1d6db; --g200:#e5e8eb; --g100:#f2f4f6; --g50:#f9fafb;
  --white:#fff; --red:#f04452; --green:#03b26c; --orange:#fe9800;
  --radius:16px; --radius-sm:10px;
  --sidebar:288px;
  --font:'Toss Product Sans','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',Roboto,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--g800);background:var(--g50);-webkit-font-smoothing:antialiased;line-height:1.6}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);flex:0 0 var(--sidebar);background:var(--white);border-right:1px solid var(--g200);
  position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.brand{padding:22px 24px 14px;border-bottom:1px solid var(--g100)}
.brand h1{font-size:17px;font-weight:700;color:var(--g900);margin:0;letter-spacing:-.02em}
.brand p{font-size:12px;color:var(--g500);margin:4px 0 0}
.search{padding:14px 16px 6px}
.search input{width:100%;border:1px solid var(--g200);background:var(--g50);border-radius:10px;
  padding:9px 12px;font-size:13px;font-family:inherit;color:var(--g800);outline:none;transition:.15s}
.search input:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px var(--blue-50)}
.nav{padding:6px 10px 24px;flex:1}
.nav-group{margin-top:12px}
.nav-group-title{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;
  padding:8px 12px 6px;display:flex;align-items:center;gap:7px}
.nav-item{display:block;padding:8px 12px;border-radius:9px;font-size:13.5px;color:var(--g700);cursor:pointer;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:.12s;line-height:1.4}
.nav-item .fn{display:block;font-size:11px;color:var(--g400);margin-top:1px}
.nav-item:hover{background:var(--g50);color:var(--g900)}
.nav-item.active{background:var(--blue-50);color:var(--blue-hover);font-weight:600}
.nav-item.active .fn{color:#7db0f5}
.nav-item.hidden{display:none}
.nav-group.hidden{display:none}
.badge-html{display:inline-block;font-size:9px;font-weight:700;background:var(--g100);color:var(--g500);
  border-radius:4px;padding:1px 4px;margin-left:5px;vertical-align:middle}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--g200);padding:14px 32px;display:flex;align-items:center;gap:12px}
.topbar .doc-title{font-size:15px;font-weight:700;color:var(--g900);letter-spacing:-.01em}
.topbar .doc-file{font-size:12px;color:var(--g500);margin-left:auto;font-variant-numeric:tabular-nums}
.menu-btn{display:none;border:1px solid var(--g200);background:var(--white);border-radius:8px;
  width:36px;height:36px;font-size:16px;cursor:pointer;color:var(--g700)}
.content{flex:1;padding:36px 44px 96px;max-width:920px;width:100%;margin:0 auto}

/* iframe view */
.frame-wrap{flex:1;display:flex;flex-direction:column}
.frame-bar{padding:10px 32px;background:var(--g50);border-bottom:1px solid var(--g200);
  display:flex;align-items:center;gap:10px;font-size:12px;color:var(--g500)}
.frame-bar a{font-weight:600}
iframe.doc{flex:1;width:100%;border:none;background:var(--white);min-height:calc(100vh - 96px)}

/* Markdown */
.md{color:var(--g700);font-size:15px}
.md h1{font-size:28px;font-weight:700;color:var(--g900);letter-spacing:-.02em;margin:8px 0 20px;line-height:1.3}
.md h2{font-size:21px;font-weight:700;color:var(--g900);letter-spacing:-.01em;margin:38px 0 14px;
  padding-bottom:9px;border-bottom:1px solid var(--g200)}
.md h3{font-size:17px;font-weight:700;color:var(--g800);margin:28px 0 10px}
.md h4{font-size:14.5px;font-weight:700;color:var(--g800);margin:20px 0 8px}
.md p{margin:12px 0}
.md ul,.md ol{margin:12px 0;padding-left:24px}
.md li{margin:5px 0}
.md li>ul,.md li>ol{margin:5px 0}
.md strong{font-weight:700;color:var(--g900)}
.md em{font-style:italic}
.md code{background:var(--g100);color:#c2255c;font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
  font-size:.86em;padding:2px 6px;border-radius:6px}
.md pre{background:var(--g900);color:#e5e8eb;border-radius:12px;padding:18px 20px;overflow-x:auto;margin:16px 0;line-height:1.55}
.md pre code{background:none;color:inherit;padding:0;font-size:13px}
.md blockquote{border-left:3px solid var(--blue);background:var(--blue-50);margin:16px 0;padding:12px 18px;
  border-radius:0 10px 10px 0;color:var(--g700)}
.md blockquote p{margin:6px 0}
.md hr{border:none;border-top:1px solid var(--g200);margin:32px 0}
.md a{border-bottom:1px solid transparent;transition:.12s}
.md a:hover{border-bottom-color:var(--blue);text-decoration:none}
.md table{border-collapse:collapse;width:100%;margin:18px 0;font-size:13.5px;display:block;overflow-x:auto}
.md thead th{background:var(--g50);color:var(--g800);font-weight:700;text-align:left}
.md th,.md td{border:1px solid var(--g200);padding:9px 13px;vertical-align:top}
.md tbody tr:nth-child(even){background:var(--g50)}
.md .frontmatter{background:var(--g50);border:1px solid var(--g200);border-radius:10px;padding:10px 16px;
  margin:0 0 20px;font-size:12px;color:var(--g500);font-family:'SF Mono',ui-monospace,monospace}
.md .frontmatter span{color:var(--g700)}
.md img{max-width:100%;border-radius:10px}

/* overlay for mobile */
.scrim{display:none;position:fixed;inset:0;background:rgba(2,9,19,.4);z-index:9}

@media (max-width:860px){
  .sidebar{position:fixed;left:0;top:0;z-index:10;transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 8px 40px rgba(2,9,19,.12)}
  .app.nav-open .sidebar{transform:translateX(0)}
  .app.nav-open .scrim{display:block}
  .menu-btn{display:inline-flex;align-items:center;justify-content:center}
  .content{padding:24px 18px 80px}
  .topbar{padding:12px 16px}
  .frame-bar{padding:10px 16px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>MaroPass IBT</h1>
      <p>기획 · 설계 문서 인덱스</p>
    </div>
    <div class="search"><input id="search" type="search" placeholder="문서 검색…" autocomplete="off"></div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>
  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="메뉴">☰</button>
      <span class="doc-title" id="docTitle">문서를 선택하세요</span>
      <span class="doc-file" id="docFile"></span>
    </div>
    <div id="view"></div>
  </main>
</div>

"file":"work-log.md","type":"md"},{"id":"d22","title":"index.html","file":"index.html","type":"html"},{"id":"d23","title":"flow-overview.html","file":"flow-overview.html","type":"html"},{"id":"d24","title":"wireframes.html","file":"wireframes.html","type":"html"}]}];
const DOCS = [{"id":"d0","type":"md","src":"README.md","title":"MaroPass IBT — 기획·설계 문서","content":"# MaroPass IBT — 기획·설계 문서\n\n## 한 줄\n\n**일본인 한국어 학습자가 말하기 실력을 객관적으로 진단할 수 있는 IBT 플랫폼을 만든다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 일본 내 TOPIK 응시자 4.9만명/년 중 92.6%가 말하기 응시를 희망하지만, TOPIK 말하기는 일본 시행 구조가 없다.\n2. 한국 TOPIK IBT는 전용 시험장과 전용 브라우저 설치를 요구하는데, 일본 내 보안 정서·기업/학교 PC 정책상 설치가 사실상 불가능하다.\n3. 한국이 2029년 재택형 IBT를 예고하고 있어, 일본형 솔루션을 선제 구축하면 기술 우위를 확보할 수 있다.\n4. 일본인 학습자는 편리함보다 안정성·명확성·예측 가능성을 우선시하므로, 일본 환경에 재설계된 시스템이 별도로 필요하다.\n5. 시험을 일회성 이벤트가 아니라 응시 → 평가 → 피드백 → 학습으로 이어지는 진단 플랫폼으로 설계할 수 있다.\n\n---\n\n## 30초 컨텍스트\n\n| 항목 | 내용 |\n|---|---|\n| 사업명 | MaroPass IBT (IBT = Internet Based Test · 풀네임 추후 확정) |\n| 포지셔닝 | TOPIK 대체 아님. 일본인 학습자용 진단·모의고사 (공인 X) |\n| **Phase 1 범위** | **말하기 단독.** 다른 영역(쓰기·듣기·읽기)은 본 문서 범위 외 |\n| 응시 모드 | **온라인 전용**. 오프라인 시험장 없음 |\n| **시스템 구조** | **3개 시스템 분담** — 서비스 사이트 (MaroPass) + 터치클래스 사용자 web (새창 응시) + 터치클래스 관리자 web |\n| **1차 오픈 디바이스** | **데스크탑·모바일 웹만**. iOS/Android 네이티브 앱과 푸시 알림은 라운드 2 이후 |\n| **응시 진입 정책** | 마이페이지 \"응시하기\" → **새 창**으로 사용자 web home (팝업 차단 안내 포함) |\n| **결과·PDF 분리** | 결과 확인 = 사용자 web / PDF 다운로드(영수증·인증서·결과지) = 서비스 사이트 마이페이지 |\n| 운영 분담 | Newin = 시스템 개발·운영·유지보수 / KOEN = 시행 운영·1:1 문의 대응·결과 공개 처리·환불 승인 |\n| 디자인 톤 | calm·optimistic·trustworthy. 일본어 우선 · 한국어 콘텐츠는 `:lang(ko)` 분기 |\n| 폰트 | Pretendard Variable + Pretendard JP Variable (한·일 동시 지원) |\n| 개발사 | Newin 단독 개발 |\n| 일정 | 기획 초안 → 디자인 → 개발 → 베타 → 정식 개시 (날짜 별도 합의) |\n\n---\n\n## 시작 지점 (Quick Links)\n\n- 🎯 **`../ui/ui-index.html`** — UI 디자인 허브 (모든 화면으로 점프)\n- 📋 **`spec.html`** — 통합 SSOT (13섹션 설계서)\n- ⚠️ **`critical-decisions.md`** — Critical 4개 결정 안건 (외부 미팅용)\n\n## 프로젝트 폴더 구조\n\ndocs/ 는 **문서 전용**. UI 구현은 별도 `ui/` 트리에서 정책 10의 3개 시스템 분담을 그대로 따른다.\n\n```\nkopass/\n├── docs/                    ← 본 폴더, 기획·설계 문서만\n│   ├── README.md            ← 본 파일\n│   ├── 01-glossary.md ~ 08-design-system.md  (기획 md 11)\n│   ├── critical-decisions.md\n│   ├── open-questions.md\n│   ├── phase-roadmap.md\n│   ├── newinDESIGN.md\n│   ├── reference-existing-topik-jp.md\n│   ├── spec.html            ← 통합 SSOT\n│   ├── feature-spec.html\n│   └── koen-report-v1/      ← 외부 보고서 자료\n├── ui/                      ← UI 구현 (정책 10 — MaroPass portal + 터치클래스 자산 재사용)\n│   ├── ui-index.html        ← UI 디자인 허브 (모든 화면 점프)\n│   ├── service-site/  (15)  ← ★ 신규 — MaroPass portal (결제·환불·인증서)\n│   ├── user-web/      ( 4)  ← ◇ 기존 터치클래스 사용자 web — MaroPass 시험 응시 영역 추가분\n│   ├── admin/         ( 5)  ← ◇ 기존 터치클래스 관리자 web — MaroPass 메뉴 5개 추가분\n│   └── shared/        ( 2)  ← 공유 JS 모듈 (env-check-modal, exam-info-modal)\n├── design/                  ← 디자인 가이드(DESIGN.md 등)\n├── img/\n├── re/                      ← 회의록·계획안·실증 보고서\n└── index.html               ← 프로젝트 진입점\n```\n\n---\n\n## 문서 인덱스\n\n### 📐 기획·설계 마크다운 (11)\n\n| 파일 | 내용 |\n|---|---|\n| `01-glossary.md` | 도메인 용어 — TOPIK 말하기 1형~6형, 등급 체계, 채점 단계 |\n| `02-system-map.md` | **3개 시스템 분담** (서비스 사이트 / 사용자 web / 관리자 web) + AI 엔진 + 책임 경계 + Newin × KOEN 역할 |\n| `03-user-flows.md` | 주체·권한 매트릭스 + 사이트맵 + 응시자 5단계 플로우 (새창 정책 포함) |\n| `04-policy.md` | 1차 오픈 운영 정책 10개 (환경 점검·응시 진행·자동 저장·종료·결과 공개·재응시·환불·회차·회원 자격·**새창 정책**) |\n| `05-screen-inventory.md` | 화면 인벤토리 + 빠진 화면 + 반응형 매트릭스 + 디자인 발주 우선순위 |\n| `06-feature-spec.md` | **응시자 측** 라인 아이템 기능 명세 5×11 (한국 LMS 스펙 → 일본·라이트 정정) + Phase 1 라벨 |\n| `06-admin-feature-spec.md` | **관리자 측** 라인 아이템 기능 명세 5메뉴 + ★ [향후 핵심] 문제 만들기 |\n| `07-ia.md` | 정보 구조 (IA) — GNB·하단탭·페이지 인벤토리·콘텐츠 블록·라벨 사전 |\n| `08-design-system.md` | 디자인 시스템 — 컬러·타이포·컴포넌트 토큰 + 시험 UI 특수 요소 + i18n 폰트 분기 |\n| `09-edge-cases.md` | 엣지케이스 카탈로그 — 6묶음(응시 중단·환경 변화·결제 정합성·시간 경계·운영 SLA·어뷰징) |\n| `phase-roadmap.md` | Phase 1 (1차 오픈) 범위, Phase 2/3 후속, 작성 예정 문서 목차 |\n| `open-questions.md` | 갭 트래커 (GAP-01~15 + 심각도 라벨 🔴Critical / 🟠Important / 🟡Minor / DEFERRED) |\n\n### 🎯 의사결정·통합 SSOT·참고\n\n| 파일 | 내용 |\n|---|---|\n| `critical-decisions.md` | ⚠ Critical 4개 결정 안건 (외부 미팅용 1페이지) — 결정 후 삭제 |\n| `spec.html` | **통합 SSOT** — 13섹션 설계서 |\n| `feature-spec.html` | 기능명세서 v1 — 응시자 U1~U6 + 관리자 A1~A6 130케이스 / 좌측 필터 + 우측 미리보기 iframe |\n| `feature-spec-v2.html` | 기능명세서 v2 — v1 데이터 + 📍 위치 하이라이트 (data-feature-id) + file:// 환경 감지 배너 |\n| `edge-case-demo.html` | 응시자 시점 엣지케이스 데모 (30 케이스 버튼 → 우측 프리뷰) |\n| `newinDESIGN.md` | 외부 디자인 시스템 베이스 자료 (`08-design-system.md`가 참조) — reference only |\n| `reference-existing-topik-jp.md` | 현행 TOPIK 일본 사이트 분석 — 응시자가 익숙한 동선 |\n\n### 🎨 service-site/ — ★ 신규 MaroPass portal (결제·환불·인증서 — 응시자 측 15)\n\n| 파일 | 내용 |\n|---|---|\n| `../ui/service-site/ui-main-home.html` | 메인 홈 + GNB (Hero·통계·추천·TOPIK 관계·서비스 소개·FAQ 6개 아코디언) |\n| `../ui/service-site/ui-tests-list.html` | 시험 목록 (필터·검색·카드 그리드·페이지네이션) |\n| `../ui/service-site/ui-test-detail.html` | 시험 상세 (헤로 + 콘텐츠 + sticky 구매 카드 + 회원 게이트 정책 9) |\n| `../ui/service-site/ui-auth.html` | 회원가입 / 로그인 (모드 토글, `?intent=sample\\|purchase&return=…` 자동 복귀) |\n| `../ui/service-site/ui-checkout.html` | 결제 페이지 (Step 인디케이터 3단 + 새창 응시 안내 + 환경 점검 30일 안내 + 결제 수단 + sticky 요약, i18n) |\n| `../ui/service-site/ui-checkout-complete.html` | 결제 완료 (애니메이션 체크 + 영수증 + 새창 응시 진입 CTA) |\n| `../ui/service-site/ui-mypage.html` | 마이페이지 대시보드 (사이드바 8 + 환영 카드 + 빠른 진입 + 응시·결과 위젯 + 새창 응시 진입) |\n| `../ui/service-site/ui-mypage-tests.html` | 마이페이지 / 응시할 시험 (D-day 카운트, 새창 응시 트리거) |\n| `../ui/service-site/ui-mypage-results.html` | 마이페이지 / 결과 (3건 + 필터 칩) |\n| `../ui/service-site/ui-mypage-certificates.html` | 마이페이지 / 인증서 (PDF 카드 + 빈 슬롯) |\n| `../ui/service-site/ui-mypage-payments.html` | 마이페이지 / 결제 내역 (요약 + 테이블) |\n| `../ui/service-site/ui-mypage-refunds.html` | 마이페이지 / 환불 (Empty State + 정책) |\n| `../ui/service-site/ui-mypage-profile.html` | 마이페이지 / 프로필 (폼 + 알림 + 탈퇴) |\n| `../ui/service-site/ui-mypage-inquiries.html` | 마이페이지 / 문의 내역 (2건 + 답변 상태) |\n| `../ui/service-site/ui-faq.html` | FAQ (Hero 검색 + 5 카테고리 + 15개 아코디언) |\n\n### 🪟 user-web/ — ◇ 기존 터치클래스 사용자 web + MaroPass 응시 영역 추가 (4)\n\n| 파일 | 내용 |\n|---|---|\n| `../ui/user-web/ui-exam-home.html` | **사용자 web 홈** — 다크 탑바 · 결제된 시험 + 응시 완료 + 안내 · 본인 확인 → 환경 점검 same-window 분기 (정책 10 새창 진입점) |\n| `../ui/user-web/ui-exam.html` | 응시 화면 (**상하 70/30** · 1080px shell · 32px 타이머 + 미니 원형 progress · 헤더 stage pill · 준비/녹음 상태 토글) |\n| `../ui/user-web/ui-env-check.html` | 환경 점검 standalone (모달 외 페이지 버전) |\n| `../ui/user-web/ui-result.html` | 결과 화면 (5각 차트 + AI 피드백 + 문항별 + 인증서 CTA + 모달) |\n\n### 🛠 admin/ — ◇ 기존 터치클래스 관리자 web + MaroPass 메뉴 5개 추가\n\n**기존 터치클래스 관리자 web에 MaroPass 메뉴 5개(회원·결제·환불 승인·결과 공개·인증서 템플릿)와 문제 만들기 안 MaroPass 말하기 5영역 탭만 신설**. 시험 관리·문제 은행·응시자 관리·평가/채점·통계·시스템 설정은 기존 자산 그대로. 좌측 사이드바 5블록 — **대시보드 → 응시자 → 회원 → 시험 → 설정** (회원/응시자 그룹이 최상단, 운영팀 일상 사용 빈도 기준). 응시 결과·관리자 계정·인증서 템플릿·통계는 라운드 2.\n\n| 파일 | 내용 |\n|---|---|\n| `../ui/admin/ui-admin-dashboard.html` | 대시보드 — 4 KPI + 미답변 문의 4건 + 빠른 액션 + 최근 7일 응시 추이 막대 그래프 |\n| `../ui/admin/ui-admin-members.html` | 응시자 회원 목록 (상태·이름·이메일·등급·최근 응시일·누적 응시·임시 PW·관리) |\n| `../ui/admin/ui-admin-payments.html` | 결제 관리 (결제일·응시자·시험·금액 ¥·상태 5종·영수증+환불 처리) |\n| `../ui/admin/ui-admin-question-bank.html` | 문제 은행 (분류 트리 — 초급/중상급 × 5영역 + 표) |\n| `../ui/admin/ui-admin-question-create.html` | 문제 만들기 — 251020 ver.3 5영역 탭 + sticky 핸드폰 frame 라이브 프리뷰 |\n\n> MaroPass admin은 **말하기 전용**. 객관식·주관식은 본가 시스템(별도 인프라) 사용.\n\n### 🔌 shared/ — 공유 JS 모듈\n\n| 파일 | 내용 |\n|---|---|\n| `../ui/shared/env-check-modal.js` | 환경 점검 모달 (마이크·볼륨·5초 리플레이·네트워크), 통과 이력 30일 유효 |\n| `../ui/shared/exam-info-modal.js` | 시험 안내 모달 (서비스 사이트에서 새창 응시 트리거 — `window.open`) |\n| `../ui/shared/feature-highlight.js` | 기능명세서 미리보기 iframe 내부 수신 스크립트 — `postMessage` → `data-feature-id` 매칭 → 5초 점멸·툴팁 |\n\n---\n\n## 응시자 측 화면 동선 (3 시스템 분담 반영)\n\n```\nui/ui-index.html (허브)\n  ↓\nui/service-site/\n  ui-main-home.html ──→ ui-tests-list.html ──→ ui-test-detail.html\n                                                    ├─ 바로 구매 ─→ ui-checkout.html ─→ ui-checkout-complete.html\n                                                    └─ 무료 샘플 (회원 게이트) ──→ ui-auth.html?intent=sample\n                                                                              ↓ 가입 후 복귀\n                                                                              ../user-web/ui-exam.html (sample)\n\n  ui-mypage.html (대시보드, 사이드바 8)\n       ├─ 응시하기 ──[window.open, 정책 10]──→ user-web/ui-exam-home.html (새 창)\n       ├─ 결과 보기 ──→ user-web/ui-result.html\n       └─ PDF 다운로드 (영수증·인증서·결과지) ─── 본 사이트에서 처리\n\n  ui-faq.html (모든 GNB 고객센터 진입점)\n\nui/user-web/  (새 창 — 응시 전용, SSO 자동 로그인)\n  ui-exam-home.html  ──→ 본인 확인 → 환경 점검 (30일 유효 캐시) → ui-exam.html → ui-result.html\n                         (모두 same-window, 새 창 안에서 완결)\n  ui-result.html  ──→ \"시험 창 닫기\" → 본 사이트 ../service-site/ui-mypage.html\n\nui/admin/  (관리자 web — 운영자 단독 진입, SSO 별도)\n  ui-admin-dashboard.html  ↔ members / payments / question-bank / question-create\n\nui/shared/\n  env-check-modal.js  ←  service-site 모든 결제·진입 경로 + user-web 응시 홈\n  exam-info-modal.js  ←  service-site 무료 샘플 트리거 (window.open)\n```\n\n**모든 페이지 공통**:\n- 좌하단 *← UI 인덱스* 버튼 (서브폴더에선 `../ui-index.html`)\n- 한국어 / 日本語 i18n 토글 (localStorage `kopass_main_locale` 공유)\n- 햄버거 메뉴 (≤768px) — 풀너비 드로어 + 좌우 20px 패딩\n- 반응형 — 데스크탑 / 태블릿 / 모바일 (자동 1단 스택)\n- 폰트 — Pretendard Variable + Pretendard JP Variable 통일\n- 베이스 리셋 — `box-sizing: border-box` + `overflow-x: clip` + 미디어 max-width\n- 응시 화면(user-web/ui-exam.html)은 **1080px shell 카드 + grey-100 배경**으로 집중 환경 구성\n\n> **응시 진입 = 새 창** (정책 10): `../ui/service-site/ui-mypage*.html`의 \"응시하기\" → `window.open()` → `../ui/user-web/ui-exam-home.html`. 새 창 안에서 본인 확인 → 환경 점검 → 응시 → 결과까지 same-window로 완결. 보관 자료(영수증·인증서·결과지 PDF) 다운로드만 본 사이트(service-site) 마이페이지에서 처리.\n\n---\n\n## 작성 원칙\n\n- 팩트만 기술. 추측은 `open-questions.md`로.\n- \"완료\" \"확정\" \"100%\" 같은 진척 표현 금지. 결정은 git history에서 트래킹.\n- 결정자 이름·날짜 본문에 박지 않는다.\n- 시각적 장식(배지·매트릭스)은 v2에서 검토.\n- 본 라운드는 Phase 1(말하기)에 집중. 향후 영역 확장 가설은 본문에 쓰지 않는다.\n- **1차 오픈은 라이트하게**. 환불 분기·재응시 티켓·딥링크 같은 무거운 동선은 라운드 2 이후로 미룬다.\n\n## 자료 우선순위\n\n자료가 충돌할 때의 기준선:\n\n1. **`Kopass 서비스 개발 기능 명세.pdf`** ← **가장 최근 합의 문서.** 본 라운드의 골격은 여기에서 따온다.\n2. `re/MaroPass IBT 시스템 개발 (1차 말하기) ... .md` — 마스터 작업 노트 (디테일 풍부, 일부는 구버전)\n3. `re/251231_MaroPass_개발_프로젝트.pdf` — Newin 내부 개발 플로우\n4. `re/251222_MaroPass_IBT_시스템_개발_계획(안).pdf` — 재단 측 공식 계획안\n5. `re/260106_한국어_말하기_평가_실증실험_설문조사_결과.pdf` — 실증 페인포인트\n6. `img/` 디자인 자료 — 모바일 1단 위주, 일부 화면만 존재\n7. `re/*.docx`, `re/*.pptx` — 본 라운드 미열람\n"},{"id":"d1","type":"md","src":"critical-decisions.md","title":"Critical 4개 결정 안건 (Phase 1 차단)","content":"# Critical 4개 결정 안건 (Phase 1 차단)\n\n> 본 문서는 **외부 결정 미팅용 1페이지 어젠다**다. 답이 채워지면 본 문서는 삭제하고 본문에 분산 반영한다.\n>\n> **시스템 구조**(★ MaroPass portal + ◇ 터치클래스 자산 재사용)는 정책 10에서 이미 합의 — 본 4개 결정과 별개의 트랙. 자세한 시스템 분담은 `04-policy.md` 정책 10 참조.\n\n## 한 줄\n\n**1차 오픈(2026.9) 디자인·개발 발주를 시작하기 위해 GAP-01 / GAP-02 / GAP-11 / GAP-12 4개 결정이 필요하다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 4개 모두 *🔴 Critical* — 결정 없이 진행하면 *추측에 기반한 디자인·DB·스펙*이 박혀 나중 수정 비용이 일정 위험으로 직결된다.\n2. 4개 중 3개는 외부(한국교육재단·외부 PG·디자인 발주처)에 결정 권한이 있으므로, 의사결정 리드 타임을 *이번 주*에 확보해야 한다.\n3. 결정 1개당 영향 영역이 *디자인 + DB + UI 워크플로우 + 운영 정책* 4개에 걸쳐 있어, 각 결정이 미루어질수록 차단 영역이 기하급수적으로 늘어난다.\n4. Important / Minor 갭은 가정으로 1차 진행이 가능하지만 Critical 4개는 가정 자체가 위험하다.\n5. 본 안건이 결정되면 라운드 2 진입(`10-grading.md` · `14-payment.md` 깊이 확장)이 즉시 가능하다.\n\n---\n\n## 결정 회의 어젠다 (체크리스트)\n\n- [ ] **GAP-01** 등급 체계 확정\n- [x] ~~**GAP-02** 말하기 3~6형 정의 확보~~ → 초급 5영역 251020 ver.3 해소. 중상급은 OPEN.\n- [ ] **GAP-11** 데스크탑 응시 UI 디자인 발주 의사결정\n- [ ] **GAP-12** 결제 PG사 선정\n\n---\n\n## GAP-01 — 등급 체계 확정\n\n### 배경\n\n자료 4종 사이에 등급 표기가 일관되지 않다.\n\n| 자료 | 표기 |\n|---|---|\n| 마스터 문서 | \"A~D 4단계 진단 등급\" |\n| 시험 결과 디자인 (`img/시험(채점) 결과.png`) | **1급 / 6급** |\n| AI 피드백 디자인 (`img/1번 문항- Ai 피드백.png`) | **B / Good** (A~F 추정) |\n| 응시자 관리 백오피스 | \"1급\" 표시, \"등급별\" 필터 |\n\n### 옵션\n\n| # | 옵션 | 장점 | 단점 |\n|---|---|---|---|\n| **A (권장)** | **2-track 분리** — 종합 진단 = 1~6급(TOPIK 매핑) / 문항별 학습용 = A~F | 디자인 자료 3종을 모두 수용 / 응시자가 TOPIK 등급으로 자기 위치를 즉시 이해 | DB·UI에 두 트랙을 모두 모델링해야 함 |\n| B | A~D 4단계 단일 (마스터 문서 그대로) | 단순 / 디자인 충돌 적음 | 디자인 자료의 1급/6급·B/Good 모두 폐기 |\n| C | 1~6급 단일 (디자인 그대로) | 디자인 자료 보존 | 마스터 문서의 A~D·문항별 A~F 폐기, 학습용 피드백 등급 표현 부재 |\n\n### 결정 후 영향\n\n- **디자인**: 성적표 화면(5각 차트 색상·등급 배지) / AI 피드백 모달(등급 박스 색상)\n- **DB**: `attempt.overall_grade` 컬럼 enum / `feedback_per_question.grade` 별도 컬럼\n- **AI 출력 스펙**: 1차 채점 결과 JSON에 두 등급 동시 포함\n- **시험 통과 조건 정의**: 통과 = 종합 N급 이상 / 평균 X점 이상\n\n### 결정 주체\n\n**한국교육재단** (출제·평가 기준 담당)\n\n### 마감\n\n⛳ **2주 내** — 디자인 시스템(`08-design-system.md`)의 등급 배지 색상 매핑 확정에 직접 영향.\n\n---\n\n## GAP-02 — 말하기 영역 정의 (초급 해소 / 중상급 OPEN)\n\n### 초급 — 해소\n\n`re/251020_speaking_test_beginner_ko_re3.docx`에 초급 5영역 정의 확인. 영역 6은 ver.3에서 삭제됨(0·1·2·3·4·5·7 번호 체계, 0번 준비/7번 마무리 제외).\n\n| # | 영역 | 문항 | 배점 | 준비 / 녹음 |\n|---|---|---|---|---|\n| 1 | 짧은 문장 읽기 | 10 | 20 | 0초 / 10초 |\n| 2 | 질문 대답 | 5 | 30 | 10초 / 20초 |\n| 3 | 생활 속 대화 | 4 | 24 | 20초 / 20초 |\n| 4 | 그림/사진 설명 | 3 | 18 | 30초 / 40초 |\n| 5 | 화용 과제 | 1 | 8 | 40초 / 50초 |\n\n→ `01-glossary.md` / `06-admin-feature-spec.md` / `ui-admin-question-create.html` 5영역 탭에 반영.\n\n### 중상급 — OPEN\n\n중상급 영역 구성은 미확정. 박천홍·하정일 교수 미팅에서 확정 필요. 그 전까지 admin UI는 초급 5영역만 노출.\n\n### 결정 후 영향 (중상급 한정)\n\n- **디자인**: 중상급 영역별 문제 등록 폼\n- **DB**: 영역 enum 확장\n- **AI 채점**: 영역별 평가 알고리즘 분기 (의견 제시·롤플레이·프레젠테이션 등)\n- **시험지 구성**: 중상급 시험지의 영역 분배\n\n### 결정 주체\n\n박천홍 교수·하정일 교수 (중상급)\n\n---\n\n## GAP-11 — 데스크탑 응시 UI 디자인 발주\n\n### 배경\n\n**데스크탑이 1순위 디바이스**로 명시됐으나, 본 디자인 자료의 응시 화면 13장은 **모두 모바일 1단**.\n\n마스터 문서: *\"좌측(문제 영역) / 우측(응시 영역) 2단 분할\"*\n\n### 옵션\n\n| # | 옵션 | 장점 | 단점 |\n|---|---|---|---|\n| **A (권장)** | **반응형 데스크탑 뷰포트 디자인 추가 발주** (모바일 디자인을 데스크탑 break로 확장) | 디자인 일관성 유지 / 1차 오픈 일정 수렴 | 디자인 비용 추가 |\n| B | 모바일 디자인 그대로 데스크탑에서 *최대 768px 폭 제한* | 발주 비용 0 | 1순위 디바이스에서 화면 활용도 낮아 사용자 경험 저하 |\n| C | 데스크탑은 라운드 2로 미루고, 1차 오픈은 모바일·앱만 운영 | 발주 비용·일정 절감 | 사용자 1순위 디바이스 미지원이라 시장 출시 의미 약화 |\n\n### 결정 후 영향\n\n- **디자인 발주**: 응시 화면 13장 + 환경 점검 + 오리엔테이션 + 결과 = **약 20+ 화면 데스크탑 뷰포트 추가 발주**\n- **개발**: 반응형 break 추가 코딩\n- **QA**: 데스크탑 테스트 케이스 추가\n\n### 결정 주체\n\n**Newin 내부** (디자인 발주 의사결정)\n\n### 마감\n\n⛳ **즉시** — 디자인 발주 리드 타임이 가장 길다.\n\n---\n\n## GAP-12 — 결제 PG사 선정\n\n### 배경\n\n자료: *\"일본 PG사 1개사 연동 예정\"* — 사명·계약 미확정.\n\n### 옵션 (시장 상위 후보)\n\n| # | PG사 | 장점 | 단점 |\n|---|---|---|---|\n| A | **GMO Payment Gateway** | 일본 시장 점유율 1위 / TOPIK 일본 사이트도 사용 (응시자 익숙) / 신용카드·PayPay·コンビニ 다수 지원 | 가격 협상력 약함 |\n| B | **SBペイメント (SB Payment Service)** | SoftBank 계열, PayPay 직접 통합 강함 | 인지도 GMO 대비 약간 낮음 |\n| C | **Stripe Japan** | 글로벌 표준 SDK / 개발자 친화적 | 일본 결제 수단 (コンビニ·은행 송금) 일부 미지원 |\n| D | **Komoju / Pay.JP** | 일본 결제 특화 | 시장 점유율 낮음 / 안정성 검증 적음 |\n\n> **권장**: **GMO Payment Gateway** — 마스터 문서가 이미 \"GMO-PG 연동\" 가설로 작성되어 있고, 현 TOPIK 일본 사이트와도 호환.\n\n### 결정 후 영향\n\n- **디자인**: 결제 페이지 (PG SDK 호출 흐름) / 영수증 PDF 양식\n- **개발**: PG SDK 선정 / 결제 트랜잭션 정합성 / 환불 API\n- **운영**: 결제 수단 매트릭스 (신용카드·PayPay·컨비니·가상계좌 중 선택)\n- **법무**: 일본 적격청구서(인보이스) 양식 PG 호환성 검토\n\n### 결정 주체\n\n**외부 협상** (BLOCKED)\n\n### 마감\n\n⛳ **4주 내** — 결제 모듈 구현이 1차 오픈의 *결제 → 응시* 핵심 동선을 차단.\n\n---\n\n## 결정 후 본 문서 정리 흐름\n\n| 결정 | 본문 반영 |\n|---|---|\n| GAP-01 | `01-glossary.md` 등급 섹션 + `08-design-system.md` 등급 배지 + `04-policy.md` §5 + `06-feature-spec.md` 응시자 결과 영역 |\n| GAP-02 | `01-glossary.md` 문제 유형 섹션 + `06-admin-feature-spec.md` 문제 만들기 + `05-screen-inventory.md` 문제 등록 |\n| GAP-11 | `05-screen-inventory.md` 발주 우선순위 1단계 → 발주 진행 중으로 / `08-design-system.md` 데스크탑 레이아웃 |\n| GAP-12 | `02-system-map.md` 결제 모듈 박스에 PG 사명 / `06-feature-spec.md` §3 + 라운드 3 `14-payment.md` |\n\n본 문서는 **4개 모두 결정 후 삭제**한다.\n"},{"id":"d2","type":"md","src":"open-questions.md","title":"갭 트래커 (Open Questions)","content":"# 갭 트래커 (Open Questions)\n\n## 한 줄\n\n**자료 간 충돌·모호·빠진 부분만 모은다. 답이 나오면 본문에 반영하고 여기서 삭제한다.**\n\n상태 표기: `OPEN` / `BLOCKED` (외부 답 대기) / `DEFERRED` (1차 오픈 범위 외)\n\n심각도:\n- 🔴 **Critical** — 1차 오픈 가능 여부에 직접 영향. 결정 없이 디자인·개발 진행 불가\n- 🟠 **Important** — 정책·디자인·구현 결정에 명확히 막히는 부분\n- 🟡 **Minor** — 영향은 있지만 가정 또는 우회로 진행 가능\n\n---\n\n## 1차 오픈 전 필수 결정 (Critical 4개)\n\n| ID | 갭 | 결정 주체 |\n|---|---|---|\n| **GAP-01** | 등급 체계 — 종합/문항별 두 트랙 정의 | 한국교육재단 (출제·평가 기준) |\n| **GAP-02** | ~~말하기 3~6형 정의~~ → 초급 5영역 해소 (251020 ver.3) / 중상급 영역 OPEN | 박천홍·하정일 교수 (중상급) |\n| **GAP-11** | 데스크탑 뷰포트 응시 UI 디자인 | 디자인팀 발주 |\n| **GAP-12** | 결제 PG사 (BLOCKED) | 외부 협상 |\n\n> Critical 4개가 막히면 **1차 오픈 일정이 흔들린다**. 나머지 Important·Minor는 가정으로 진행 가능하지만, Critical은 결정 후 본문 반영.\n\n---\n\n## 갭 상세\n\n### GAP-01. 등급 체계 — 🔴 Critical\n\n- **상태**: OPEN\n- **충돌**:\n  - 마스터 문서: *\"종합 결과 — 진단 등급 (A~D 4단계)\"*\n  - 시험 결과 디자인: *\"등급 1급 / 6급\"*\n  - AI 피드백 디자인: *\"B / Good\"* (문항별, A~F 추정)\n  - 응시자 관리 백오피스: *\"1급\"* 표시 + *\"등급별\"* 필터\n- **가설**: 두 트랙 분리 — **종합 진단 등급**(1~6급, TOPIK 매핑)과 **문항별 학습용 피드백 등급**(A~F)\n- **막히는 것**: 성적표 디자인, AI 채점 출력 스펙, 시험 통과 조건 정의\n\n### GAP-02. 말하기 영역 정의 — 🟢 RESOLVED (초급)\n\n- **상태**: RESOLVED (초급), OPEN (중상급)\n- **해소**: `re/251020_speaking_test_beginner_ko_re3.docx`에 초급 5영역(짧은 문장 읽기·질문 대답·생활 속 대화·그림 설명·화용 과제) 정의 확인. 영역 6은 ver.3에서 삭제됨 (0·1·2·3·4·5·7 번호 체계).\n- **반영**: `01-glossary.md` 문제 유형 섹션 + `06-admin-feature-spec.md` 문제 만들기 섹션 + `ui-admin-question-create.html` 5영역 탭 UI.\n- **남은 것**: 중상급 6영역 구성. 박천홍·하정일 교수 미팅에서 확정 필요. 그 전까지 admin UI는 초급 5영역만 노출.\n\n### GAP-03. 초급 23문항 vs 디자인 6문항 — 🟠 Important\n\n- **상태**: OPEN\n- **충돌**: 마스터 문서 — 초급 23문항 / 중상급 14문항 vs 디자인의 6문항(200점)\n- **추정**: 디자인은 베타 테스트용 축약본 또는 데모일 가능성\n- **막히는 것**: 시험 시간(초급 25분 / 중상급 35분), UI 페이지네이션, 자동 저장 빈도\n\n### GAP-04. 네이티브 쉘 기술 스택 — 🟡 Deferred to 라운드 2\n\n- **상태**: DEFERRED — 1차 오픈은 데스크탑·모바일 웹만. 앱 도입 시점에 재논의\n- **유력 후보 (라운드 2 시점)**: Capacitor (Ionic) — Web 코드 그대로, 네이티브 플러그인 추가, iOS/Android 동시\n- **대안**: Cordova(구식), React Native WebView(어색), PWA only(앱스토어 제약)\n- **막히는 것**: 빌드 파이프라인·배포 절차·플러그인 선택지 — 라운드 2 앱 도입 시 함께 결정\n\n### GAP-05. 마이크·녹음 — Web API vs 네이티브 fallback 기준 — 🟠 Important\n\n- **상태**: OPEN (검증 필요)\n- **검증 포인트**:\n  - iOS WebView의 `MediaRecorder`·`getUserMedia` 안정성\n  - 백그라운드(앱 스위치·잠금) 녹음 지속 여부\n  - 인터럽션(전화·알람·블루투스 끊김) 처리\n  - 권한 요청 UX (네이티브 다이얼로그 vs WebView 안 다이얼로그)\n- **막히는 것**: 베타(2026.7) 전 검증 일정·환경 확보. fallback 발동 기준 정량화.\n\n### GAP-06. 2차 채점 운영 시점 — 🟡 Minor\n\n- **상태**: OPEN\n- **자료**: 마스터 문서 — *\"1단계(AI): 시험 종료 즉시 / 2단계(Human): 평가자 검수\"*\n- **1차 오픈 가정**: AI 1차 채점만. 2차 평가자 검수는 라운드 2 이후 (Premium 도입 시).\n- **막히는 것**: 평가자 UI 디자인 발주 시점, 백오피스 권한 모델\n\n### GAP-07. 평가 차원 5개 vs 6개 — 🟡 Minor\n\n- **상태**: OPEN\n- **5개 (영역별 차트)**: 발음·유창성·어휘·문법·내용 구성\n- **6개 (AI 채점 알고리즘)**: 발음 정확도·발화 속도·유창성·어휘·문법·내용 구성\n- **추정**: \"발화 속도\"는 \"유창성\"의 하위 항목일 가능성. 단순 표현 차이.\n\n### GAP-08. 환경 점검 사후 책임 한계 — 🟠 Important\n\n- **상태**: OPEN (정책)\n- **마스터 문서**: 사전 테스트 통과 없으면 결제 버튼 비활성화. 통과 후 개인 기기 문제는 사용자 책임.\n- **막히는 것**: 사전 테스트와 본 시험 사이 시간 갭 처리 — 응시 시작 직전 재테스트 의무화 여부.\n\n### GAP-09. 응시자 메모장 데이터 처리 — 🟡 Minor\n\n- **상태**: OPEN\n- **마스터 문서**: 준비 시간에 메모장 활성화 (키보드 입력)\n- **1차 오픈 가정**: (a) 응시자만 보는 임시 데이터 — 일반 IBT 관행. 평가자·AI 채점에는 미반영.\n\n### GAP-10. 일본어 vs 한국어 UI (i18n) — 🟠 Important\n\n- **상태**: OPEN\n- **타깃**: 일본인 학습자 → 응시 UI 일본어\n- **시험 콘텐츠**: 한국어 (문제·답안)\n- **막히는 것**:\n  - 시험 진행 메시지(\"녹음 중\", \"준비 00:20\")는 일본어, 문제는 한국어 — 폰트·줄바꿈 분리\n  - 관리자 백오피스 언어 (한국어 vs 일본어) 미정\n\n### GAP-11. 데스크탑 뷰포트 응시 UI 디자인 부재 — 🔴 Critical\n\n- **상태**: OPEN (디자인 발주)\n- **컨텍스트**: 데스크탑이 1순위 디바이스. 응시 클라이언트는 터치클래스 사용자 web의 반응형 화면이므로 **데스크탑 뷰포트 (2단 - 좌:문제, 우:응시) 디자인**이 필요\n- **자료 현황**: 본 디자인 자료의 응시 화면은 모두 모바일 1단 레이아웃\n- **마스터 문서**: 좌측(문제 영역) / 우측(응시 영역) 2단 분할 명시\n- **막히는 것**: 반응형 응시 화면 디자인 — 모바일 1단(있음) + 데스크탑 2단(부재) + 중간 브레이크포인트\n\n### GAP-12. 결제 PG사 미확정 — 🔴 Critical\n\n- **상태**: BLOCKED (외부 협상)\n- **자료**: \"일본 PG사 1개 연동 예정\"\n- **막히는 것**: 결제 수단(신용카드만? QR 포함?), 환불 트랜잭션 흐름, 영수증 포맷, SDK·API 사양\n\n---\n\n## DEFERRED — 1차 오픈 범위 외\n\n### GAP-13. 장바구니 vs 단건 결제\n\n- **가정**: 1차 오픈은 시험 1건당 결제. 멀티 시험 동시 결제는 라운드 2 이후.\n\n### GAP-14. 데스크탑 → 앱 딥링크 정책\n\n- **컨텍스트**: 사용자 명시 동선은 *가입 → 마이페이지 → 앱 오픈*이지만, Universal Link / App Link 셋업은 라운드 2 이후\n- **1차 오픈 대안**: 마이페이지에서 안내 텍스트 + 앱스토어 링크\n\n### GAP-15. 알림 채널 — 이메일·푸시·인앱\n\n- **1차 오픈 가정**: 이메일만 (채점 완료·결제 완료). 앱 푸시·인앱 알림은 라운드 2 이후.\n\n---\n\n## 다음 라운드에 추가될 영역 (placeholder)\n\n- 데이터 모델 / DB 스키마 결정 사항\n- API 인터페이스 결정 사항\n- 인프라 / 호스팅 결정 사항\n- 보안 / 개인정보 정책 (일본 개인정보보호법 기준)\n- 부정행위 방지 정책 (감독 카메라 여부 등 — 자료에 언급 없음)\n"},{"id":"d3","type":"md","src":"phase-roadmap.md","title":"Phase 로드맵","content":"# Phase 로드맵\n\n## 한 줄\n\n**1차 오픈(Phase 1)은 *말하기 진단 + ★ MaroPass portal 신규 + ◇ 터치클래스 자산 재사용(사용자 web·관리자 web)* 한 동선으로 끝낸다. 그 외는 라운드 2 이후.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 데드라인이 **2026년 9월 서비스 개시**로 박혀 있어 범위 확대는 일정 위험으로 직결된다.\n2. **기존 터치클래스 자산 재사용**(사용자 web 응시 인프라·관리자 web 시험 관리)으로 신규 개발 표면적·일정 위험을 1/3로 축소. 신규 개발은 MaroPass portal + 특화 영역에만 집중.\n3. 관리자 측은 기존 터치클래스 관리자 web을 그대로 사용하므로 1차 오픈 신규는 *MaroPass 메뉴 5개*(회원·결제·환불 승인·결과 공개·인증서 템플릿) + *말하기 5영역 탭*뿐. 시험 관리·문제 은행·응시자 관리는 기존 그대로.\n4. 평가자(2차 채점)·딥링크·푸시 알림·장바구니 같은 무거운 기능은 1차 오픈 후 운영 데이터를 보고 결정하는 게 합리적이다.\n5. 라운드를 작게 끊으면 갭 결정이 빠르게 본문에 반영되어 문서가 늘 최신 상태로 유지된다.\n\n---\n\n## Phase 1 — 1차 오픈 (2026.9 목표)\n\n### 1. ★ MaroPass portal (서비스 사이트) — 회원·결제·환불·인증서 (신규)\n\n| 영역 | 1차 오픈 포함 |\n|---|---|\n| 회원관리 | 가입(이메일·LINE·Google·Apple) / 로그인 / 비밀번호 재설정 / 계정 찾기 |\n| 상품·결제 | 시험 목록·상세, 무료 샘플 응시 진입, 일본 PG 1개 연동 결제 (신용카드 + QR) |\n| 회원 게이트 | 무료 샘플·바로 구매 클릭 시 로그인 필수 (정책 9). 비로그인 → 가입 페이지 |\n| 마이페이지 | 구매 시험·응시할 시험·결제 내역·환불 신청·**영수증/인증서/결과지 PDF 다운로드**(kopass.* 위변조 URL)·정보 수정 |\n| 응시 진입 | **응시하기 → window.open()으로 새 창** (터치클래스 사용자 web home, 정책 10) + SSO 토큰 자동 로그인 |\n| 고객센터 | 공지·FAQ·1:1 문의 |\n| 알림 | 이메일 5종 (결제 완료·D-1·D-day·만료·결과 공개·환불 처리). 푸시는 라운드 2 |\n| 디바이스 | 데스크탑·모바일 웹만. iOS/Android 앱은 라운드 2 (portal은 웹 단독 유지) |\n\n### 2. ◇ 터치클래스 사용자 web — MaroPass 응시 영역 추가 (기존 web 재사용)\n\n| 영역 | 1차 오픈 포함 |\n|---|---|\n| ★ home (신규) | MaroPass 결제분 시험 목록 (응시 대기 + 응시 완료). 기존 사용자 web의 다른 콘텐츠와 분리 라우팅 |\n| ◇ 응시 진입 (기존) | 본인 확인(이름·이메일·시험명) → 환경 점검 게이트(마이크·볼륨·5초 리플레이, 30일 캐시) |\n| ★ MaroPass 응시 클라이언트 (신규) | 말하기 IBT 5영역, 데스크탑 2단 / 모바일 1단. 자동 녹음, 타이머, 자동 저장·전송. 라운드 2 이후 터치클래스 app 안에 wrapping 가능 |\n| ★ 응시 결과 확인 (신규) | MaroPass 채점 포맷 — 점수표·5각 레이더·1급~6급 등급·문항별 AI 피드백 (운영자 결과 공개 후) |\n| ★ PDF 다운로드 안내 (신규) | \"인증서·결과지 PDF는 MaroPass portal 마이페이지에서\" |\n\n### 3. ◇ 터치클래스 관리자 web — MaroPass 메뉴 5개 추가 (기존 web 재사용)\n\n**기존 터치클래스 관리자 web을 그대로 사용**. 시험 관리·문제 은행·응시자 관리·평가/채점·통계·시스템 설정은 기존(◇). MaroPass portal 데이터를 받는 신규 메뉴 5개(★)만 추가.\n\n| 영역 | 1차 오픈 포함 |\n|---|---|\n| ★ MaroPass 회원 (신규) | MaroPass portal 가입·결제·환불 데이터 집계. 회원 정보·결제·응시 이력 |\n| ★ MaroPass 결제 관리 (신규) | MaroPass 결제 내역·영수증 발행 |\n| ★ MaroPass 환불 승인 (신규) | MaroPass 환불 요청 검토·승인 (정책 7) |\n| ★ MaroPass 결과 공개 (신규) | AI 1차 채점 후 응시자 노출 트리거 (정책 5) |\n| ★ MaroPass 인증서 템플릿 (신규) | kopass.* 위변조 URL 도메인 템플릿 |\n| ◇ 시험 관리 (기존) | 시험 등록·공개·응시 조건 설정 |\n| ◇ 문제 은행 (기존 + ★ MaroPass 말하기 5영역 탭) | 객관식·주관식·말하기 1형·2형은 기존, MaroPass 5영역 탭이 신규 |\n| ◇ 평가/채점 (기존) | AI 1차 자동 채점. 운영자 보정·STT 확인 |\n| ◇ 1:1 문의 (기존) | 답변 처리 |\n| ◇ 통계 (기존) | KPI 4종만 1차 적용 |\n| ◇ 시스템 설정 (기존) | 약관·활동 로그. 2FA는 라운드 3 |\n\n> 향후 핵심: **문제 만들기 LLM 자동 생성 보조** (라운드 2). 평가자 UI(3단 분할·STT 싱크·2인 교차 채점)는 Premium 도입 시점에 종속.\n\n### Phase 1 진행 차단 항목\n\n`open-questions.md`의 🔴 **Critical 4개**가 결정돼야 1차 오픈 디자인·개발이 본격화된다:\n\n- **GAP-01** 등급 체계 (종합/문항별 두 트랙)\n- ~~**GAP-02** 말하기 3~6형 정의~~ → 초급 5영역 251020 ver.3에서 해소. 중상급은 OPEN.\n- **GAP-11** 데스크탑 뷰포트 응시 UI 디자인 발주\n- **GAP-12** 결제 PG사 확정\n\n---\n\n## Phase 2 — 라운드 2 후속 (서비스 안정화)\n\n| 항목 | 비고 |\n|---|---|\n| 문제 만들기 영역 깊이 | LLM 자동 생성 보조·에디터·문제 은행 — 향후 핵심 |\n| 평가자 UI (2차 채점) | Premium 플랜 도입 시점에 종속 |\n| 환불 자동·수동 분기 정책 | 1차 오픈은 운영 검토 수동 처리 |\n| 시스템 장애 재응시 티켓 | 운영 로그 확인 후 발행 |\n| **iOS·Android 네이티브 앱** | WebView 쉘 + 푸시 알림 인프라 |\n| 데스크탑 ↔ 앱 전환 딥링크 | Universal Link / App Link 셋업 (앱 도입 시) |\n| 알림 채널 매트릭스 | 앱 푸시·인앱 알림·이벤트별 채널 설정 |\n| 카메라·SMS 본인 확인 | 응시 본인 확인 강화 |\n| 적격청구서 인보이스 PDF | 일본 소비세법 대응 (PG API 연동 시점) |\n| 쿠폰·이용권 패키지 | 결제 다양화 |\n| 회원 탈퇴 시 데이터 정책 | 일본 개인정보보호법 검토 후 |\n| 1:1 문의 답변 워크플로우 | 운영 동선 정의 |\n| 관리자 등급별 권한 모델 | 일반/상위/평가자 분리 |\n| 부정행위 방지 정책 | 감독·녹화·재응시 정책 |\n\n---\n\n## Phase 3 — 라운드 3 (성장기)\n\n| 항목 |\n|---|\n| 데이터 모델 / DB 스키마 정식화 |\n| API 인터페이스 계약 |\n| 인프라 / 호스팅 / 모니터링 |\n| 보안 / 개인정보 정책 (일본 기준) |\n| AI 평가 품질 모니터링 대시보드 |\n| 응시자 커스텀 학습 추천 (콘텐츠 큐레이션) |\n\n---\n\n## Future — 본 문서 범위 외\n\n| 항목 |\n|---|\n| 다른 영역 — 쓰기 / 듣기 / 읽기 (Phase 1은 말하기 단독) |\n| Premium 플랜 (전문가 검수 코멘트) |\n| 다국어 확장 (일본 외 시장) |\n\n---\n\n## 작성 진행 — 마크다운\n\n| 파일 | 상태 |\n|---|---|\n| ~~`01-glossary.md`~~ | 작성됨 — 도메인 용어 + 혼동 용어 표 |\n| ~~`02-system-map.md`~~ | 작성됨 — 시스템 구성·책임 경계 |\n| ~~`03-user-flows.md`~~ | 작성됨 — 주체·사이트맵·플로우 |\n| ~~`04-policy.md`~~ | 작성됨 — 운영 정책 8개 박스 |\n| ~~`05-screen-inventory.md`~~ | 작성됨 — 화면 27개 매핑 + 반응형 매트릭스 + 발주 우선순위 3단계 |\n| ~~`06-feature-spec.md`~~ | 작성됨 — 응시자 라인 아이템 5×11 + Phase 1 라벨 |\n| ~~`06-admin-feature-spec.md`~~ | 작성됨 — 관리자 5메뉴 + ★ 문제 만들기 (향후 핵심) |\n| ~~`07-ia.md`~~ | 작성됨 — 정보 구조 (GNB·하단탭·페이지 인벤토리·라벨 사전) |\n| ~~`08-design-system.md`~~ | 작성됨 — 컬러·타이포·컴포넌트 토큰 + 일본어 우선·시험 UI 토큰·i18n 아키텍처 |\n\n## 작성 예정 — 마크다운 (Critical 결정 후)\n\n| 파일 | 내용 | 선결 조건 |\n|---|---|---|\n| `09-exam-structure.md` | 초급/중상급 구조, 6유형, 시간 배분, 채점 가중치 | GAP-01·02·03·07 |\n| `10-grading.md` | AI 채점 단계, 평가 차원, 등급 매핑 | GAP-01·06·07 |\n| `11-feedback-design.md` | AI 피드백 콘텐츠 — 추천 연습·STT 비교·학습 콘텐츠 큐레이션 연계 | GAP-01 |\n\n---\n\n## UI 디자인 진행 현황\n\n### 응시자 측 Hi-Fi (작성됨 — 폴더 구조 정책 10 반영)\n\n| 그룹 | 파일 | 시스템 |\n|---|---|---|\n| 진입 | `ui/ui-index.html` | 디자인 허브 |\n| 메인·접수 | `ui/service-site/ui-main-home.html` / `ui-tests-list.html` / `ui-test-detail.html` | ★ portal |\n| 인증 | `ui/service-site/ui-auth.html` (회원가입+로그인 + `#login` 해시 + intent 파라미터) | ★ portal |\n| 결제 | `ui/service-site/ui-checkout.html` / `ui-checkout-complete.html` | ★ portal |\n| 마이페이지 | `ui/service-site/ui-mypage.html` + 7개 서브 (tests / results / certificates / payments / refunds / profile / inquiries) | ★ portal |\n| 사용자 web 홈 | `ui/user-web/ui-exam-home.html` (다크 탑바 + 본인 확인 → 환경 점검 same-window 분기) | ◇ 추가분 |\n| 응시 | `ui/user-web/ui-exam.html` (**상하 70/30** · 1080px shell · 32px 타이머 + 미니 원형 progress · 헤더 stage pill) | ★ MaroPass 응시 클라이언트 |\n| 결과 | `ui/user-web/ui-result.html` | ★ MaroPass 채점 포맷 |\n| 환경 점검 | `ui/user-web/ui-env-check.html` | ◇ 기존 활용 |\n| 고객센터 | `ui/service-site/ui-faq.html` (5 카테고리 + 15 아코디언, 새 창 응시 Q&A 포함) | ★ portal |\n\n### UI 공통 적용\n\n- 한국어/日本語 i18n 토글 (localStorage 동기화 + `data-i18n` / `data-i18n-html` 패턴)\n- 햄버거 메뉴 (≤768px) + 풀너비 드로어 + 좌우 20px 패딩\n- 반응형 베이스 리셋 (`*{box-sizing}` + `html,body{overflow-x:hidden;max-width:100vw}` + `img,svg{max-width:100%}`)\n- 페이지 간 링크 전체 연결 (GNB·CTA·sidebar·breadcrumb)\n- 일관 톤 (마케팅·홈은 그라디언트 / 응시·결제는 차분)\n- 응시 화면 1080px shell 가운데 정렬 + 상하 70/30 분할\n- 메인 홈 FAQ 5개 아코디언 + 한·일 답변 더미 + `<strong>` 강조\n- 로그인 진입은 `ui-auth.html#login` 해시로 자동 탭 활성화\n\n### 관리자 측 Hi-Fi (작성됨 — ◇ 기존 + ★ MaroPass 추가분)\n\n**기존 터치클래스 관리자 web을 그대로 사용**. 좌측 사이드바 5블록(대시보드 → 응시자 → 회원 → 시험 → 설정). 회원·응시자 그룹이 최상단(운영팀 일상 사용 빈도 기준). 폰트는 Pretendard(한·일 동시 지원).\n\n| 파일 | 신규/기존 | 내용 |\n|---|---|---|\n| `ui/admin/ui-admin-dashboard.html` | ◇ 기존 + ★ MaroPass KPI 추가 | 대시보드 — 4 KPI · 미답변 문의 · 빠른 액션 · 7일 응시 추이 |\n| `ui/admin/ui-admin-members.html` | ★ 신규 (MaroPass 회원 메뉴) | MaroPass portal 응시자 회원 목록 (상태·이름·이메일·등급·최근 응시일·누적·임시 PW) |\n| `ui/admin/ui-admin-payments.html` | ★ 신규 (MaroPass 결제·환불 승인) | MaroPass 결제 관리 (5상태 뱃지 + 환불 처리 행 액션) |\n| `ui/admin/ui-admin-question-bank.html` | ◇ 기존 + MaroPass 분류 트리 추가 | 문제 은행 (분류 트리: 초급/중상급 × 5영역) |\n| `ui/admin/ui-admin-question-create.html` | ★ MaroPass 5영역 탭 신설 | 문제 만들기 — 251020 ver.3 5영역 탭(짧은 문장 읽기·질문 대답·생활 속 대화·그림 설명·화용 과제). 영역별 폼·시간·배점·평가 기준·한국어/일본어 지시문 자동 분기. TTS 남/여 음성. 우측 sticky 사이드바에 **모바일 핸드폰 frame 라이브 프리뷰** (영역별 mock·단계 탭·가로 타임라인·시나리오 재생) |\n\nMaroPass admin은 **말하기 전용**. 객관식·주관식은 본가(터치클래스 기존) 시스템 사용. 남은 화면(시험 목록·등록·응시 결과·관리자 계정·인증서 템플릿·공지/FAQ·약관·보안·통계)은 ◇ 기존 그대로 활용 또는 라운드 2.\n\n### 통합 SSOT\n\n| 파일 | 상태 |\n|---|---|\n| ~~`spec.html`~~ | 작성됨 — 13섹션 통합 설계서 (인쇄·앵커 링크·Critical 안건 포함) |\n| ~~`wireframes.html`~~ | 작성됨 — Low-Fi 12화면 + 데스크탑/모바일 토글 |\n\n## 작성 예정 문서 (라운드 3)\n\n| 파일 | 내용 |\n|---|---|\n| `09-data-model.md` | DB 엔티티·관계 |\n| `10-api-contract.md` | 주요 API 계약 |\n| `11-i18n.md` | 일본어 UI / 한국어 콘텐츠 분리 |\n| `12-security.md` | 인증·권한·2FA·감사 로그·일본 개인정보보호 |\n| `13-anti-cheat.md` | 부정행위 방지 |\n| `14-payment.md` | 결제 모듈 — PG 연동·환불·영수증 |\n| `15-launch-plan.md` | 베타(2026.7) → 런칭(2026.9) 단계별 범위 |\n"},{"id":"d4","type":"md","src":"reference-existing-topik-jp.md","title":"참고 — 현행 TOPIK 일본 사이트 분석","content":"# 참고 — 현행 TOPIK 일본 사이트 분석\n\n> 본 문서는 **참고 자료**다. MaroPass의 결정 사항이 아니다. 현 TOPIK 일본 응시자가 익숙한 동선을 이해하기 위해 정리한다.\n\n## 한 줄\n\n**현 TOPIK 일본 사이트는 \"마케팅 사이트 + 회원/접수 시스템\"이 도메인 분리되어 있다 — 응시자는 안내사이트에서 정보를 보고 별도 도메인에 로그인해서 접수한다.**\n\n## 도메인 구성\n\n| 도메인 | 역할 | 기술 단서 |\n|---|---|---|\n| `kref.or.jp/topik/` | 마케팅·안내·공지·FAQ | WordPress (`wp-content`, 테마: `korea-edu`) |\n| `topikjp.kref.or.jp/main/signin/` | 회원가입·로그인·접수·마이페이지·환불 | (HTML 비공개, JS SPA로 추정) |\n| `topik.go.kr` | 성적 확인 | 한국 본사 시스템 |\n\n> 일본 측은 **접수까지** 책임지고, 성적은 한국 본사로 리다이렉트.\n\n## 안내 사이트 메뉴 구조 (일본어)\n\n```\nTOPIKについて\n ├─ 試験概要\n ├─ 歴史\n ├─ 主管機関紹介\n ├─ 資格の活用\n └─ CEFR比較表\n\n受験について\n ├─ 実施日程・会場\n ├─ 受験申請\n ├─ 試験に関する注意事項\n └─ Q&A\n\n韓国留学・奨学金\n ├─ 奨学金概要\n └─ GKS사업\n\n関連サービス\n ├─ 資料ダウンロード\n ├─ 申請内容変更\n ├─ 受験料返金\n └─ 書類・証明書発行\n```\n\n상단 바 직링크: `受験申請` · `受験料返金` · `申請確認・変更` · `成績確認`\n\n> 직링크 4개가 모두 회원/접수 도메인(`topikjp.kref.or.jp`)으로 빠진다. 즉 안내 사이트는 거의 모든 트랜잭션을 별도 도메인에 위임.\n\n## 실 접수 동선 (현재 시점 데이터)\n\n- 제107회 TOPIK / 시험일: 2026년 7월 5일\n- 접수 기간: 4월 13일(월) ~ 4월 27일(월) 17시\n- \"受験申請をする\" 버튼 → `topikjp.kref.or.jp/main/signin/`\n\n## 모바일 앱\n\n**현 시스템은 앱 없음.** 웹 기반 접수.\n\n## UI/UX\n\n- 일본어 전용\n- 한국 정부 공식 사이트 톤 — 정중·격식\n- 카드 + 아이콘 바둑판 레이아웃\n- 프로모션 배너 (공식 가이드북, 단어 게임, 할인)\n- SNS: X·Instagram·YouTube·Facebook 공식 계정\n\n## 결제 정보\n\n공개 페이지에는 PG·결제 수단 명시 없음. 로그인 후 노출되는 것으로 추정.\n\n---\n\n## MaroPass에 시사하는 것\n\n1. **응시자 동선 가설** — 안내 사이트와 트랜잭션 사이트 분리 패턴이 일본 응시자에게 익숙하다. MaroPass도 단일 사이트 vs 분리 패턴 결정 필요.\n2. **앱이라는 신호** — 현 TOPIK엔 앱이 없다. MaroPass의 **\"가입 → 마이페이지 → 앱 오픈\"** 동선은 차별화 포인트. 마이페이지에서 앱 오픈을 유도하는 진입점 설계가 핵심.\n3. **앱의 역할 가설** — 앱은 응시 전용일 가능성이 높다. 회원가입·결제·마이페이지는 웹 단독으로 두면 PG·OS 정책 변경 영향이 줄고, 앱은 시험 응시 환경(마이크 권한·녹음 안정성)에 집중할 수 있다.\n4. **i18n** — 안내·접수 모두 일본어. MaroPass도 동일 정책. 시험 콘텐츠(한국어)와 분리 설계는 변하지 않음.\n5. **성적/인증서** — 현 TOPIK은 한국 본사로 빠지지만, MaroPass는 일본 단독으로 성적·인증서까지 책임진다. 즉 MaroPass의 마이페이지가 현 TOPIK 마이페이지보다 **더 무거워진다** (응시 이력 + 성적 + 인증서 다운로드 + 재응시 등).\n"},{"id":"d5","type":"md","src":"01-glossary.md","title":"도메인 용어","content":"# 도메인 용어\n\n## 한 줄\n\n**모든 문서가 같은 단어를 같은 뜻으로 써야 한다 — 회의에서 30분 새는 90%는 용어 정의 부재에서 온다.**\n\n## 사업·시험 용어\n\n| 용어 | 정의 |\n|---|---|\n| **MaroPass IBT** | 본 프로젝트의 정식 명칭. 일본 시장 한정. IBT = Internet Based Test. 풀네임(약어 풀이)은 추후 확정 |\n| **TOPIK** | 한국 정부 공인 한국어 능력 시험. MaroPass는 대체가 아닌 보완·진단 위치 |\n| **TOPIK 말하기** | TOPIK 내 말하기 영역. 일본 내 시행 불가 구조. **Phase 1의 유일한 타깃** |\n\n## 시스템 용어 (정책 10 — MaroPass portal + 터치클래스 자산 재사용)\n\n| 용어 | 정의 |\n|---|---|\n| **MaroPass portal** ★ 신규 | 서비스 사이트(`ui/service-site/`). **결제·환불·인증서** 전용 portal. 가입·로그인·시험 목록·결제·마이페이지(영수증·인증서·결과지 PDF 다운로드)·환불 요청·1:1 문의·FAQ를 담당. 위변조 검증 URL 도메인이 `kopass.*` 이어야 신뢰 성립 |\n| **터치클래스 사용자 web** ◇ 기존 + MaroPass 추가분 | 응시 클라이언트(`ui/user-web/`). **기존 운영 중인 터치클래스 사용자 web을 그대로 활용**. MaroPass 결제분 시험만 노출되는 home + 말하기 IBT 5영역 응시 클라이언트가 신규(★). 본인 확인·환경 점검 게이트·자동 저장/재전송은 기존(◇). MaroPass portal의 \"응시하기\" 버튼이 **새 창**으로 이걸 연다 |\n| **터치클래스 관리자 web** ◇ 기존 + MaroPass 추가분 | 운영 백오피스(`ui/admin/`). **기존 운영 중인 터치클래스 관리자 web을 그대로 사용**. 시험 관리·문제 은행·응시자 관리·평가/채점·통계·시스템 설정은 기존(◇). MaroPass portal 데이터를 받는 **MaroPass 메뉴 5개**(회원·결제·환불 승인·결과 공개·인증서 템플릿) + 문제 만들기 안 MaroPass 말하기 5영역 탭이 신규(★) |\n| **새 창 (응시 진입)** | MaroPass portal 마이페이지 \"응시하기\" → `window.open()`으로 사용자 web home을 여는 UI 수단. 본질은 **소유권·책임 분리** (브랜드 자산 = portal / 학습 자산 = 사용자 web). 라운드 2 이후 터치클래스 app 안에서 응시 클라이언트 wrapping 가능 |\n| **SSO 토큰** | MaroPass portal 로그인 세션을 사용자 web에 자동 전파해, 새 창 진입 시 재로그인 없이 응시 진입하게 하는 토큰 |\n| **★ 신규 / ◇ 기존 추가분** | 본 문서 시리즈의 표기 — ★는 MaroPass 신규 개발, ◇는 기존 터치클래스 자산 위에 MaroPass 특화 영역만 신설 |\n\n## 레벨\n\n| 레벨 | 대상 | 시간 | 문항 | 비고 |\n|---|---|---|---|---|\n| **초급 (Beginner)** | TOPIK I 수준, 학습 1~2년 미만 | 약 25~30분 | 5영역 / **23문항** / 100점 | 251020 ver.3 기준 |\n| **중상급 (Intermediate-Advanced)** | TOPIK II 수준, 학습 2년 이상 | — | — | 영역 구성 미확정 |\n\n## 문제 유형 (초급 5영역, 251020 ver.3 기준)\n\n말하기는 영역별로 콘텐츠 구조·시간·평가축이 다른 **5개 시험 영역**으로 구성. 영역 6은 ver.3에서 삭제됨.\n\n| # | 영역 | 문항 | 배점 | 준비 / 녹음 | 콘텐츠 |\n|---|---|---|---|---|---|\n| 1 | **짧은 문장 읽기** | 10 | 20 | 0초 / 10초 | 한국어 1문장 (인사·평서·의문·청유·복문) + 음운 규칙 태그 |\n| 2 | **질문 대답** | 5 | 30 | 10초 / 20초 | 질문 텍스트 (음성 재생) + 모범 답안 N개 |\n| 3 | **생활 속 대화** | 4 | 24 | 20초 / 20초 | 상황 일러스트 + 상대 대사(음성) + 답변 풍선 |\n| 4 | **그림/사진 설명** | 3 | 18 | 30초 / 40초 | 이미지 + 긴 모범 답안 |\n| 5 | **화용 과제** | 1 | 8 | 40초 / 50초 | 일본어 상황 설명 + 화행(의뢰·사과·감사·조언·요청) |\n\n> 총 23문항 · 100점 · 25~30분. 별도 0번(준비 안내 5분) + 7번(마무리 5분).\n\n영역마다 공통적으로 ① 한국어 지시문 ② 일본어 지시문 ③ TTS(남/여 선택) 또는 mp3 업로드 ④ 준비 시간 ⑤ 비프음('삐') ⑥ 녹음 시간을 포함. 영역 3·4는 이미지 자료가 추가됨. 영역 5는 응시자가 일본어 상황 설명을 읽고 한국어로 표현.\n\n평가축은 영역별로 다름:\n- 영역 1: 발음 단일축 (0~2점)\n- 영역 2·3·4: 발음 / 어휘·문법 / 내용·구성 3축 (각 0~2점)\n- 영역 5: 위 3축 + 화용 능력 4축 (각 0~2점)\n\n## 채점\n\n| 단계 | 주체 | 내용 |\n|---|---|---|\n| **1차** | AI | 시험 종료 즉시 STT 변환 + 평가 알고리즘 (점수, 1차 피드백 초안) |\n| **2차** | Human | 평가자가 AI 결과 검수, 개인화 코멘트 작성 (2인 교차) |\n| **확정** | Human | '확정' 버튼 → 성적표 발행 대기 상태 |\n\n평가 차원 5개: **발음 / 유창성 / 어휘 / 문법 / 내용 구성**\n\n> 2차 검수의 운영 시점은 미확정. `open-questions.md` Q6.\n\n## 등급\n\n> ⚠️ 자료 간 충돌: 마스터 문서엔 \"A~D 4단계\", 디자인엔 \"1~6급\". `open-questions.md` Q1 참조.\n\n## 화면 용어 (응시자)\n\n| 용어 | 정의 |\n|---|---|\n| **시험 안내** | 응시 시작 전 모달 — 시험명·기본정보·합격기준·시험지 정보·응시기간·문항수 |\n| **마이크 테스트** | 응시 전 의무 사전 점검 (마이크 권한·볼륨·5초 녹음 리플레이) |\n| **지시어** | 문제별 지시문 텍스트(준비/녹음 시간 안내 포함) |\n| **준비 시간** | 답변 구상 시간. 타이머(파랑) + 메모장 활성화 |\n| **비프음** | 녹음 시작을 알리는 '삐' 신호음 |\n| **녹음(발화) 시간** | 답변 녹음 시간. 타이머(빨강) + \"녹음 중\" 인디케이터 + Waveform |\n| **AI 피드백** | 문항별 STT 결과 + 발음/등급 + 추천 연습 (자음 보강·받침·억양) |\n| **재응시** | 시험 결과 화면에서 제출 내역 초기화 후 처음부터 다시 |\n| **문제 다시보기** | 시험 결과 화면에서 본인 답안·녹음을 재확인 |\n\n## 화면 용어 (관리자)\n\n| 용어 | 정의 |\n|---|---|\n| **문제 등록** | 단일 문항 생성/수정. 초급 5영역(짧은 문장 읽기·질문 대답·생활 속 대화·그림 설명·화용 과제) 중 1영역 선택 |\n| **문제 은행** | 등록된 문항 풀. 시험지 구성 시 Drag & Drop |\n| **시험지 등록** | N문항 단위로 시험지 세트 구성 (배점·순서·미리보기) |\n| **시험 관리** | 시험 목록·공개 상태·응시 기간 관리 |\n| **응시자 관리** | 시험별 응시자 목록·결과·답안 초기화·결과 공개 |\n| **시험 통과 조건** | 최소 응시 문항 수, 개별 시험 점수 기준, 총점 기준, 평균 기준 등 |\n\n## 화면 용어 (평가자)\n\n> ⚠️ 자료엔 글로만 기술됨. 디자인 미존재.\n\n| 용어 | 정의 |\n|---|---|\n| **3단 분할 뷰** | [문제 정보] · [응시자 답안 (Audio + STT)] · [채점 패널] |\n| **STT 싱크** | STT 텍스트 클릭 → 해당 구간 오디오 자동 재생 |\n| **매크로 코멘트** | 자주 쓰는 피드백 문구 버튼 (예: \"종결 어미가 자연스럽지 않습니다\") |\n\n## 기술 용어\n\n| 용어 | 정의 |\n|---|---|\n| **STT** | Speech-to-Text. AI 채점의 1단계 |\n| **TTS** | Text-to-Speech. 지시문 음성 자동 생성 (또는 mp3 직접 업로드) |\n\n## 약속된 표기\n\n- 시간: 24시간 표기 (예: `00:13:24`)\n- 점수: `획득점/만점` (예: `30점 / 200점 만점`)\n- 등급 표기: 본 결정 전까지 \"등급(N단계)\" 같이 단계 수 명시\n\n## 혼동하기 쉬운 용어\n\n| ❌ 사용 금지 | ✅ 올바른 용어 | 이유 |\n|---|---|---|\n| \"TOPIK 말하기 시험\" (MaroPass 본체를 가리킬 때) | **MaroPass IBT 말하기** 또는 **MaroPass 말하기 진단** | TOPIK은 한국 본사 공인 시험. MaroPass는 별도 진단형. 혼용 시 공인 여부 오인 |\n| \"한국어 말하기 시험\" | **MaroPass IBT 말하기** | 일반명사여서 검색·문서 트래킹 어려움 |\n| \"모의고사\" (콘텐츠가 아닌 시스템 명칭으로 쓸 때) | **진단평가** 또는 **MaroPass** | 모의고사는 콘텐츠 종류. 플랫폼·시스템 명칭으로는 모호 |\n| \"유형 1·2형\" / \"TOPIK 말하기 1형/2형\" (UI 라벨) | **영역 1~5** (영역명 사용 — 짧은 문장 읽기, 질문 대답 등) | 251020 ver.3 기준 시험 구조는 \"유형\"이 아닌 \"영역\" 단위 |\n| \"어플\" / \"어플리케이션\" | **앱** | 일본어 표기와 정합. 안내 문구 톤 일관성 |\n| \"폰\" / \"스마트폰 앱\" | **iOS/Android 앱** | OS 명시. \"스마트폰\"은 모바일 웹과 혼동 |\n| \"오픈\" (서비스 개시 의미) | **서비스 개시** 또는 **런칭** | \"오픈\"은 모호 — 회원가입 오픈/시험 오픈 등 다른 의미와 충돌 |\n| \"회차\" (시행 회차 의미) | **시행 회차** 또는 **회차** (일관) | 응시자가 푸는 *문항 번호*와 혼동 가능 — 문항 번호는 *문항 N번*으로 |\n| \"유저\" / \"사용자\" (관리자 vs 응시자 구분 없을 때) | **응시자** / **관리자** / **평가자** 명시 | 권한·동선이 다르므로 추상화 금지 |\n| \"테스트\" (시험 의미로) | **시험** 또는 **응시** | \"테스트\"는 QA·환경 점검과 혼동 |\n| \"녹화\" | **녹음** | 음성만 수집. 영상 녹화 기능 없음 |\n"},{"id":"d6","type":"md","src":"02-system-map.md","title":"시스템 맵","content":"# 시스템 맵\n\n## 한 줄\n\n**MaroPass는 결제·환불·인증서 portal(신규)이고, 응시·결과·시험 관리는 기존 터치클래스 자산 위에 MaroPass 특화 영역만 신설한다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. **기존 자산 재사용**으로 개발 표면적·일정 위험을 1/3로 축소. 응시 클라이언트·인증·시험 관리·문제 은행 같은 기 검증된 터치클래스 인프라를 그대로 활용하고, 신규 개발은 MaroPass portal과 특화 영역(말하기 응시·5영역 문제 생성·MaroPass 메뉴)에만 집중.\n2. **브랜드 자산 vs 학습 자산 분리** — 결제 영수증(특정상거래법·적격청구서)·인증서(위변조 검증 URL이 `kopass.*` 도메인이어야 신뢰 성립)는 MaroPass portal에. 응시 데이터·결과는 터치클래스에 누적되어 학습 이력과 같은 공간에 쌓임.\n3. **앱 확장 전제** — 사용자 web을 분리해두면, 라운드 2 이후 현재 운영 중인 터치클래스 app 안에서 MaroPass 응시 클라이언트도 동일 코드 베이스로 wrapping 가능. portal은 결제·인증서 영역이라 굳이 app에 들어갈 필요 없이 웹 단독으로 충분.\n4. **운영 콘솔 일원화** — 운영자는 기존 터치클래스 관리자 web에서 시험 관리·문제 은행·응시자 관리를 그대로 사용. MaroPass portal에서 발생한 가입·결제·환불·인증서 데이터는 신규 MaroPass 메뉴 5개(회원·결제·환불 승인·결과 공개·인증서 템플릿)로만 추가되어 단일 콘솔에서 처리.\n5. **미래 학습 동선 연결** — 결과 화면이 터치클래스 사용자 web 안에 있으므로 응시 → 5각 약점 진단 → 추천 학습 콘텐츠로 자연 연결. 라운드 2 이후 터치클래스 app 내 한국어 코스와 연동해 응시→학습 동선 완결.\n\n---\n\n## 전체 시스템 맵 — 신규 portal + 기존 자산 재사용\n\n```\n┌─────────────────────────────────────────────────────────────────────────────┐\n│  ★ 신규 (Newin 개발)                ◇ 기존 터치클래스 자산 — MaroPass 추가분    │\n│  ┌────────────────────────┐         ┌────────────────────────┐  ┌──────────┐│\n│  │ ★ MaroPass portal         │         │ ◇ 터치클래스 사용자 web │  │ ◇ 관리자  ││\n│  │   (서비스 사이트)        │         │   (기존 web에           │  │   web     ││\n│  │                         │         │    MaroPass 시험 추가)    │  │ (기존 web ││\n│  │ - 가입·로그인 (SSO)      │         │ - home (MaroPass 결제분   │  │ + MaroPass  ││\n│  │ - 시험 목록·상세·결제    │  새 창   │   = 응시 대기/완료)     │  │   메뉴    ││\n│  │ - 마이페이지(응시하기 ↗) │────────▶│ - 본인 확인 · 환경 점검  │  │   추가)   ││\n│  │ - 영수증·인증서·결과지   │         │ - ★ MaroPass 응시 클라이언트│ │           ││\n│  │   PDF 다운로드           │         │   (말하기 IBT 5영역)    │  │ ◇ 시험 관리│\n│  │ - 환불·1:1 문의·FAQ     │         │ - 응시 결과 확인        │  │ ◇ 문제 은행│\n│  │                         │         │   (점수표·AI 피드백·5각)│  │   (기존    ││\n│  │                         │         │ - PDF는 portal에서 안내 │  │    + MaroPass││\n│  └────────────┬────────────┘         └────────────┬───────────┘  │    말하기  ││\n│               │                                    │              │    5영역) ││\n│               │  포털·portal 데이터 → 관리자 콘솔 집계              │ ★ MaroPass  ││\n│               └────────────────────────────┬───────┘              │   메뉴 5개││\n│                                            │  ┌───────────────────┘  ↓회원   ││\n│                       ┌──────▼───────┐    │  │                       ↓결제   ││\n│                       │ 공통 백엔드 API│◄───┴──┤                       ↓환불 승인│\n│                       └──────┬───────┘       │                       ↓결과 공개│\n│                       ┌──────▼───────┐       │                       ↓인증서 │\n│                       │   AI 엔진     │  출제 보조 · STT · 채점 · 피드백        ││\n│                       └──────────────┘       │                                ││\n└──────────────────────────────────┬───────────┴────────────────────────────────┘\n                                   │\n                            ┌──────▼─────────┐\n                            │  외부 일본 PG   │ 신용카드 + QR (1개사)\n                            └────────────────┘\n```\n\n**핵심 원칙**\n- **신규 = MaroPass portal 한 개** (결제·환불·인증서·1:1 문의·FAQ)\n- **기존 재사용 = 사용자 web · 관리자 web** — 각각 MaroPass 시험 응시 영역, MaroPass 메뉴 5개만 추가\n- **새 창은 UI 수단**이지 본질이 아님. 본질은 **소유권·책임 분리** (portal = 보관 자료 / 사용자 web = 학습 이력)\n- 회원·결제 데이터 흐름 = portal 가입·결제 → 관리자 web 신규 \"MaroPass 회원\" 메뉴로 집계\n\n> 외부 콘텐츠(출제 기준·예시 문항·평가 기준·운영 정책)는 외부에서 전달받는 입력으로 전제.\n\n---\n\n## 디바이스별 진입 방식 (1차 오픈)\n\n| 디바이스 | 진입 방식 | 뷰포트 | 비고 |\n|---|---|---|---|\n| 데스크탑 (Win/Mac) | 브라우저 (Chrome/Safari/Edge) | **데스크탑 뷰포트** (2단 — 좌: 문제, 우: 응시) | 사용자 주력. 마이크 권한·녹음 안정성 가장 높음 |\n| 모바일 웹 | 모바일 Safari/Chrome | **모바일 뷰포트** (1단 스택) | 폴백 + 모바일 사용자 |\n| iOS·Android 앱 | App Store / Play Store | — | **라운드 2 이후 도입**. 푸시 알림 인프라도 함께 |\n\n### 마이크·녹음 fallback 전략\n\n1. **1차**: Web API (`MediaRecorder`, `getUserMedia`) — 데스크탑·모바일 웹 동일 코드\n2. **2차 (라운드 2 앱 도입 시)**: 네이티브 쉘 안에서 네이티브 마이크 플러그인으로 우회\n3. 검증 포인트: 모바일 Safari 백그라운드 녹음 안정성, 권한 요청 UX, 인터럽션 처리\n\n---\n\n## 시스템별 책임 경계\n\n### 1. 서비스 사이트 (MaroPass portal — ★ 신규)\n\n> **결제·환불·인증서 portal**. 응시 자체는 담당하지 않고, 보관 자료(영수증·인증서·결과지 PDF) 다운로드 + 회원·환불·1:1 문의의 단일 접점.\n\n\n\n| 영역 | 포함 |\n|---|---|\n| 회원 관리 | 회원가입(이메일·LINE·Google·Apple), 로그인, 비밀번호 재설정 |\n| 시험 접수 | 시험 목록·필터, 시험 상세, 무료 샘플 응시 진입, 결제 |\n| 마이페이지 | **응시하기 버튼**(새창으로 사용자 web), 응시할 시험, 결제 내역(영수증 PDF), **인증서·결과지 PDF 다운로드**, 결과 보기 진입, 환불 요청, 회원정보 수정·탈퇴 |\n| 고객센터 | 공지·FAQ, 1:1 문의, 약관·개인정보·특정상거래법 표시 |\n| 회원 게이트 | 무료 샘플 응시·바로 구매하기 클릭 시 로그인 상태 검사 → 비로그인 시 가입 페이지로 (정책 9) |\n\n### 2. 터치클래스 사용자 web (◇ 기존 + MaroPass 응시 영역 추가)\n\n> **기존 운영 중인 터치클래스 사용자 web을 그대로 활용**. 신규는 MaroPass 결제분 시험만 노출되는 home과 말하기 IBT 5영역 응시 클라이언트뿐. 본인 확인·환경 점검 게이트·자동 저장/재전송 같은 인프라는 기존 그대로.\n\n\n\n| 영역 | 포함 |\n|---|---|\n| home | 결제된 시험 목록(응시 대기 + 응시 완료). 서비스 사이트 마이페이지 \"응시하기\" 클릭 시 진입 |\n| 본인 확인 | 이름·이메일·시험명 표시 + 본인 확인 체크박스 (카메라·SMS는 라운드 2) |\n| 환경 점검 게이트 | 마이크·볼륨·5초 리플레이 3단계 점검 (1차 오픈. v1 보고용 4개 항목에서 운영 결정으로 축소) |\n| 응시 클라이언트 | 데스크탑 2단(좌:문제, 우:응시) / 모바일 1단. 타이머, 자동 녹음, 메모장, 자동 저장·전송 |\n| 응시 중 사고 대응 | 네트워크 끊김 자동 재연결+시간 보존, 마이크 권한 회수 가드, 타이머 자동 제출, 이탈 차단 경고 |\n| 결과 확인 | 운영자 결과 공개 후 점수표·1급~6급 등급·문항별 AI 피드백 노출 |\n| PDF 다운로드 안내 | \"인증서·결과지 PDF는 서비스 사이트 마이페이지에서 다운로드\"로 이동 안내 |\n\n### 3. 터치클래스 관리자 web (◇ 기존 + MaroPass 메뉴 5개 추가)\n\n> **시험 관리·문제 은행·응시자 관리·평가/채점·통계·시스템은 기존 그대로**. MaroPass 신규는 portal에서 흘러들어오는 회원·결제·환불·결과 공개·인증서 템플릿 메뉴 5개와, 문제 만들기 내 MaroPass 말하기 5영역 탭 추가뿐.\n\n\n\n| 영역 | 포함 |\n|---|---|\n| ★ 회원 목록 (신규) | 서비스 사이트에서 발생한 가입·결제·환불 데이터 집계. 단일 화면에서 회원 정보·결제 이력·응시 이력 확인 |\n| 시험 관리 | 시험 개요 등록, 공개 상태, 응시 조건/옵션, 응시 기간 |\n| 문제 만들기 | 5영역(짧은 문장 읽기·질문 대답·생활 속 대화·그림 설명·화용 과제) + 등급·10개 카테고리 칩 |\n| 문제 은행 | 분류 트리(초급/중상급·1형/2형) + 주제 다중 칩 필터 + 주제 컬럼 표시 |\n| 시험지 관리 | N문항 단위 시험지 세트 구성, Drag & Drop 정렬, 배점 일괄 설정 |\n| 응시자 관리 | 시험별 응시자 목록·결과·답안 초기화·결과 공개·CSV 다운로드 |\n| 평가/채점 | AI 1차 자동 채점 + 운영자 보정. 평가자 UI(2차 채점)는 라운드 2 |\n| 결제 관리 | 결제일·응시자·금액·상태(결제완료·환불요청·환불완료·취소·실패) + 영수증 + 환불 처리 |\n| 통계 | 응시 통계, 문항별 정답률, AI 평가 품질 |\n| 시스템 | 인증서 템플릿, 약관/개인정보처리방침, 2FA(라운드 3), 활동 로그 |\n\n### 4. AI 엔진\n\n| 영역 | 포함 |\n|---|---|\n| 출제 보조 | 유형·주제·난이도·필수 문법 입력 → LLM이 지문·TTS 스크립트·모범 답안·채점 기준표 자동 생성 (라운드 2 핵심) |\n| STT | 응시자 녹음 → 텍스트 변환 |\n| 채점 | 발음·유창성·어휘·문법·내용 구성 점수 산출 + 1급~6급 등급 매핑 |\n| 피드백 생성 | 문항별 STT 비교 + 추천 연습 (자음/받침/억양) |\n\n### 5. 결제 모듈\n\n| 영역 | 포함 |\n|---|---|\n| 외부 PG 연동 | 일본 PG 1개사 연동 예정 (사명 미확정 — GAP-12) |\n| 결제 수단 | 신용카드 + QR 결제 |\n| 영수증 | PDF 발행 (서비스 사이트 마이페이지) |\n| 인보이스 | 적격청구서 PDF 발행은 PG API 연동 시점 → 라운드 2 |\n| 환불 처리 | 운영 정책에 따른 환불 트랜잭션 |\n\n---\n\n## 책임 경계 — 누가 무엇을 책임지는가\n\n| 시나리오 | 1차 책임 |\n|---|---|\n| 응시 중 마이크 권한 미허용 → 녹음 실패 | **응시자 (환경 점검 통과 + 약관 동의)** |\n| 응시 중 네트워크 끊김 → 답안 유실 | **시스템 (자동 저장·재전송)** |\n| AI 채점 결과 이의 제기 | **운영 1차 → 평가자 재검토 → AI 엔진 재학습 피드백** |\n| 시스템 장애로 시험 진행 불가 | **시스템 (재응시 티켓 발행 — 운영자 수동 검토 후)** |\n| 결제 실패·이중 결제 | **결제 모듈 (트랜잭션 정합성) + 외부 PG** |\n| 새 창 팝업 차단으로 응시 진입 불가 | **서비스 사이트 (안내 문구 + 재시도 가이드)** |\n| 출제 기준 변경 | **외부 콘텐츠 입력 → AI 엔진 재학습** |\n\n---\n\n## Newin × KOEN 역할 분담\n\n| 영역 | Newin (Japan) | KOEN |\n|---|---|---|\n| 시스템 개발·운영·유지보수 | ● | — |\n| AI 출제·채점·피드백 엔진 | ● | — |\n| 인증서·결과지 PDF + 위변조 검증 | ● | — |\n| 결제 PG 연동·정산 | ● | — |\n| 관리자 콘솔 개발 | ● | — |\n| 장애 대응·인프라 운영 | ● | — |\n| 시험 시행 운영 | — | ● |\n| 응시자 1:1 문의·민원 대응 | — | ● |\n| 학습 콘텐츠 제작 (시험 안내·FAQ·공지) | — | ● |\n| 환불 요청 검토·승인 | — | ● |\n| 재응시 티켓 발행 판단 | — | ● |\n| 결과 공개 처리 | — | ● |\n| 채점 보정 (필요 시) | — | ● |\n\n> KOEN 운영자 계정은 별도 발급, 위 영역은 모두 터치클래스 관리자 web에서 수행. 상세 권한 매트릭스는 별도 합의 문서.\n\n---\n\n## 점선 영역 (미결정)\n\n1. **일본 PG 1개사 선정**: GAP-12.\n2. **마이크/녹음 — 모바일 웹 안정성 검증**: 라운드 2 앱 도입 시점에 네이티브 fallback 기준 재정의.\n3. **평가자 UI 런칭 시점**: 2차 채점 운영 시점에 종속. 라운드 2.\n4. **새 창 팝업 차단 대응 UX**: 1차 오픈 직전 운영 시뮬레이션 필요.\n"},{"id":"d7","type":"md","src":"03-user-flows.md","title":"유저 플로우 + 서비스 웹사이트 구조 (1차 오픈, Light)","content":"# 유저 플로우 + 서비스 웹사이트 구조 (1차 오픈, Light)\n\n> 본 문서는 1차 오픈 범위에 한정한 가벼운 골격이다. 환불 분기·재응시 티켓·딥링크 같은 무거운 동선은 *1차 오픈 범위 외* 섹션에서 목록만 둔다.\n\n## 한 줄\n\n**1차 오픈은 *가입 → 접수 → 결제(★ portal) → 응시(◇ 사용자 web, 새 창) → 결과(◇ 사용자 web) → 인증서·PDF(★ portal)* 한 동선으로 충분하다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. **MaroPass portal(★ 신규) + 터치클래스 자산 재사용(◇)** 구조이므로 동선도 portal·사용자 web 둘 사이의 새 창 점프 한 번만 둔다 (정책 10).\n2. **관리자 측은 기존 터치클래스 관리자 web을 그대로 사용**하므로 동선은 MaroPass 메뉴 5개(회원·결제·환불 승인·결과 공개·인증서 템플릿)에만 추가 동선이 붙음. 시험 관리·문제 은행·응시자 관리는 기존 그대로.\n3. **새 창은 UI 수단**이고 본질은 소유권·책임 분리. 학습자가 응시 중에도 portal에서 결제 내역·PDF를 병행 확인 가능.\n4. **결과 확인은 사용자 web(학습 자산), PDF 다운로드(영수증·인증서·결과지)는 portal(브랜드 자산)** 로 명확히 분리 — 위변조 검증 URL이 `kopass.*` 도메인이어야 신뢰 성립.\n5. **1차 오픈은 데스크탑·모바일 웹만**. 앱·푸시 알림은 라운드 2 이후이므로 플로우도 웹 기준만 잡는다. 라운드 2 이후 터치클래스 app 안에 응시 클라이언트 wrapping 가능.\n\n---\n\n## 1. 주체\n\n| 주체 | 디바이스 | 핵심 권한 (1차 오픈) |\n|---|---|---|\n| 비로그인 방문자 | 데스크탑/모바일 웹 | MaroPass portal — 마케팅·시험 목록·시험 상세 열람, FAQ, 가입 |\n| 응시자(일반 회원) | 데스크탑/모바일 웹 | ★ portal: 접수·결제·환불·1:1 문의·PDF 다운로드(영수증·인증서·결과지) / ◇ 사용자 web(새창): 본인 확인·응시·결과 보기 |\n| 관리자 (KOEN 운영자) | 데스크탑 브라우저 (터치클래스 관리자 web) | ◇ 기존: 시험·문제 은행·응시자·평가/채점·통계·시스템 / ★ MaroPass 메뉴 5개: 회원·결제·환불 승인·결과 공개·인증서 템플릿 |\n\n> 관리자 등급 분리, 평가자 분리, 2FA 같은 권한 디테일은 라운드 2~3.\n> iOS·Android 앱과 푸시 알림은 라운드 2 이후.\n\n---\n\n## 2. ★ MaroPass portal — 사이트맵 (신규)\n\n```\nMaroPass portal (결제·환불·인증서)\n│\n├─ 회원 관리\n│   ├─ 회원가입 (이메일 + LINE·Google·Apple 소셜)\n│   ├─ 로그인 (SSO 토큰으로 사용자 web 자동 로그인)\n│   └─ 계정 찾기 / 비밀번호 재설정\n│\n├─ 상품·결제\n│   ├─ 시험 목록 (검색·필터)\n│   ├─ 시험 상세 (바로 구매하기·무료 샘플 응시 CTA — 회원 게이트 적용)\n│   └─ 결제 (일본 PG 1개사 — 신용카드 + QR)\n│\n├─ 마이페이지 (★ portal 핵심)\n│   ├─ 대시보드 (응시 가능 시험·최근 결과·인증서)\n│   ├─ 응시할 시험 → \"응시하기\" 버튼 ──[window.open, 새 창]──→ ◇ 사용자 web home\n│   ├─ 결과 보기 진입 → 사용자 web 결과 화면으로 이동\n│   ├─ ★ 인증서 PDF 다운로드 (kopass.* 위변조 검증 URL)\n│   ├─ ★ 결과지 PDF 다운로드\n│   ├─ ★ 결제 내역 (영수증 PDF — MaroPass 사업자 정보로 발행)\n│   ├─ ★ 환불 요청\n│   ├─ 1:1 문의 (작성·답변 확인)\n│   └─ 회원정보 수정 / 탈퇴\n│\n└─ 고객센터\n    ├─ 공지 / FAQ\n    └─ 1:1 문의\n```\n\n> URL 정의·메뉴 라벨 일본어 표기·페이지 분리 단위는 `05-screen-inventory`·`07-ia.md` 참조.\n\n---\n\n## 3. ◇ 터치클래스 사용자 web — MaroPass 응시 영역 추가 (기존 web 재사용)\n\n```\n터치클래스 사용자 web (MaroPass 응시 영역, 새 창 진입)\n│\n├─ ★ home — MaroPass 결제분 시험 목록 (응시 대기 + 응시 완료) — 신규 라우팅\n│\n├─ 응시 진입 (응시 대기 카드의 \"응시 시작\" 클릭) — 기존 인프라 활용\n│   ├─ ◇ 본인 확인 (이름·이메일·시험명 표시 + 체크박스) — 기존\n│   ├─ ◇ 환경 점검 게이트 (마이크·볼륨·5초 리플레이 3단계) — 기존\n│   └─ ★ MaroPass 응시 클라이언트 (말하기 IBT 5영역, 데스크탑 2단 / 모바일 1단) — 신규\n│\n└─ ★ 결과 확인 (응시 완료 카드의 \"결과 보기\" 클릭, 운영자 공개 후 활성화) — MaroPass 채점 포맷 신규\n    ├─ 점수표 (5축) + 5각 레이더 차트\n    ├─ 1급~6급 진단 등급 + 종합 코멘트\n    ├─ 문항별 AI 피드백 (STT 비교·추천 연습)\n    └─ \"인증서·결과지 PDF 다운로드는 MaroPass portal 마이페이지에서\" 안내 링크\n```\n\n> 사용자 web은 **새 창**으로 열리므로 portal이 백그라운드에 유지됨 — 본질은 학습 자산(사용자 web) vs 브랜드 자산(portal) 소유권 분리.\n> 환경 점검 통과 이력은 localStorage 30일 유효 (정책 1 보조).\n> 라운드 2 이후 터치클래스 app 네이티브 쉘 안에 응시 클라이언트 wrapping 가능 (코드 베이스 동일).\n\n---\n\n## 4. ◇ 터치클래스 관리자 web — 대메뉴 (기존 + MaroPass 메뉴 5개 추가)\n\n**기존 터치클래스 관리자 web을 그대로 사용**. 운영자는 익숙한 시험 관리·문제 은행·응시자 관리 워크플로우를 유지. MaroPass portal 데이터를 받는 신규 메뉴 5개(★)만 추가.\n\n1. **★ MaroPass 회원 (신규)** — MaroPass portal 가입·결제·환불 데이터 집계. 단일 화면에서 회원 정보·결제 이력·응시 이력 확인\n2. **★ MaroPass 결제 관리 (신규)** — 결제 내역, 영수증 발행\n3. **★ MaroPass 환불 승인 (신규)** — 환불 요청 검토·승인 (정책 7)\n4. **★ MaroPass 결과 공개 (신규)** — AI 1차 채점 후 응시자 노출 트리거 (정책 5)\n5. **★ MaroPass 인증서 템플릿 (신규)** — 위변조 검증 URL `kopass.*` 도메인 템플릿\n6. **◇ 시험 관리 (기존)** — 시험 등록·공개, 응시 조건, 시험지 구성\n7. **◇ 문제 은행 · 문제 만들기 (기존 + ★ MaroPass 말하기 5영역 탭 신설)** — 객관식·주관식·말하기 1형·2형은 기존, MaroPass 5영역 탭이 신규\n8. **◇ 평가 및 채점 (기존)** — 응시자별 채점, AI STT 결과 확인·수정, 점수 보정\n9. **◇ 1:1 문의 (기존)** — 응시자 문의 답변\n10. **◇ 통계 및 분석 (기존)** — 응시 통계, AI 평가 품질 (1차는 KPI 4종만)\n11. **◇ 시스템 설정·보안 (기존)** — 약관, 활동 로그 (2FA는 라운드 3)\n\n> 향후 핵심은 **LLM 자동 생성 보조** (문제 만들기 깊이 — 라운드 2).\n\n---\n\n## 5. 1차 오픈 핵심 플로우 (응시자 5단계)\n\n### 5.1 STEP 1 — 진입 (★ MaroPass portal)\n```\n방문자 → 시험 목록 → 시험 상세\n  ↓ 바로 구매하기 / 무료 샘플 응시 클릭\n회원 게이트 (정책 9):\n  비로그인 → 가입 페이지 (intent=sample|purchase&return=...)\n  로그인 → 다음 단계\n```\n\n### 5.2 STEP 2 — 결제 (★ MaroPass portal)\n```\n주문서 작성 → 일본 PG (신용카드 / QR) → 결제 완료\n  ↓ 자동 메일: 결제 확인 + 영수증 PDF 안내 (MaroPass 사업자 정보)\nportal 마이페이지 응시할 시험에 D-day 카드 표시\n```\n\n### 5.3 STEP 3 — 대기 (★ MaroPass portal, 결제 후 14일 윈도우)\n```\nportal 마이페이지에서 D-day 확인\n  ↓ D-1, D-day 자동 리마인더 메일\n14일 경과 시 자동 만료 (환불 없음, 재응시 없음)\n```\n\n### 5.4 STEP 4 — 응시 (◇ 터치클래스 사용자 web, 새 창)\n```\nportal 마이페이지 \"응시하기\" 클릭\n  ↓ window.open() → 사용자 web home 새 창 (팝업 차단 시 허용 안내)\n  ↓ SSO 토큰 자동 로그인 (portal 로그인 세션 공유)\n사용자 web home → MaroPass 시험 카드 \"응시 시작\"\n  ↓ ◇ 본인 확인 (이름·이메일·시험명 + 체크박스) — 기존 인프라\n  ↓ ◇ 환경 점검 게이트 (마이크·볼륨·5초 리플레이, 30일 캐시 적중 시 스킵) — 기존\n  ↓ ★ MaroPass 응시 클라이언트 (말하기 IBT 5영역, 자동 녹음·타이머) — 신규\n시험 종료 → AI 1차 자동 채점\n```\n\n### 5.5 STEP 5 — 결과 (◇ 사용자 web) · 인증서·PDF (★ portal)\n```\n운영자가 관리자 web에서 ★ MaroPass 결과 공개 처리\n  ↓ 자동 메일: 결과 공개 안내\n응시자 → ◇ 사용자 web: 결과 확인 (점수표·5각 레이더·등급·AI 피드백)\n       → ★ portal 마이페이지: 인증서 PDF (kopass.* 위변조 URL) · 결과지 PDF · 영수증 PDF 다운로드\n```\n\n---\n\n## 6. 시스템 알림 메일\n\n| 시점 | 내용 |\n|---|---|\n| 결제 완료 직후 | 결제 확인 + 영수증 PDF 안내 |\n| 응시 윈도우 D-1 / D-day | 응시 기간 임박 리마인더 |\n| 응시 윈도우 만료 | 자동 만료 안내, 향후 응시 안내 |\n| 결과 공개 시 | 운영자 공개 처리에 따라 자동 발송 |\n| 환불 처리 완료 | 환원 완료 안내 |\n\n---\n\n## 1차 오픈 범위 외 (이름만 — 라운드 2 이후)\n\n| 항목 | 어디서 다룰지 |\n|---|---|\n| 환불 분기 자동화 (자동 vs 수동) | 라운드 2 정책 + `13-payment.md` |\n| iOS·Android 앱 + 푸시 알림 | 라운드 2 |\n| 카메라·SMS 본인 확인 | 라운드 2 |\n| 시스템 장애 재응시 티켓 발행 자동화 | 라운드 3 |\n| 데스크탑 ↔ 앱 전환 딥링크 | 라운드 2 앱 도입 시점 |\n| 알림 채널 매트릭스 (이메일·푸시·인앱) | 라운드 2 |\n| 회원 탈퇴 시 데이터 정책 | 라운드 3 |\n| 1:1 문의 답변 워크플로우 자동화 | 라운드 2 |\n| 관리자 등급별 권한 모델 | 라운드 3 |\n| 평가자(2차 채점) 플로우 | 라운드 2 |\n| LLM 자동 생성 보조 (문제 만들기) | 별도 라운드 — 향후 핵심 |\n| 적격청구서 인보이스 PDF | PG API 연동 시점 → 라운드 2 |\n| 쿠폰·이용권 패키지 | 라운드 2 |\n| 쓰기·듣기·읽기 영역 추가 | 라운드 2 이후 |\n"},{"id":"d8","type":"md","src":"04-policy.md","title":"운영 정책 (Phase 1, Light)","content":"# 운영 정책 (Phase 1, Light)\n\n> 본 문서는 **1차 오픈 시점의 운영 룰**만 담는다. 자동 분기·매트릭스·정책 매크로 같은 무거운 운영 도구는 라운드 2 이후.\n\n## 한 줄\n\n**1차 오픈 운영은 *예외 상황을 자동화하지 않고 운영자가 수동으로 처리한다*는 단순 원칙으로 통일한다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 1차 오픈은 응시자 데이터·장애 패턴이 아직 쌓이지 않아 자동 분기를 설계할 통계가 없다.\n2. 일본인 응시자는 안정성·예측 가능성을 중시하므로 *시스템이 알아서 결정*하는 분기보다 *운영자가 보고 결정*하는 흐름이 신뢰가 높다.\n3. 자동 분기는 한 번 잘못 박히면 환불·재응시 분쟁의 자동 책임 인정이 되어버린다 — 1차 오픈에서 가장 피해야 하는 리스크.\n4. 운영자가 직접 처리하는 케이스가 곧 라운드 2의 자동화 룰을 만드는 데이터다 — 수동 처리 로그가 다음 라운드의 정책 근거가 된다.\n5. 라이트한 정책은 디자인·개발 발주를 가볍게 해서 9월 런칭 일정 위험을 줄인다.\n\n---\n\n## 정책 1 — 환경 사전 점검\n\n**핵심 룰**: 사전 점검을 통과한 데이터가 없으면 결제 버튼이 활성화되지 않는다.\n\n| 항목 | 1차 오픈 적용 |\n|---|---|\n| 점검 항목 | 마이크 권한 / 볼륨(데시벨 미터 시각화) / 5초 녹음 후 즉시 재생 / 네트워크 |\n| 통과 조건 | 4개 항목 모두 통과 + \"통과 후 발생한 개인 기기 문제는 사용자 책임\" 약관 동의 |\n| 미통과 처리 | 결제 버튼 비활성화. 응시자에게 *어떤 항목에서 막혔는지* 명시 |\n| 사전 점검과 본 시험 시간 갭 | **GAP-08**로 트래킹. 1차 오픈은 응시 시작 직전 *재테스트 미강제* (가정), 운영 데이터 본 후 라운드 2에서 결정 |\n\n**라운드 2 이후**: 디바이스 핑거프린팅 기반 재테스트 자동화, 마이크 변경 감지.\n\n**근거**: 마스터 문서 *\"결제 전 필수 환경 테스트 강제 수행, 테스트 통과 데이터 없으면 결제 버튼 비활성화\"*\n\n---\n\n## 정책 2 — 응시 진행\n\n**핵심 룰**: 응시자는 *시작·정지·중단 버튼을 가지지 않는다*. 시간이 흐르면 자동으로 다음 단계로 이동한다.\n\n| 단계 | 1차 오픈 적용 |\n|---|---|\n| 지시문 | 자동 표시 + 음성(TTS 또는 mp3) 자동 재생 |\n| 준비 시간 | 파란 타이머 자동 카운트다운 + 메모장 활성화 |\n| 비프음 | 준비 시간 종료 시 자동 발생 |\n| 녹음 시간 | 빨간 타이머 자동 카운트다운 + \"녹음 중\" 인디케이터 + Waveform |\n| 녹음 종료 | 시간 종료 시 자동 종료 + 자동 저장 + 다음 문항으로 자동 이동 |\n| 응시자 조작 | *없음*. \"이전 문항으로 돌아가기\"·\"멈추기\"·\"건너뛰기\" 버튼 없음 |\n\n**라운드 2 이후**: 응시 중 일시정지(전화 인터럽션 등) 정책. 1차 오픈은 인터럽션 발생 시 *시스템 장애 재응시 티켓* 흐름으로 흡수.\n\n**근거**: 마스터 문서 *\"별도 조작을 하지 않아도 시간 종료 시 자동 다음 문제로 이동\"*. 실증 페인포인트(녹음 타이밍 불명확 28/65)도 *자동화 강화*가 답.\n\n---\n\n## 정책 3 — 자동 저장·재전송\n\n**핵심 룰**: 네트워크가 끊겨도 응시는 계속 진행되며, 답안은 단말 측 임시 저장 후 복구 시 자동 재전송된다.\n\n| 항목 | 1차 오픈 적용 |\n|---|---|\n| 저장 시점 | 문항별 녹음 종료 직후 (자동) |\n| 저장 위치 | 단말 측 로컬 (브라우저 IndexedDB / 앱 파일 시스템) |\n| 재전송 | 네트워크 복구 감지 시 자동. 응시자 조작 없음 |\n| 시험 종료 시 미전송 답안 | 자동 일괄 전송 시도. 끝까지 실패 시 → 시스템 장애 재응시 티켓 흐름 |\n| 응시자 알림 | *오프라인 표시는 하지만 응시 중단을 강요하지 않는다* |\n\n**라운드 2 이후**: 백그라운드 동기화 정책 강화, 부분 전송 후 단말 변경 시나리오.\n\n**근거**: 마스터 문서 *\"임시 저장 기능 도입 검토 (네트워크 끊김 등의 대비)\"*. 실증 데이터 — *\"문제를 보거나 답변을 준비하는 동안 LINE 화면이 닫혀 시간 손실\"*은 MaroPass에서는 자동 저장으로 해결.\n\n---\n\n## 정책 4 — 시험 자동 종료\n\n**핵심 룰**: 응시자가 마지막 문항의 녹음 시간을 다 쓰면 *자동으로 시험이 종료되고 모든 답안이 일괄 전송*된다.\n\n| 항목 | 1차 오픈 적용 |\n|---|---|\n| 종료 트리거 | 마지막 문항 녹음 시간 종료 |\n| 종료 동작 | 자동 일괄 전송 → 응시 종료 화면 → AI 채점 큐 등록 |\n| 수동 종료 | 없음. 응시자가 중도 종료할 수 있는 버튼 없음 |\n| 중도 이탈 | *마이페이지에서 정의된 응시 윈도우* 안에 재접속해야 이어서 응시 가능 (Q14 — 1차 오픈은 이어서 응시 미허용 가능, 정책 결정 필요) |\n\n**라운드 2 이후**: 응시 시간 일시정지 / 이어서 응시 / 응시 분리(여러 세션) 정책.\n\n**근거**: 마스터 문서 *\"응시자가 '전송' 버튼을 누르지 않아도 시간 종료 시 자동 저장 및 전송\"*\n\n---\n\n## 정책 5 — 결과·인증서 공개\n\n**핵심 룰**: AI 1차 채점은 시험 종료 즉시 진행되지만, 응시자 노출은 *관리자가 결과 공개 버튼을 누른 후*에 이뤄진다.\n\n| 항목 | 1차 오픈 적용 |\n|---|---|\n| AI 1차 채점 | 시험 종료 즉시 자동 |\n| 응시자 노출 | 관리자가 *백오피스에서 \"결과 공개\" 클릭* 후 마이페이지에 노출 + 이메일 알림 |\n| 평가자 2차 검수 | 1차 오픈에서는 운영자가 수동 검수 (Premium 미운영). 2차 채점 운영 시점은 GAP-06 |\n| 인증서 PDF | 결과 공개 후 마이페이지에서 다운로드. 위변조 검증 URL 포함 |\n| 답안 초기화 | 관리자만 가능. 답안 초기화 시 응시자는 재응시 가능 |\n\n**라운드 2 이후**: 결과 공개 자동화(채점 후 N분), 평가자 UI 도입, 인증서 템플릿 다중화.\n\n**근거**: 마스터 문서 *\"성적 발표 예정일에 성적 조회 버튼 활성화\"*. 디자인 — 응시자 관리 백오피스의 \"결과 공개\" 버튼.\n\n---\n\n## 정책 6 — 재응시 (Light)\n\n**핵심 룰**: 1차 오픈에서 재응시는 *시스템·네트워크 장애 케이스 한정*. 운영자가 로그를 확인하고 수동으로 재응시 티켓을 발행한다.\n\n| 케이스 | 1차 오픈 적용 |\n|---|---|\n| 시스템 장애로 응시 불가 | 운영자 로그 확인 → 재응시 티켓 발행 → 응시자 마이페이지에 새 응시 인스턴스 등록 |\n| 네트워크 끊김으로 일부 답안 미전송 | 자동 재전송 → 실패 시 시스템 장애 케이스로 흡수 |\n| 응시자 단순 변심 | **재응시 미허용** (1차 오픈) |\n| 동일 시험 결과 불만족 | **재응시 미허용** (1차 오픈) |\n\n**라운드 2 이후**: 응시자 자율 재응시 정책 (횟수 제한, 추가 결제 등), 자동 발행 룰.\n\n**근거**: 마스터 문서 *\"시스템 또는 네트워크 에러로 평가가 정상적으로 진행되지 못한 경우 개발사에서 로그 확인 후 재응시 티켓을 발행\"*\n\n---\n\n## 정책 7 — 환불 (Light)\n\n**핵심 룰**: 1차 오픈 환불은 *모두 운영 검토 수동 처리*. 자동 분기는 라운드 2 이후.\n\n| 케이스 | 1차 오픈 적용 |\n|---|---|\n| 접수 기간 내 자율 취소 | 응시자가 마이페이지에서 신청 → 운영 검토 → 승인 시 PG 환불 호출 |\n| 시스템 장애 (재응시도 불가한 경우) | 운영자가 직접 환불 처리 (응시자 신청 불요) |\n| 응시 후 변심 | **환불 미적용** |\n| 결제 실패·이중 결제 | 결제 모듈에서 자동 회수 (PG 트랜잭션 정합성) |\n\n**라운드 2 이후**: 자동 환불 분기 (접수 기간 내 + 미응시 → 자동 승인), 환불 사유 코드 매트릭스.\n\n**근거**: 마스터 문서 *\"접수 기간 내 취소하거나 시스템 장애 등 주관사의 귀책사유 발생 시 전액 환불\"*. *(일본 내 TOEFL/TOEIC 정책 준용)*\n\n---\n\n## 정책 8 — 회차·접수 (Light)\n\n**핵심 룰**: 1차 오픈은 **결제 후 14일 내 24시간 응시 가능 티켓** 임시 운영 방식.\n\n| 항목 | 1차 오픈 적용 |\n|---|---|\n| 접수 방식 | 상시 접수 + 결제 즉시 응시 가능 |\n| 응시 윈도우 | 결제일로부터 14일 |\n| 응시 윈도우 내 응시 횟수 | 1회 (재응시는 정책 6 케이스 한정) |\n| 회차 윈도우 운영 (3·6·9·12월 2주씩) | **1차 오픈 미운영**. 라운드 2 이후 검토 |\n\n**라운드 2 이후**: 문제 은행·평가 체계 안정화 후 *상시 접수* 또는 *회차 윈도우 운영*으로 전환.\n\n**근거**: 마스터 문서 *\"결제 후 14일 이내 24시간 언제든 응시 가능한 티켓 판매 방식으로 전환하여 트래픽 분산. 문제 은행 및 평가 장치가 안정화될 때까지 임시적으로 시행\"*\n\n---\n\n## 정책 9 — 회원 자격 요구\n\n**한 줄 룰**: 무료 샘플 응시·본 시험 결제는 **로그인 회원만** 가능하다. 비로그인 사용자는 클릭 시 회원가입 페이지로 이동하며, 가입 완료 후 원래 동작으로 자동 복귀한다.\n\n**이유 5가지**\n1. **어뷰징 방지** — 비로그인 무제한 샘플은 서버 비용과 채점 데이터 오염을 초래\n2. **리드 확보** — 무료 체험은 가장 강력한 유입 자원. 가입 없이 가져가게 두면 마케팅 비용이 누수됨\n3. **결과 보관** — 샘플·본 시험 결과를 마이페이지에 남기려면 user 식별 필수. 비회원에겐 결과 일회용\n4. **유료 전환 트리거** — \"샘플 결과 → 본 시험 결제 유도\" CTA는 회원에게만 발화 가능\n5. **CS 추적·약관 동의 시점** — 응시 중 사고 클레임 대응에 user 식별 필요. 수집·이용 동의는 회원가입 시점에 받는 게 깔끔\n\n**구현 규칙**\n- \"무료 샘플 응시\" / \"바로 구매하기\" 클릭 시 로그인 상태 확인\n- 비로그인 → `ui-auth.html?intent={sample|purchase}&return={원래 진행할 URL 또는 마커}` 로 이동\n- 회원가입 페이지 상단에 intent 배지 표시 (\"🎁 무료 체험을 시작하려면 회원가입을 완료해 주세요\" / \"💳 결제를 위해 회원가입을 완료해 주세요\")\n- 가입 완료 후 intent에 따라 원래 동작 자동 진행 (intent=sample → 시험 상세로 복귀 후 환경 점검 자동 발화 / intent=purchase → 결제 페이지로 이동)\n- 본 정책은 **UI 게이트** — 실제 보안은 API 레벨에서 인증 토큰 검사로 별도 보장 (`06-feature-spec.md` 참조)\n\n**예외**\n- 시험 상세 페이지 열람 자체는 비로그인 허용 (SEO·홍보 목적)\n- 샘플 듣기 (음성 미리듣기) 등 가벼운 미리보기 액션은 비로그인 허용\n\n---\n\n## 정책 10 — MaroPass portal + 터치클래스 자산 재사용 (새 창은 UI 수단)\n\n**한 줄 룰**: MaroPass는 **결제·환불·인증서 portal**이고, 응시·결과·시험 관리는 **기존 터치클래스 사용자 web·관리자 web** 위에 MaroPass 특화 영역만 신설한다. 학습자에게는 portal과 사용자 web을 **새 창**으로 분리해 노출한다.\n\n**이유 5가지**\n1. **기존 자산 재사용** — 응시 클라이언트·인증·시험 관리·문제 은행 같은 기 검증된 터치클래스 인프라를 그대로 활용해 개발 표면적·일정 위험을 1/3로 축소. 신규 개발은 portal과 MaroPass 특화 영역(말하기 응시·5영역 문제 생성·MaroPass 관리 메뉴)에만 집중.\n2. **브랜드 자산 vs 학습 자산 분리** — 결제 영수증(특정상거래법·적격청구서)·인증서(위변조 검증 URL이 `kopass.*` 도메인이어야 신뢰 성립)는 MaroPass portal에. 응시 데이터·결과는 터치클래스에 누적되어 학습 이력과 같은 공간에 쌓임.\n3. **앱 확장 전제** — 사용자 web을 분리해두면, 라운드 2 이후 현재 운영 중인 터치클래스 app 안에서 MaroPass 응시 클라이언트도 동일 코드 베이스로 wrapping 가능. portal은 결제·인증서 영역이라 웹 단독으로 충분.\n4. **운영 콘솔 일원화** — 운영자는 기존 터치클래스 관리자 web에서 시험 관리·문제 은행·응시자 관리를 그대로 사용. MaroPass portal에서 발생한 가입·결제·환불·인증서 데이터는 신규 MaroPass 메뉴 5개로만 추가되어 단일 콘솔에서 처리.\n5. **미래 학습 동선 연결** — 결과 화면이 터치클래스 사용자 web 안에 있어 응시 → 5각 약점 진단 → 추천 학습 콘텐츠로 자연 연결. 라운드 2 이후 터치클래스 app 내 한국어 코스와 연동해 응시→학습 동선 완결.\n\n**구현 규칙**\n- MaroPass portal 마이페이지 \"응시하기\" → `window.open()`으로 사용자 web home (새 창)\n- 새 창 진입 시 SSO 토큰으로 사용자 web에 자동 로그인 (portal 로그인 세션 공유)\n- 안내 문구: **\"응시는 새 창에서 진행됩니다. 팝업이 차단되면 허용해 주세요.\"**\n- 팝업 차단 감지 시 사용자에게 재시도 가이드 표시\n- 사용자 web 결과 확인 화면 하단에 \"인증서·결과지 PDF 다운로드는 MaroPass portal 마이페이지에서\" 안내 + 이동 링크\n\n**소유권 분담 — 무엇이 어디에 있나**\n\n| 영역 | ★ MaroPass portal | ◇ 터치클래스 사용자 web | ◇ 터치클래스 관리자 web |\n|---|---|---|---|\n| 시스템 상태 | **신규** | **기존 + MaroPass 응시 영역 추가** | **기존 + MaroPass 메뉴 5개 추가** |\n| 회원가입·로그인 | ● | (SSO 자동 로그인) | — |\n| 시험 목록·결제 | ● | — | — |\n| 마이페이지 응시할 시험 | ● (D-day 표시) | (home에도 표시) | — |\n| 응시하기 버튼 | ● → 새 창 트리거 | — | — |\n| 본인 확인 · 환경 점검 · 응시 | — | ● | — |\n| 결과 확인 (점수표·AI 피드백) | (진입 링크) | ● | — |\n| 인증서 / 결과지 PDF 다운로드 | ● | (안내 링크만) | — |\n| 영수증 PDF 다운로드 | ● | — | — |\n| 환불 요청 · 1:1 문의 | ● | — | (답변·승인) |\n| 시험 관리·문제 은행·응시자 관리 | — | — | ● (기존) |\n| MaroPass 회원·결제·환불 승인·결과 공개·인증서 템플릿 | — | — | ● (신규 메뉴 5개) |\n\n**라운드 2 이후 연결 비전**\n- 결과 화면 \"5각 약점 진단\" → 터치클래스 app 안 한국어 코스 추천·실행 (응시→학습 동선 완결)\n- 터치클래스 app 네이티브 쉘 안에 MaroPass 응시 클라이언트 wrapping (사용자 web 코드 베이스 동일)\n- portal은 웹 단독 유지 (결제·인증서 영역은 앱 진입 불필요)\n\n---\n\n## 1차 오픈에서 의도적으로 빠뜨린 운영 정책\n\n| 항목 | 다룰 시점 |\n|---|---|\n| 자동 환불 분기 룰 | 라운드 2 / `14-payment.md` |\n| 평가자 2차 채점 워크플로우 | 라운드 2 (GAP-06 결정 후) |\n| 알림 채널 매트릭스 (이메일·푸시·인앱) | 라운드 2 (GAP-15) |\n| 부정행위 방지 (감독·녹화·재응시 정책) | 라운드 3 / `13-anti-cheat.md` |\n| 관리자 등급별 권한 모델 | 라운드 3 / `12-security.md` |\n| 일본 개인정보보호법 데이터 보존 정책 | 라운드 3 / `12-security.md` |\n| 회원 탈퇴 시 데이터 삭제 정책 | 라운드 3 / `12-security.md` |\n| 다국어 / 다지역 운영 | Future |\n"},{"id":"d9","type":"md","src":"05-screen-inventory.md","title":"화면 인벤토리 + 반응형 매트릭스 + 발주 우선순위","content":"# 화면 인벤토리 + 반응형 매트릭스 + 발주 우선순위\n\n## 한 줄\n\n**본 자료의 27개 화면은 응시자 모바일 1단에 편중되어 있고, 1차 오픈 차단 화면 두 영역(데스크탑 응시 2단·메인 사이트 거의 전체)이 비어 있다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 사용자 1순위 디바이스인 **데스크탑 응시 2단 뷰포트** 디자인이 부재(GAP-11 🔴 Critical) — 응시 클라이언트 개발이 시작될 수 없다.\n2. **메인 사이트(서비스 웹사이트)**는 가입·로그인·시험 목록·시험 상세·결제·마이페이지 *어느 한 화면도* 자료에 없다.\n3. 본 자료의 응시자 화면 13장은 모두 **모바일 1단 레이아웃**으로 그려져 있어 반응형의 출발점은 잡혔지만 데스크탑 매핑이 미정.\n4. 관리자 화면 7장은 백오피스 핵심 메뉴(시험·문제·시험지·응시자·시험별 응시자 상세)를 커버하지만, 시험 통과 조건 설정·환경 점검 시각화·평가자 UI 등이 비어 있다.\n5. 발주 우선순위를 *1차 오픈 차단 → 1차 오픈 핵심 → 라운드 2 이후* 3단계로 분리하면 디자인 일정과 개발 발주가 동시 진행 가능하다.\n\n---\n\n## 1. 자료 인벤토리 (본 자료 ↔ PDF 4블록 매핑)\n\n### 응시자 — 모바일 1단 화면 13장 (`img/`)\n\n| 파일 | 매핑 영역 (PDF 4섹션) | 비고 |\n|---|---|---|\n| `1 시험안내.png` | 시험 준비 — 시험 안내 모달 | 모달. 시험명·기본정보·합격기준·시험지 정보 |\n| `2 마이크 안내.png` | 시험 준비 — 환경 점검 (마이크 테스트 단계 1) | \"마이크 버튼을 누르세요\" |\n| `2 마이크 안내-1.png` | 시험 준비 — 환경 점검 (마이크 테스트 단계 2) | \"말하세요\" |\n| `지시어.png` | 시험 응시 — 문항 지시문 표시 | \"질문을 듣고 대답하십시오\" |\n| `준비.png` | 시험 응시 — 준비 카운트다운 | 파랑 타이머 |\n| `녹음중.png` | 시험 응시 — 녹음 진행 | 빨강 타이머 + \"녹음 중\" |\n| `녹음중-1.png` | 시험 응시 — 인디케이터 (Waveform 도트 디자인) | 별도 자산 |\n| `녹음중-2.png` | 시험 응시 — 인디케이터 (Waveform 도트 라인) | 별도 자산 |\n| `2번 문항.png` | 시험 응시 — 2형 말하기 (이미지 시퀀스 6컷) | 시각 자료 첨부 케이스 |\n| `2번 문항-1.png` | 시험 응시 — 2형 말하기 (단일 일러스트) | 시각 자료 첨부 케이스 |\n| `2번 문항-2.png` | 시험 응시 — 일상 대화 추정 | 카페 일러스트 |\n| `완료.png` | 시험 응시 — 녹음 완료 후 (재생·피드백·다시풀기) | 문항 단위 종료 |\n| `1번 문항- Ai 피드백.png` | 결과 확인 — 문항별 AI 피드백 모달 | B/Good 등급, 답안 vs STT, 추천 연습 |\n| `시험(채점) 결과.png` | 결과 확인 — 종합 결과 | 30점/200점·등급 1급/6급·AI 종합 피드백 |\n| `시험(채점) 결과 - 재응시.png` | 결과 확인 — 재응시 모달 | \"제출 내역 초기화\" 경고 |\n| `모달.png` | 결과 확인 — AI 피드백 모달 (대형) | `1번 문항- Ai 피드백.png`와 거의 동일 |\n\n### 관리자 — 데스크탑 화면 7장 (`img/`)\n\n| 파일 | 매핑 영역 (관리자 5메뉴) | 비고 |\n|---|---|---|\n| `시험 관리.png` | 시험 관리 — 시험 목록 | 좌측 카테고리 트리 + 우측 테이블 |\n| `시험지 등록(문제 O).png` | 시험 관리 — 시험지 등록 (편집 모드) | TOPIK 말하기 2026 / 6문항 / 200점 |\n| `시험지 등록_미리보기...png` | 시험 관리 — 시험지 미리보기 | 응시자 관점 시뮬레이션 |\n| `문제 등록.png` | 시험 관리 — 문제 등록 (객관식 케이스) | 4유형 토글: 객관식/주관식/말하기 1형/2형 |\n| `문제 등록/1형 말하기.png` | 시험 관리 — 문제 등록 (1형) | 텍스트 지시문만 |\n| `문제 등록/2형 말하기.png` | 시험 관리 — 문제 등록 (2형) | 이미지 자료 첨부 |\n| `응시자 관리 페이지.png` | 평가/채점 — 시험별 응시자 목록 | TOPIK 말하기 2026, 통과 조건 사이드바 |\n| `시험별 응시자 상세 정보.png` | 평가/채점 — 응시자 상세 (모달) | 응시 30·통과 13·미통과 13 등 |\n| `detail_container.png` | 평가/채점 — 응시 답안 상세 (모달 내부) | 문항별 답안·AI채점·평가자 코멘트 |\n\n---\n\n## 2. 빠진 화면 — 발주 필요\n\n### 🔴 Critical — 1차 오픈 차단\n\n| 영역 | 화면 | GAP |\n|---|---|---|\n| 응시 클라이언트 | **데스크탑 응시 2단 뷰포트** (좌:문제, 우:응시) — 자료 자체가 없음 | GAP-11 |\n| 응시 클라이언트 | 데스크탑 환경 점검 (마이크 시각화, 데시벨 미터, 5초 리플레이) | GAP-11 |\n| 응시 클라이언트 | 오리엔테이션 (튜토리얼 영상·슬라이드·동의 체크) | GAP-11 |\n| 메인 사이트 | 랜딩 (마케팅 페이지) | — |\n| 메인 사이트 | 회원가입 (이메일 인증·약관 동의·최소 개인정보 입력) | — |\n| 메인 사이트 | 로그인 + 비밀번호 재설정 + 계정 찾기 | — |\n| 메인 사이트 | 시험 목록 (검색·필터) | — |\n| 메인 사이트 | 시험 상세 (구매 진입) | — |\n| 메인 사이트 | 결제 페이지 (PG 진입·환경 점검 게이트) | — |\n| 메인 사이트 | 마이페이지 — 대시보드 (진행 중 시험·미응시·결과 발표 임박) | — |\n| 메인 사이트 | 마이페이지 — 구매 시험 목록 / 시험 상세 (응시 시작 진입점) | — |\n| 메인 사이트 | 마이페이지 — 결제 내역 / 영수증 다운로드 | — |\n| 메인 사이트 | 마이페이지 — 인증서 목록 / 인증서 PDF 다운로드 | — |\n\n### 🟠 Important — 1차 오픈 필수지만 보조\n\n| 영역 | 화면 |\n|---|---|\n| 결과 | **5각 레이더 차트** (발음·유창성·어휘·문법·내용 구성) |\n| 결과 | 인증서 PDF 레이아웃 + 위변조 검증 페이지 |\n| 마이페이지 | 환불 신청·진행 상태 |\n| 마이페이지 | 회원정보 수정 / 회원 탈퇴 (경고 모달 포함) |\n| 고객센터 | 공지·FAQ·1:1 문의 (작성·내역) |\n| 메인 사이트 | 약관·개인정보처리방침·특정상거래법 표시 |\n| 응시 | 응시 종료 (시험 자동 종료 → 채점 대기 안내) |\n\n### 🟡 라운드 2 이후\n\n| 영역 | 화면 |\n|---|---|\n| 평가자 UI | 채점 대기열 / 3단 분할 뷰 / 매크로 코멘트 / 2인 교차 채점 |\n| 관리자 | 시험 통과 조건 설정 (최소 응시 문항·점수 기준·평균 기준) |\n| 관리자 | 회원·권한 설정 (관리자 등급별) |\n| 관리자 | 통계 — 응시 통계·문항별 정답률·AI 평가 품질 |\n| 관리자 | 시스템 설정 — 인증서 템플릿·약관 관리·2FA·활동 로그 |\n| 데스크탑 → 앱 | 마이페이지 *\"앱에서 응시하기\"* 안내 (Universal Link / App Link) |\n\n---\n\n## 3. 반응형 뷰포트 매트릭스\n\n| 영역 | **데스크탑** (≥1024px) | **태블릿** (768~1023) | **모바일·앱** (≤767) |\n|---|---|---|---|\n| 메인 사이트 (랜딩·시험 목록) | 표준 멀티 컬럼 (3~4열 카드) | 2열 카드 | 1열 스택 |\n| 시험 상세 / 결제 | 좌측 콘텐츠 + 우측 결제/CTA 사이드바 | 콘텐츠 + 하단 sticky CTA | 1열 + 하단 sticky CTA |\n| 마이페이지 | 좌측 메뉴 + 메인 콘텐츠 | 상단 탭 + 메인 | 1열 + 하단 탭 |\n| **응시 화면** | **좌:문제 · 우:응시 2단** | **1단 — 문제 위 / 응시 아래** | **1단 (현 자료의 모바일 디자인)** |\n| 환경 점검 | 중앙 카드 + 옆 가이드 | 1열 카드 | 1열 카드 |\n| 결과 (5각 차트) | 좌:차트 · 우:문항별 점수 카드 | 차트 위 / 카드 아래 | 차트 위 / 카드 아래 |\n| 인증서 PDF 다운로드 | 카드 그리드 | 1~2열 카드 | 1열 카드 |\n| 백오피스 (관리자) | 좌측 사이드바 + 메인 | 사이드바 토글 + 메인 | **1차 오픈 미지원** (데스크탑 전용) |\n\n> **1차 오픈은 데스크탑·모바일 웹만**. iOS/Android 네이티브 앱과 푸시 알림은 라운드 2 이후 도입 — 그 시점에 WebView 안의 마이크 권한·녹음 안정성을 별도 검증한다 (GAP-05). 라운드 2 이후 터치클래스 app 네이티브 쉘 안에 응시 클라이언트 wrapping 가능 (코드 베이스 동일).\n>\n> **응시 진입은 새 창** (정책 10): ★ MaroPass portal 마이페이지 \"응시하기\" 클릭 시 ◇ 터치클래스 사용자 web을 새 창으로 연다. 새 창은 UI 수단, 본질은 brand 자산(portal) vs 학습 자산(사용자 web) 소유권 분리.\n\n---\n\n## 4. 발주 우선순위 (3단계)\n\n### 1단계 — 즉시 발주 (1차 오픈 차단)\n\n| # | 영역 | 비고 |\n|---|---|---|\n| 1 | 데스크탑 응시 2단 뷰포트 (전 응시 화면) | 모바일 디자인 13장이 *반응형의 모바일 break*가 되도록 데스크탑 break 추가 |\n| 2 | 메인 사이트 — 랜딩·가입·로그인·시험 목록·시험 상세·결제·마이페이지 대시보드 | 가장 큰 미커버 영역. 디자인 시스템부터 잡아야 함 |\n| 3 | 5각 레이더 차트 | 결과 화면의 핵심 시각 자산 |\n| 4 | 인증서 PDF 레이아웃 | 위변조 검증 페이지 포함 |\n\n### 2단계 — 1차 오픈 동시 발주 (보조)\n\n| # | 영역 |\n|---|---|\n| 5 | 마이페이지 — 환불·정보수정·탈퇴·인증서 목록 |\n| 6 | 결제 페이지 — PG 진입 · 환경 점검 게이트 흐름 |\n| 7 | 고객센터 — 공지·FAQ·1:1 문의 |\n| 8 | 약관·개인정보·특정상거래법 표시 (정적 페이지 템플릿) |\n| 9 | 응시 종료 / 채점 대기 안내 |\n| 10 | 환경 점검 — 마이크 시각화 디테일 (데시벨 미터·5초 리플레이) |\n\n### 3단계 — 라운드 2 이후\n\n| # | 영역 |\n|---|---|\n| 11 | 평가자 UI 일체 |\n| 12 | 관리자 — 시험 통과 조건 / 회원·권한 / 통계 / 시스템 설정 |\n| 13 | 데스크탑 → 앱 전환 (Universal Link 안내·QR 등) |\n\n---\n\n## 5. 디자인 시스템 발주 메모\n\n> 화면 단위 발주 전에 **디자인 시스템(컬러·타이포·컴포넌트·반응형 브레이크포인트)**을 먼저 정해야 27개 화면이 일관되게 그려진다. 상세는 `08-design-system.md` (작성됨).\n\n핵심 결정 사항:\n- 컬러 팔레트 (Primary Blue `#2e84ff`, grey 시리즈, success/error/warning)\n- 폰트 (Noto Sans JP 1순위 + Noto Sans KR `:lang(ko)` 분기)\n- 브레이크포인트 (≥1024 / 768~1023 / ≤767)\n- 컴포넌트 라이브러리 (Tailwind CDN 기반 가설 — 빌드 시 shadcn/ui 등)\n\n---\n\n## 6. 관리자 UI 작성 현황 (◇ 기존 + ★ MaroPass 추가분)\n\n**기존 터치클래스 관리자 web을 그대로 활용**. MaroPass 추가분만 본 라운드 작업 대상. 좌측 사이드바 5블록 — **대시보드 → 응시자 → 회원 → 시험 → 설정** (회원·응시자 그룹이 최상단, 운영팀 일상 사용 빈도 기준).\n\n| 파일 | 신규/기존 | 내용 |\n|---|---|---|\n| `ui-admin-dashboard.html` | ◇ 기존 + ★ MaroPass KPI 추가 | 대시보드 (4 KPI · 미답변 문의 · 빠른 액션 · 7일 응시 추이) |\n| `ui-admin-members.html` | ★ 신규 (MaroPass 회원 메뉴) | MaroPass portal 가입·결제·환불 데이터 집계 목록 |\n| `ui-admin-payments.html` | ★ 신규 (MaroPass 결제·환불 승인) | MaroPass 결제 5상태 + 환불 처리 |\n| `ui-admin-question-bank.html` | ◇ 기존 (MaroPass 분류 트리 추가) | 문제 은행 — 객관식·주관식 기존 + MaroPass 말하기 5영역 분류 추가 |\n| `ui-admin-question-create.html` | ★ MaroPass 5영역 탭 신설 | 문제 만들기 — 251020 ver.3 5영역 탭(짧은 문장 읽기·질문 대답·생활 속 대화·그림 설명·화용 과제), 영역별 폼 동적 변경, **응시자 폰 mock 라이브 프리뷰** 우측 sticky 사이드바 |\n| 시험 목록 / 시험 등록 / 응시 결과 / 관리자 계정 / 인증서 템플릿 / 공지·FAQ / 약관 / 보안 | 라운드 2 또는 ◇ 기존 그대로 | 본가 시험 관리 화면은 기존 그대로 활용 |\n\nMaroPass admin은 **말하기 전용**. 객관식·주관식은 본가(터치클래스 기존) 시스템 그대로. 문제 만들기 안 MaroPass 말하기 5영역 탭만 신규(★). 문제 만들기는 251020 ver.3에 정의된 5영역(영역 6은 ver.3에서 삭제)을 탭으로 분기하고 영역별 한국어/일본어 지시문·시간·배점이 자동 적용됨. 미리보기는 모바일 동등 비중을 반영한 **핸드폰 frame** mock으로 구성, 영역별 콘텐츠(텍스트 문장 / 음성 펄스 + 질문 / 일러스트 + 말풍선 / 큰 이미지 / 일본어 상황 박스)가 분기 표시됨.\n\n폰트는 Pretendard(한·일 동시 지원, `Pretendard Variable` + `Pretendard JP Variable`).\n"},{"id":"d10","type":"md","src":"06-feature-spec.md","title":"기능 명세 (Phase 1, Light)","content":"# 기능 명세 (Phase 1, Light)\n\n> 한국 LMS 표준 포털 기능 스펙을 *일본 시장 + 1차 오픈 light*에 맞게 정정한 라인 아이템 매트릭스.\n\n## 한 줄\n\n**5대분류 × 11중분류는 그대로 두되, 한국 PG·쿠폰·이용권·장바구니 같은 무거운 영역은 모두 DEFERRED로 잘라낸다.**\n\n## 이 한 줄을 지지하는 이유 5개\n\n1. 한국 LMS 표준 패턴(카카오/네이버 OAuth, 이용권 패키지, 쿠폰·포인트, 가상계좌)은 일본 시장과 PG·소비자 행동이 달라 그대로 박으면 1차 오픈 일정·정합성이 흔들린다.\n2. **단건 결제 + 일본 PG 1개**라는 *light* 가정을 지키면 결제·환불·트랜잭션 정합성 표면적이 1/3 수준으로 줄어든다.\n3. 1차 오픈에서 자르는 모든 항목은 라운드 2에서 *운영 데이터 + 응시자 패턴*을 보고 결정해야 손해가 없다.\n4. *대-중분류*는 응시자 멘탈 모델(메인·회원·구매·마이페이지·고객센터)이라 변경 가능성이 낮으므로 골격은 유지한다.\n5. MaroPass 특수(환경 점검 게이트·인증서 위변조 검증·5각 레이더 차트·인보이스 PDF)는 한국 LMS 스펙에 없는 항목이라 별도 표시한다.\n\n---\n\n## 라벨 정의\n\n| 라벨 | 의미 |\n|---|---|\n| ✅ **포함** | Phase 1에 전체 구현 |\n| 🟠 **일부** | Phase 1에 라이트 버전만 (자동 분기·매크로 등 제외) |\n| ⏭ **DEFERRED** | 라운드 2 이후 |\n| ❌ **제외** | MaroPass 정책상 불포함 |\n\n---\n\n## 1. 공통·메인\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 메인 화면 | 메인 배너 (주요 프로모션·공지 롤링) | ✅ | |\n| 메인 화면 | 베스트/추천 시험 (인기 리스트 + 바로가기) | 🟠 | 1차 오픈 시험 종류가 적으므로 *추천* 로직 단순화 |\n| 메인 화면 | 서비스 소개 섹션 (AI 평가 방식·특징, 정적) | ✅ | |\n| 메인 화면 | TOPIK과의 관계 안내 (보완·진단 위치) | ✅ | MaroPass 특수 |\n| GNB | 시험 리스트·고객센터·마이페이지 메뉴 | ✅ | |\n| GNB | **이용권** 메뉴 | ❌ | 1차 오픈 단건 결제 |\n| Footer | 이용약관·개인정보처리방침·사업자 정보 | ✅ | |\n| Footer | **특정상거래법 표시** | ✅ | MaroPass 특수 (일본 필수) |\n| Footer | SNS 링크 (X·Instagram·YouTube) | ✅ | 일본 SNS 기준 |\n| 플로팅 | 모든 페이지 하단 [문의/FAQ] 버튼 | ✅ | |\n| 시스템 | 에러 페이지 (404 / 500 / 네트워크 오류) | ✅ | 디자인 톤은 메인과 동일. 문구 일본어 |\n\n---\n\n## 2. 회원 관리\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 회원가입 | 이메일 인증 기반 일반 가입 | ✅ | |\n| 회원가입 | 소셜 가입 — **LINE / Google / Apple** | 🟠 | 일본 시장 표준. 카카오/네이버는 ❌ |\n| 회원가입 | 약관 동의 (서비스·개인정보 필수, 마케팅 선택) | ✅ | |\n| 회원가입 | 약관 변경 시 재동의 (로그인 시점 모달) | 🟠 | 변경 이력 + 마지막 동의 버전 비교. 변경 시 강제 모달 |\n| 회원가입 | 최소 개인정보 수집 (이름·연락처·학습 경력 등) | ✅ | |\n| 로그인 | 일반/소셜 로그인 | ✅ | |\n| 로그인 | 비밀번호 재설정 (이메일) | ✅ | |\n| 로그인 | 아이디 찾기 (이메일) | ✅ | |\n| 로그인 | 세션 만료·자동 로그아웃 (기본 정책) | 🟠 | 1차는 고정 만료 (예: 24h). 사용자 안내 토스트만 |\n| 로그인 | 2FA | ⏭ | 라운드 3 (관리자 우선) |\n\n---\n\n## 3. 상품·결제\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 시험 리스트 | 검색/필터 (난이도별·유형별) | 🟠 | 1차 오픈은 시험 종류 적음 — 검색 기본만 |\n| 시험 리스트 | 카드 UI (썸네일·시험명·가격·시간 요약) | ✅ | |\n| 시험 상세 | 시험 소개·문항 구성·샘플·응시 후 받는 것·미니 FAQ (탭 없는 세로 스크롤 1페이지 + 우측 sticky 구매 카드) | ✅ | 결제 직전 페이지 — 탭 숨김은 전환율 저하라 1페이지 통합 |\n| 시험 상세 | 단건 구매 옵션 | ✅ | |\n| 시험 상세 | **패키지(이용권) 구매** | ❌ | 1차 오픈 단건만 |\n| 시험 상세 | CTA — [바로 구매하기] | ✅ | 로그인 회원만 진입 — 비로그인 시 가입 페이지로 (`04-policy.md` 정책 9) |\n| 시험 상세 | CTA — [무료 샘플 응시] | ✅ | 로그인 회원만 진입 — 비로그인 시 가입 페이지로 (`04-policy.md` 정책 9). 첫 응시는 환경 점검 모달 자동 발화 |\n| 시험 상세 | CTA — [장바구니 담기] | ⏭ | GAP-13 |\n| 회원 게이트 | **비로그인 진입 가드** (무료 샘플·결제 클릭 시) | ✅ | `ui-auth.html?intent={sample\\|purchase}&return=...` 로 이동. 가입 후 원래 동작 자동 진행. 본 게이트는 UI 1차 방어 — 서버 API에서 인증 토큰 검사로 별도 보장 |\n| 주문/결제 | 주문서 작성 (구매자 정보 확인) | ✅ | |\n| 주문/결제 | 쿠폰/포인트/프로모션 코드 적용 | ⏭ | 라운드 2 |\n| 주문/결제 | PG 연동 — **일본 PG 1개사** (신용카드 + QR 1종) | ✅ | GAP-12 (PG사 미확정) |\n| 주문/결제 | 가상계좌 / 편의점 현금 결제 | ❌ | 일본 PG 정책상 미지원 가설 |\n| 주문/결제 | 결제 완료 페이지 + 주문 내역 이메일 자동 발송 | ✅ | |\n| 주문/결제 | **인보이스 PDF 발행** (적격청구서) | ⏭ | 일본 PG API 연동 시점에 같이. 라운드 2 |\n\n---\n\n## 4. 마이페이지\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 대시보드 | 나의 현황 — 진행 중/완료된 시험 요약 | ✅ | |\n| 대시보드 | 보유 쿠폰 수 | ❌ | 쿠폰 미운영 |\n| 대시보드 | 최근 학습 — 이어하기 | 🟠 | 응시는 분리 미허용(정책 4). 결과·재응시 진입 정도 |\n| 대시보드 | **응시 진입 — 데스크탑·모바일 웹** | ✅ | 1차 오픈은 웹만. iOS/Android 앱은 라운드 2 |\n| 나의 시험 | 시험 대기 목록 (D-day · 응시 윈도우 14일 표시) | ✅ | |\n| 나의 시험 | **응시 윈도우 만료 처리** (14일 경과 시 자동 만료 + 환불 정책 매핑) | ✅ | 만료 D-1·D-day 메일 발송. 만료 후 환불 정책은 04-policy.md |\n| 나의 시험 | **★ 응시하기 → 새 창 (터치클래스 사용자 web)** | ✅ | 04-policy.md 정책 10. window.open으로 사용자 web home. 팝업 차단 안내 |\n| 나의 시험 | 본인 확인 / 환경 점검 / 응시 클라이언트 / 응시 결과 확인 | (사용자 web) | 모두 터치클래스 사용자 web에서 — `06-feature-spec.md` \"6. 사용자 web (응시)\" 참조 |\n| 나의 시험 | **결과지 PDF 다운로드** (간단 결과 리포트) | 🟠 | 점수·등급·종합 피드백. 다운로드는 본 사이트에서. 5각 레이더는 PDF 미포함(라운드 2) |\n| 나의 시험 | **인증서 PDF 다운로드** + 위변조 검증 URL | ✅ | MaroPass 특수. 다운로드는 본 사이트에서 (정책 10 — 보관 자료 일원화) |\n| 나의 시험 | **결과·인증서 보관 기간 안내** | 🟠 | 정책: 무기한 보관 명시. 재발급 횟수 제한 없음(1차) |\n| 나의 시험 | 재응시 (시스템 장애 한정) | 🟠 | 운영자 수동 티켓 발행 (정책 6) |\n| 결제·이용권 | 결제 내역 조회 | ✅ | |\n| 결제·이용권 | 영수증 PDF 출력 | 🟠 | 1차는 간이 영수증 PDF만. 적격청구서 인보이스는 라운드 2 (PG API 연동 시) |\n| 결제·이용권 | 취소/환불 요청 | 🟠 | 운영 검토 수동 (정책 7). 자동 분기 ⏭ |\n| 결제·이용권 | 환불 상태 추적 (처리중·완료) | ✅ | 단순 표시 |\n| 결제·이용권 | 쿠폰 함 (보유·등록) | ❌ | 쿠폰 미운영 |\n| 알림 | **시스템 알림 이메일** (결제 완료 / D-day 리마인더 / 만료 임박 / 결과 공개 / 환불 처리) | ✅ | 발송 트리거 + 템플릿. 5종 |\n| 알림 | 푸시 알림 (앱) | ⏭ | 앱 인프라 의존 — 라운드 2 |\n| 알림 | 알림 수신 설정 | 🟠 | 1차는 ON/OFF 전체 토글만. 채널·종류별 분리는 라운드 2 |\n| 회원 정보 | 정보 수정 (비밀번호·연락처·프로필 이미지) | ✅ | |\n| 회원 정보 | 회원 탈퇴 (사유 입력 + 데이터 보관 정책 안내) | 🟠 | 데이터 정책 디테일 ⏭ 라운드 3 |\n\n---\n\n## 5-1. 회원 게이트 (정책 9) — 시험 상세 CTA 적용\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 시험 상세 | CTA — **바로 구매하기** (로그인 필수) | ✅ | 비로그인 → `ui-auth.html?intent=purchase&return=ui-checkout.html` |\n| 시험 상세 | CTA — **무료 샘플 응시** (로그인 필수) | ✅ | 비로그인 → `ui-auth.html?intent=sample&return=...`. 첫 응시 시 환경 점검 모달 자동 발화 |\n| 게이트 | 비로그인 진입 가드 | ✅ | UI 1차 방어. 서버 API 인증 토큰 검사로 별도 보장 |\n| 게이트 | 가입 후 intent 자동 진행 | ✅ | intent=sample → 시험 상세 복귀 + 환경 점검 자동 / intent=purchase → 결제 페이지 |\n| 환경 점검 | 통과 이력 30일 유효 (localStorage) | ✅ | 30일 이내 통과 + 마이크 권한 granted면 환경 점검 모달 스킵 |\n\n---\n\n## 6. 터치클래스 사용자 web — MaroPass 시험 응시 영역 추가 (◇ 기존 web 재사용)\n\n> **기존 운영 중인 터치클래스 사용자 web**에 MaroPass 결제분 시험을 노출하는 home과 말하기 IBT 응시 클라이언트를 추가하는 것. 본인 확인 흐름·환경 점검 게이트·자동 저장/재전송 같은 인프라는 기존 그대로 활용하고, 신규는 **★** 표기.\n\n\n| 중분류 | 상세 기능 | Phase 1 | 신규/기존 | 비고 |\n|---|---|---|---|---|\n| home | MaroPass 결제분 시험 목록 (응시 대기 + 응시 완료) | ✅ | ★ 신규 | MaroPass portal 마이페이지 \"응시하기\"로 진입한 새 창의 홈. 기존 사용자 web의 다른 콘텐츠와 분리 라우팅 |\n| 응시 진입 | 응시 본인 확인 (이름·이메일·시험명 + 체크박스) | ✅ | ◇ 기존 활용 | 카메라·SMS는 라운드 2 |\n| 응시 진입 | 환경 점검 게이트 (마이크·볼륨·5초 리플레이 3단계) | ✅ | ◇ 기존 활용 | 정책 1. v1 보고용 4개 항목에서 운영 결정으로 축소 |\n| 응시 | **MaroPass 응시 클라이언트** (말하기 IBT 5영역·데스크탑 2단 / 모바일 1단) | ✅ | ★ 신규 | MaroPass 말하기 전용. 자동 녹음, 타이머, 메모장, 자동 저장·전송 |\n| 응시 | 응시 중 사고 대응 정책 (네트워크 끊김·마이크 회수·이탈 차단) | ✅ | ◇ 기존 활용 | 정책 2~4 확장. 끊김 시 자동 재연결 + 시간 보존 |\n| 결과 | **응시 결과 확인** (점수표·5각 레이더·1급~6급 등급·문항별 AI 피드백) | ✅ | ★ 신규 | MaroPass 채점 결과 포맷. 운영자 결과 공개 후 노출 (정책 5) |\n| 결과 | \"인증서·결과지 PDF는 MaroPass portal 마이페이지에서\" 안내 + 이동 링크 | ✅ | ★ 신규 | 정책 10 — 보관 자료 일원화 |\n\n---\n\n## 7. 알림\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 메일 | **시스템 알림 메일 5종** (결제 완료 / D-1·D-day 리마인더 / 만료 / 결과 공개 / 환불 처리) | ✅ | 발송 트리거 + 템플릿 |\n| 푸시 | 푸시 알림 (앱) | ⏭ | 앱 인프라 의존 — 라운드 2 |\n| 설정 | 알림 수신 설정 | 🟠 | 1차는 ON/OFF 전체 토글만. 채널·종류별 분리는 라운드 2 |\n\n---\n\n## 8. 고객센터\n\n| 중분류 | 상세 기능 | Phase 1 | 비고 |\n|---|---|---|---|\n| 게시판 | 공지사항 (등록·리스트·상세) | ✅ | 관리자 등록 |\n| 게시판 | FAQ (카테고리별 — 결제·오류·시험 등) | ✅ | |\n| 1:1 문의 | 문의 작성 (유형 선택·제목·내용·파일 첨부) | ✅ | |\n| 1:1 문의 | 나의 문의 내역 + 답변 상태 (접수·답변완료) | ✅ | |\n| 1:1 문의 | 답변 워크플로우 자동화 | ⏭ | 라운드 2 |\n\n---\n\n## DEFERRED — 1차 오픈 컷 정리\n\n이 문서에서 ⏭/❌로 표시된 항목들의 라운드 2 이후 다룰 곳:\n\n| 영역 | 라운드 2 이후 다룰 곳 |\n|---|---|\n| 이용권·패키지·쿠폰·포인트·프로모션 코드 | 라운드 2 — 결제 모듈 확장 (`14-payment.md`) |\n| 장바구니 | 라운드 2 (GAP-13) |\n| 카카오/네이버 OAuth (한국 SNS) | ❌ (일본 시장 미적용) |\n| 가상계좌·편의점 현금 | ❌ (일본 PG 정책상 미지원 가설) |\n| 검색 고도화 (다중 필터·자동완성) | 라운드 2 |\n| 추천 시험 알고리즘 | 라운드 2 |\n| 시험 분리·이어하기 (응시 일시정지) | 라운드 2 (정책 4 확장) |\n| 환불 자동 분기 | 라운드 2 (정책 7 확장) |\n| 1:1 문의 답변 자동화·매크로 | 라운드 2 |\n| 회원 데이터 보관/삭제 정책 | 라운드 3 (`12-security.md`) |\n\n---\n\n## MaroPass 특수 (한국 LMS 스펙에 없던 항목)\n\n1. **환경 사전 점검 게이트** — 응시 시작 직전 (마이페이지 > 나의 시험 > 시험 시작 → 게이트) (정책 1, GAP-08). 결제와 분리\n2. **응시 본인 확인** — 응시 시작 직전 이름·이메일·시험명 확인 (카메라·SMS는 라운드 2)\n3. **응시 클라이언트 진행 정책** — 네트워크 끊김 자동 재연결·마이크 권한 회수 가드·타이머·답안 자동 제출·이탈 차단 (정책 4 확장)\n4. **TOPIK과의 관계 안내** — 보완·진단 포지셔닝 (메인·약관)\n5. **결과 — 점수표 (선) + 5각 레이더 (리포트 부가)** — 발음·유창성·어휘·문법·내용 구성\n6. **AI 피드백 (종합 + 문항별)** — STT 비교·추천 연습\n7. **결과지 PDF
